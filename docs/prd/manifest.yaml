  - name: PI-005-copilot-cli-parity-map
    description: Produce docs/architecture/copilot-cli-parity.md — a reference document mapping every marketplace-level and plugin-internal Claude Code capability to its GitHub Copilot CLI equivalent, with conversion recipes and a DIRECT/APPROXIMATE/GAP tier classification per row. Every GAP row specifies a degradation strategy (INLINE-INTO-INSTRUCTIONS, DROP-WITH-WARNING, EMIT-SHIM, or HARD-ERROR). Desk research only; empirical dogfood deferred to a separate maintainer-controlled project during/after PI-006. Source-of-truth input for PI-006.
    prd_sections: [G-3]
    dependencies: []
    status: superseded
    notes: |
      Aborted during execute (2026-04-21) after the mapping document reached the 5-agent Final Review stage. Root cause: the piece's core premise — "convert Claude Code plugin artifacts to Copilot CLI equivalents on a mirror branch" — turned out to be the wrong architecture.

      Discovery: the superpowers plugin (github.com/obra/superpowers, v5.0.7) demonstrates an alternative "co-ship dual-configuration" pattern where a single source tree ships per-host manifests (`.claude-plugin/plugin.json`, `.cursor-plugin/plugin.json`, `gemini-extension.json`, `package.json`) side-by-side with per-host hook-registration files (`hooks/hooks.json`, `hooks/hooks-cursor.json`) and shared content directories (`skills/`, `agents/`, `commands/`). `AGENTS.md` is a symlink to `CLAUDE.md` — Copilot CLI reads the same instruction file Claude does with zero transformation. For distribution to a different canonical marketplace (e.g., OpenAI Codex), a single rsync-plus-exclude-plus-regenerate-overlay script handles publishing (see `scripts/sync-to-codex-plugin.sh` in superpowers). No mirror branch, no conversion pipeline.

      PI-005's feature branch `spec/PI-005-copilot-cli-parity-map` is preserved with full execute history (spec + plan + 217-line deliverable + all phase commits + fix-code commits from 3 QA iterations). Not merged. Reference for the next spec cycle.
      Successor: PI-007-copilot-coship (shipped 2026-04-21).

  - name: PI-006-copilot-mirror-ci
    description: CI/CD pipeline plus bash conversion script that encodes PI-005's mapping doc and produces a `master-copilot` branch mirroring `master` on every commit with Claude→Copilot conversions applied. Dogfooded in a separate maintainer-controlled project, not in this repo.
    prd_sections: [G-3]
    dependencies: [PI-005-copilot-cli-parity-map]
    status: superseded
    notes: |
      Aborted 2026-04-21 as part of the PI-005 abort. The mirror-branch conversion pipeline this piece proposed is the wrong pattern — the superpowers multi-host plugin demonstrates that co-shipping all hosts' manifests and hook-registrations in one tree eliminates the need for conversion entirely. See PI-005's notes for the discovery detail. Successor: PI-007-copilot-coship (shipped 2026-04-21).

  - name: PI-007-copilot-coship
    description: Apply a superpowers-style co-ship pattern to the `spec-flow` plugin so GitHub Copilot CLI users can install and invoke it. Delivered as a single-path dual-host co-ship — one `plugins/spec-flow/` tree with plain-`.md` agent files serves both Claude Code and Copilot CLI. Copilot CLI users install via subdirectory syntax (`/plugin install jmontanari/ai-plugins:plugins/spec-flow`) or via the marketplace 2-step flow (`/plugin marketplace add jmontanari/ai-plugins` → `/plugin install spec-flow@shared-plugins`). No mirror branch, no sync scripts, no content translation. Supersedes PI-005 and PI-006 with a strictly simpler architecture. Three smoketests on Copilot CLI v1.0.34 recorded in `docs/specs/PI-007-copilot-coship/learnings.md`: install + `/spec-flow:status` (PASS), `/agents` discovery (PASS), `/agents` listing + frontmatter hygiene (PASS). Fixed a path-duplication bug in `metadata.pluginRoot` during review.
    prd_sections: [G-3]
    dependencies: []
    status: done

  - name: PI-008-multi-prd-v3.0.0
    description: |
      Multi-PRD support — restructures the spec-flow docs layout so a project can hold multiple PRDs in parallel under a single shared charter. Replaces today's single `docs/prd/` + flat `docs/specs/` with `docs/prds/<prd-slug>/{prd.md, manifest.yaml, specs/<piece-slug>/, backlog.md}` sibling namespaces. Adds:
        - PRD lifecycle states (drafting / active / shipped / archived) carried in the PRD's front-matter
        - Dual backlog: per-PRD `backlog.md` for capability-scoped items, global `docs/improvement-backlog.md` for cross-PRD learnings and spec-flow process findings
        - Short-slug naming for worktrees (`worktrees/prd-<prd-slug>/piece-<piece-slug>/`) and branches (`spec/<prd-slug>-<piece-slug>` etc.)
        - Automatic charter-drift detection in every skill's Phase-1 context load (no new user-facing skill; inline resolution via focused qa-spec mode)
        - Cross-PRD piece dependencies via qualified references (`depends_on: <prd-slug>/<piece-slug>`) — declarative only; orchestration stays manual for v3.0
        - Migration flow (new `/spec-flow:migrate` skill) that upgrades existing v1.x (`docs/prd.md` flat) and v2.x (`docs/prd/prd.md` + `docs/prd/manifest.yaml`) projects to the v3 layout using `git mv` to preserve history
      Breaking change — ships as spec-flow v3.0.0 (major bump per NN-C-003 and NN-C-009). Ad-hoc task work (lightweight spec→plan→execute for out-of-band work) is out of scope and deferred to a separate future PRD (captured in improvement-backlog.md).
    prd_sections: [G-2, FR-004, NFR-003, NN-P-001, NN-P-003, NN-C-003]
    dependencies: []
    status: implementing
    notes: |
      Delivered as a dual-path co-ship (not the original mirror-branch design). The spec and plan carry amendment blocks at the top documenting the two design pivots (mirror-branch → dual-path with `.agent.md` symlinks → plain-`.md`). See `docs/specs/PI-007-copilot-coship/learnings.md` for the three smoketest records and out-of-scope findings (`/fleet`, `agent` tool, marketplace-root install path).
      Evidence: README "Install on GitHub Copilot CLI" section, CHANGELOG 2.1.0 entry, 12 top-level agents with valid CR-001 frontmatter, plugin.json + marketplace.json both at 2.1.0 (NN-C-009 three-place bump), scripts/ directory empty (mirror-sync infrastructure fully dismantled).
      This ships SC-002's Copilot-CLI install leg prerequisite (NN-P-003 dog-food: the maintainer ran the documented install on the same machine the README now recommends). SC-002 moves from uncovered-prerequisite to first-real-world-data-point collected.

