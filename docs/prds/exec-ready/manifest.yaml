pieces:
  - name: research-unify
    slug: research-unify
    description: |
      One deep codebase-gathering pass runs once, before spec brainstorm, in an isolated
      Opus sub-agent, and writes a durable research.md to the piece spec directory. Spec
      consumes it for proposed answers during brainstorm; plan consumes the same artifact
      as primary context and stops re-deriving introspection.md (emits [RESEARCH-CONSUMED]
      / [RESEARCH-ABSENT]). Folds in the L-10 convention scan and the plan-stage
      introspection so there is exactly one gathering pass, not three. [RESEARCH-UNAVAILABLE]
      fallback preserves current behavior. Return to main thread is ≤2K tokens; on-disk file
      may be richer. Covers FR-001, NFR-001.
    prd_sections: [FR-001, NFR-001, NFR-003, G-1]
    dependencies: []
    status: merged

  - name: plan-concrete
    slug: plan-concrete
    description: |
      Plan concreteness contract — the core piece. Each plan phase specifies exact file,
      exact location/anchor, and exact content/signatures (not "implement X"). Genuine
      unknowns become explicit [SPIKE: <unknown>] markers. Doc-as-code phases require exact
      prose plus a branch-enumeration AC per conditional (codifies the pi-011 finding).
      qa-plan gains a concreteness floor: vague deliverables, unmarked unknowns, and missing
      branch ACs are must-fix. Goal: a passing plan yields zero unmarked execute-time
      discoveries. Covers FR-002.
    prd_sections: [FR-002, G-1, G-2]
    dependencies: [research-unify]
    status: merged

  - name: test-data-up
    slug: test-data-up
    description: |
      Test data defined upfront for TDD phases. Each TDD phase in the plan carries a
      `Test Data` block (concrete inputs + expected outcomes/oracle). tdd-red transcribes
      the oracle from the plan instead of designing it live; it invents no inputs/outcomes
      absent from the plan. Unpredictable outcomes use a [SPIKE] marker instead of fabricated
      data. qa-plan flags a TDD phase with neither a Test Data block nor a [SPIKE] marker.
      Covers FR-003.
    prd_sections: [FR-003, G-1]
    dependencies: [plan-concrete]
    status: merged

  - name: sonnet-coord
    slug: sonnet-coord
    description: |
      Sonnet-driven coordinator on file-based state. Execute assigns Sonnet to coordinator +
      implementer by default. The existing 5.2.1 pre-flight already warns when the active
      model is NOT Sonnet (bbcf58c); this piece generalizes that single execute-start prompt
      into a per-stage model policy that reports the assignment and flags only exceptions
      (spike path / operator override). All resume-critical state is on disk so a fresh
      context re-derives position and resumes from the last clean checkpoint
      ([STATE-INCOMPLETE] escalation if a field is missing). Final Review circuit-breaker
      becomes configurable via .spec-flow.yaml (raised default for doc-as-code; fixes the
      pi-011 hard-3 defect). Corrects the root/.claude-plugin plugin.json version skew when
      first touched. Covers FR-004, NFR-002, NFR-003, NFR-004.
    prd_sections: [FR-004, NFR-002, NFR-003, NFR-004, G-3, G-4]
    dependencies: [plan-concrete]
    status: merged

  - name: spike-agent
    slug: spike-agent
    description: |
      New Opus spike agent (agents/spike.md) + execute wiring, serving two roles on one shared
      agent. ROLE 1 (FR-005): a [SPIKE] phase dispatches the spike agent on Opus in an isolated
      context; it resolves the genuine unknown and records a structured resolution to a durable
      artifact (consumable as FR-003 test data, so the same unknown is not spiked twice). A
      non-[SPIKE] phase the implementer cannot complete on Sonnet halts and routes to plan
      amendment (Step 6c) — never a silent Opus upgrade. Operator override forces Opus for a
      named piece/phase at invocation. ROLE 2 (FR-008): any mid-execution scope change — agent-
      discovered found-work at Step 6c OR an operator-initiated change ("add/change/do X") during
      execute — enters Step 6c triage under one uniform regime; above the size/complexity
      threshold (the 50% diff-ratio gate) the same spike agent scopes the change first and writes
      a scoping artifact that plan-amend consumes, below it the change amends the plan directly.
      The resulting amendment phases are queued onto the plan/task list at a dependency-correct
      position and do not preempt in-progress work unless the operator force-stops. Amends
      NN-P-002. Spike that cannot resolve/scope returns BLOCKED with findings; execute escalates
      (no fabricated resolution, no mid-stream patch). Covers FR-005, FR-008.
    prd_sections: [FR-005, FR-008, G-2, G-3]
    dependencies: [plan-concrete, sonnet-coord]
    status: merged

  - name: spec-preresearch
    slug: spec-preresearch
    description: |
      Investigation-First Design Protocol (Spec 2.0), two tiers, one piece. TIER 1: a 5-phase
      multi-agent deliberation protocol runs before the first user question in spec/prd/small-change/
      charter — coordinator (read all + web research) → parallel per-decision-unit-cluster viability
      agents (all paths incl. reuse/extend-existing) → synthesis → parallel single-model multi-lens
      adversarial board (architecture/scope/user-intent/backward-compat/risk; NOT multi-model, per
      NN-P-005) → convergence writing deliberation.md. Questions restricted to VOQ-tagged validated
      open questions (artifact-verifiable grounding). Depth policy full/lite/off (.spec-flow.yaml).
      Plan consumes the recommendation ([DELIBERATION-CONSUMED/ABSENT]). TIER 2: an answer-validation
      loop auto-fires a lite scoped deliberation-validate pass when an operator free-form answer
      introduces an assertion outside the evaluated path-set — verdict CONFIRM/FLAG-HARD(NN violation,
      no override)/FLAG-SOFT(override w/ rationale); validation rounds append to deliberation.md; makes
      grounding bidirectional; reuses spike-agent scope-mode. Plus an Opus pre-flight (inverse of
      execute's Sonnet check) recommending Opus for spec/prd/plan/charter. Adds FR-009 (A–N) to the
      exec-ready PRD and appends FR-009 to NN-P-005 Scope. 14 FRs, 25 ACs. Deps: research-unify.
    prd_sections: [FR-009]
    dependencies: [research-unify]
    status: specced

  - name: flywheel-repo
    slug: flywheel-repo
    description: |
      Repo-level self-hardening flywheel. Recurring patterns become countable against a
      durable stable-ID registry at docs/patterns.yaml, correlating charter/project/PRD
      patterns across PRDs within the repo. On recording, the flywheel proposes a pattern-ID
      match (or "new"); operator confirms classification + scope at Step 6c (no silent write).
      Count = dated occurrences (provenance: piece, date, source). At threshold (default 2,
      configurable in .spec-flow.yaml) a batched hardening proposal routes to its repo home
      (charter amendment / local QA hardening / PRD work). Rejections recorded with rationale,
      not re-proposed. Non-blocking; [FLYWHEEL-DEGRADED: repo registry unavailable] if
      docs/patterns.yaml is unwritable. Establishes the registry + match + count mechanics
      reused by flywheel-global. Covers FR-006.
    prd_sections: [FR-006, G-5]
    dependencies: [sonnet-coord, spike-agent]
    status: merged
    merged_at: 2026-06-09

  - name: flywheel-global
    slug: flywheel-global
    description: |
      Plugin-global cross-install flywheel. Plugin-level patterns (spec-flow pipeline/agent/QA
      defects) are recorded to a machine-global registry under ~/ (proposed
      ~/.claude/spec-flow/patterns.yaml; path confirmed at spec) that survives plugin updates
      and is read/written by any repo's flywheel run on the machine — so a defect appearing
      once per repo correlates across all repos on the machine. Reuses the stable-ID + match +
      count mechanics from flywheel-repo; each occurrence carries the originating repo;
      operator confirms scope=plugin before write. At threshold, the batched proposal is to
      create a spec-flow self-improvement piece in the plugin home repo. [FLYWHEEL-DEGRADED:
      plugin registry unavailable] if unwritable (repo-level recording continues; execute not
      blocked). Cross-machine correlation is an explicit non-goal (no shared remote backend).
      Covers FR-007. ORDERING (2026-06-09 audit): deliberately sequenced last — depends on
      flywheel-refresh (lifecycle mechanics must exist before a second registry is built on
      them) and metrics (cross-install correlation should consume measured signal); start
      only after the repo flywheel has produced at least one real threshold-triggered
      hardening on live pieces.
    prd_sections: [FR-007, G-5]
    dependencies: [flywheel-repo, flywheel-refresh, metrics]
    status: open

  - name: metrics
    slug: metrics
    description: |
      Pipeline instrumentation — per-piece metrics artifact (proposed metrics.yaml in the
      piece spec directory; location/schema confirmed at spec time). Spec records Q&A rounds;
      execute records Step 6c discoveries (spike-attributed vs unmarked), escalations,
      amendments, QA iterations, dispatches by model tier, resume outcomes; Final Review
      records iterations + must-fix counts. /spec-flow:status renders SC-001..SC-006 per PRD
      from disk (SC-007). Wires the flywheel's reserved `metric` occurrence source
      (flywheel-repo ADR-3) — pattern occurrences may cite measured trends, operator-confirmed
      per NN-P-004. [METRICS-DEGRADED] on unwritable artifact; [METRICS-ABSENT] rendering for
      pre-instrumentation pieces (NN-C-003). Covers FR-010.
      WHY (audit 2026-06-09): all six SCs currently "measurement pending"; a flywheel without
      a programmatic evaluator is the documented failure mode of self-improvement loops
      (PRD Research Basis R4, R6). Highest-priority new piece — baselines must exist before
      gate-scaling claims any oversight reduction.
    prd_sections: [FR-010, SC-007, G-5, G-6]
    dependencies: [flywheel-repo]
    status: open

  - name: exec-guardrails
    slug: exec-guardrails
    description: |
      Execute integrity guardrails. (1) Test immutability: upgrades tdd-red's SHA-256 manifest
      (pi-020 anti-cheat anchoring) from detect-later to reject-mechanically — a Build-step
      diff touching any Red-manifest file is rejected pre-commit and the implementer
      re-dispatched with violating paths named; no warn-only path. Phase exit re-verifies
      hashes; Implement-track phases that legitimately author tests declare those paths in
      the plan (qa-plan verifies). Repeated rejections route to Step 6c as plan-incompleteness,
      never an exemption. (2) Amendment budget becomes a hard cap (.spec-flow.yaml,
      documented default): reaching it halts execute with an operator escalation — no
      soft-checkpoint continuation. Covers FR-011.
      WHY (audit 2026-06-09): every major coding-agent model family has been caught deleting/
      modifying tests or hardcoding inputs (R1, R2); the proven mitigation is tests-as-
      immutable-inputs, and the 80%-reliability horizon (~1h, R3) demands hard stops, not
      soft checkpoints, for unattended runs. Precondition for safe loop-driven execute.
    prd_sections: [FR-011, SC-002, G-2, G-6]
    dependencies: []
    status: open

  - name: gate-scaling
    slug: gate-scaling
    description: |
      Verifiability-scaled sign-off gates + review-cost controls. Every AC tagged at spec time
      as machine-checkable (named check) or judgment-required (named judgment); untagged ACs
      are qa-spec must-fix. Spec/plan/Final-Review gates render an evidence digest and offer a
      single summary-confirm keystroke ONLY when QA is clean, zero surviving markers, and all
      machine-checkable ACs have attached evidence — otherwise today's full gate runs
      unchanged. NN-P-001 fully preserved: a keystroke is always required; nothing
      auto-advances. Plus two review-cost controls: review_board_variant: doc-as-code
      (substitute blind-reviewer slot with a second edge-case reviewer — codifies pi-011
      retro: blind 0/6, edge-case 6/6 must-fix detection) and a single-Opus triage pre-filter
      on Final Review fix iterations (full board re-dispatches only for contested/new
      findings). Tag ratios flow into the metrics artifact. Covers FR-012.
      WHY (audit 2026-06-09): gate-hardness ladder + reviewer-zeal warning (R5); machine-
      verifiable checks as the "external source of truth" enabling reduced supervision (R13);
      gates must keep consequence (R11) while cost scales. Depends on metrics: the SC-008
      baseline (operator interactions per clean piece) must be measured before this ships.
    prd_sections: [FR-012, SC-008, G-6]
    dependencies: [metrics]
    status: open

  - name: pipeline-e2e
    slug: pipeline-e2e
    description: |
      End-to-end smoke test for the pipeline itself — peer to the coherence linter. Committed
      fixture project + scripted scenario driving a minimal piece (≥1 TDD phase, ≥1 Implement
      phase); asserts artifact existence/ordering (research.md before first brainstorm commit,
      Test Data blocks, journal, discovery-log rows, metrics artifact), required dispatch
      sequence (tdd-red → qa-tdd-red → implementer → verify → QA gate → board), and manifest
      status transitions. Explicit cases for the two never-exercised round-trips: spike
      [SPIKE]-resolution → test-data consumption, and the [TEST-DATA-ABSENT] fallback.
      SKIPPED-per-capability reporting, never false green. CI wiring may land with
      pi-022-vsync-ci. Covers FR-013.
      WHY (audit 2026-06-09): only the linter has tests today; superpowers' e2e suite for its
      own framework is the proven pattern (R7). Sequenced EARLY — regression insurance should
      exist before exec-guardrails and gate-scaling perform surgery on execute/SKILL.md
      (1,986 lines of orchestration prose).
    prd_sections: [FR-013, G-1]
    dependencies: []
    status: open

  - name: artifact-budgets
    slug: artifact-budgets
    description: |
      Artifact size budgets — the inverse of the FR-002 concreteness floor. Reference doc
      defines per-class budgets (spec.md, plan.md per-phase + total, research.md,
      deliberation.md, learnings.md) in lines + approximate tokens, with .spec-flow.yaml
      overrides; defaults derived from the size distribution of the 5 merged exec-ready
      pieces. qa-spec/qa-plan flag overage as must-fix with split/condense guidance;
      irreducible overage routes to piece-splitting (qa-prd ≤7-AC rule), not waivers. Budget
      compliance recorded in the metrics artifact. BINDS spec-preresearch: its deliberation.md
      budget is registered here, before that piece's plan is authored, and is verified at its
      qa-plan gate. Covers FR-014.
      WHY (audit 2026-06-09): artifact bloat is the most common way spec pipelines die —
      spec-kit's 2,577 lines of faux-context markdown per ~700 lines of code (R8); context
      rot is measurable (R10). Land before or alongside spec-preresearch execution so Spec
      2.0's investigation artifact starts bounded.
    prd_sections: [FR-014, SC-008, G-1, G-6]
    dependencies: []
    status: open

  - name: flywheel-refresh
    slug: flywheel-refresh
    description: |
      Flywheel pattern lifecycle — outcome tracking, expiry, refresh. Pattern schema gains
      state (active/hardened/archived), last_seen, and hardening outcome (spike artifact ref +
      landing site); registries without the fields read as active (NN-C-003). Applying a
      hardening transitions the pattern to hardened; a post-hardening confirmed occurrence
      re-opens it active with an ineffective-hardening flag at the next batched review — the
      check that the fix actually worked. Operator-gated refresh pass proposes archival for
      stale patterns (configurable window) and clean hardened patterns; nothing archives
      silently (NN-P-004); archived entries stay in-file for audit and leave the
      match-proposal candidate set. [FLYWHEEL-DEGRADED: lifecycle unavailable] on malformed
      registry. Covers FR-015.
      WHY (audit 2026-06-09): capture without expiry rots — compound-engineering pairs
      compound with refresh (R9); retained items must be re-verified in the loop (R4, R14).
      Gates flywheel-global: lifecycle mechanics must exist before a second registry is
      built on them.
    prd_sections: [FR-015, SC-003, SC-005, G-5]
    dependencies: [flywheel-repo]
    status: open

coverage:
  total_prd_sections: 18
  covered_sections: 18
  uncovered_sections: []
  percentage: 100
  notes: |
    All FRs (001-008, 010-015) and NFRs (001-004) covered across 14 pieces. FR-009 is
    reserved — the spec-preresearch piece adds it to the PRD at merge. FR-008 (scoping spike
    for mid-execution changes) was added in PRD v2 and folded into the spike-agent piece
    alongside FR-005 — both share the agents/spike.md primitive. FR-008 amends NN-P-002.
    NFR-003 (backward-compat, additive) is borne by research-unify and sonnet-coord and
    listed in their prd_sections for traceability. The old exec-loop framing was retired
    after the 2026-06-06 re-evaluation (see git history of this note for detail).

    PRD v3 (2026-06-09 deep-dive audit) added FR-010..FR-015 and six pieces: metrics,
    exec-guardrails, gate-scaling, pipeline-e2e, artifact-budgets, flywheel-refresh.
    Evidence for each lives in prd.md ## Research Basis ([R1]..[R14]); companion design doc
    docs/autonomous-loops-and-spec-flow.md.

    ORDER OF OPERATIONS (v3, audit-derived — dependencies encode the hard edges; this note
    records the intended sequencing rationale):
      1. flywheel-repo — in flight (worktree at Final Review); merge first. Everything
         flywheel- and metrics-shaped builds on its registry + Step 6c/4.5 wiring.
      2. pipeline-e2e — land EARLY as regression insurance before any further surgery on
         execute/SKILL.md (exec-guardrails, gate-scaling both modify it). No dependencies.
      3. artifact-budgets — land before/alongside spec-preresearch execution: it registers
         the deliberation.md size budget that binds Spec 2.0's plan. No dependencies.
      4. spec-preresearch — already specced; plan + execute next. Its qa-plan gate inherits
         the artifact-budgets constraint (FR-014 AC) once that piece merges; if sequenced
         earlier, the plan must self-impose a deliberation.md budget and SC-001
         before/after measurement (see prd.md FR-014/FR-010).
      5. metrics — immediately after flywheel-repo merges (wires its `metric` source).
         Establishes the SC baselines that gate-scaling's SC-008 claim is measured against.
         Highest-priority NEW piece: measurement precedes optimization.
      6. exec-guardrails — parallel-safe with metrics (different surface: Step 3/4 + budget
         enforcement vs recording). Precondition for any unattended/loop-driven execute.
      7. gate-scaling — after metrics (needs the interaction baseline); the
         oversight-reduction centerpiece.
      8. flywheel-refresh — after flywheel-repo has real entries; lifecycle on live data.
      9. flywheel-global — LAST: after flywheel-refresh + metrics, and only once the repo
         flywheel has produced at least one genuine threshold-triggered hardening.
    Parallelization: 2+3 are independent of everything; 5+6 can run concurrently; 4 can
    overlap 2/3/5/6 (different skills touched: spec/prd/charter vs execute).
