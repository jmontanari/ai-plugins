  percentage: 100
  notes: |
    All FRs (001-008) and NFRs (001-004) covered across 7 pieces. FR-008 (scoping spike for
    mid-execution changes) was added in PRD v2 and folded into the spike-agent piece alongside
    FR-005 — both share the agents/spike.md primitive (FR-005 resolves planned [SPIKE] unknowns;
    FR-008 scopes mid-execution changes before plan amendment). FR-008 amends NN-P-002. NFR-003 (backward-compat,
    additive) is borne by research-unify (the [RESEARCH-ABSENT] fallback) and sonnet-coord
    (the opt-out .spec-flow.yaml model policy / configurable circuit-breaker), and is listed
    in their prd_sections for traceability. The old exec-loop framing (autonomous execute
    loop, self-resolve + decisions.md, Sonnet context budget) was retired after a 2026-06-06
    re-evaluation: FR-004/005 of the prior PRD were ~90% already shipped (auto phase-loop,
    auto Final Review + fix loop, manifest→merged, journal resume), the Sonnet-context premise
    was superseded by the Opus-1M driver, and execute self-resolve conflicted with the
    synchronous-discovery doctrine. The genuinely-new surface is plan density (plan-concrete,
    test-data-up), model placement + file-state (sonnet-coord, spike-agent), and cross-install
    learning (flywheel-repo, flywheel-global). Pieces split to keep each ≤7 ACs per the qa-prd
    granularity rule: the coordinator into sonnet-coord + spike-agent, and the flywheel into
    flywheel-repo + flywheel-global (the latter splits the two distinct registry subsystems
    per qa-prd iteration-1 must-fix #1).
