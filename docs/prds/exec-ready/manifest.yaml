pieces:
  - name: research-artifact
    slug: research-artifact
    description: |
      New research sub-agent (agents/researcher.md) that runs in a fresh context before
      spec brainstorm, reads relevant codebase files, charter rules, backlog items, and
      past learnings, then returns a schema-bounded brief (≤2K tokens) to main context.
      Output is committed as research.md at docs/prds/<prd>/specs/<piece>/research.md
      before the first spec Q&A question. Covers artifact production only (FR-001, NFR-001,
      NFR-002). New template: templates/research.md. Spec skill gains the research dispatch
      call and the [RESEARCH-UNAVAILABLE] fallback path.
    prd_sections: [FR-001, NFR-001, NFR-002, G-1]
    dependencies: []
    status: open

  - name: research-consume
    slug: research-consume
    description: |
      Spec and plan skill updates to consume research.md. Spec skill reads research.md at
      brainstorm start and presents proposed answers from research findings before asking
      each question ("Based on [finding], I propose [answer] — confirm or correct?"). Plan
      skill checks for research.md at plan start; if present and non-empty, emits
      [RESEARCH-CONSUMED: N files] and skips file-discovery sweep; if absent, emits
      [RESEARCH-ABSENT: running full exploration] and runs sweep normally. Staleness check
      (>7 days): plan emits notice and supplements with current exploration. Covers FR-002,
      FR-003.
    prd_sections: [FR-002, FR-003, G-1]
    dependencies: [research-artifact]
    status: open

  - name: exec-self-resolve
    slug: exec-self-resolve
    description: |
      Execute ambiguity self-resolution. When the implementer encounters a case not covered
      by the spec, it dispatches a mini research step (reads spec, charter, research.md,
      related existing code) before escalating. Documents autonomous decisions in decisions.md
      (new artifact at docs/prds/<prd>/specs/<piece>/decisions.md) with: what was ambiguous,
      what was found, what was decided, why. Escalates only for direct spec contradictions or
      genuinely undecidable cases after research. Final Review gate gains a decisions.md review
      prompt before merge (NFR-004). Covers FR-004, NFR-004, NN-P-002, G-2.
    prd_sections: [FR-004, NFR-004, G-2]
    dependencies: [research-artifact]
    status: open

  - name: ctx-discipline
    slug: ctx-discipline
    description: |
      Sonnet-optimized orchestrator context discipline. Adds reference/context-discipline.md
      documenting budget rules and context-safe tools. Skills updated to emit [CTX-LOAD:
      <filename> <kb>] for each file read into main context; files >10KB trigger [CTX-OVERSIZED]
      and route to a summarizing sub-agent. All sub-agent return values schema-bounded to ≤2K
      tokens. Configurable token budget via .spec-flow.yaml key `ctx_budget` (default 80K).
      [CONTEXT-BUDGET-WARNING] emitted when main context approaches the limit. Covers FR-006,
      NFR-003 (backward compat: new behavior additive, existing invocations unchanged), G-5.
    prd_sections: [FR-006, NFR-003, G-5]
    dependencies: [exec-self-resolve]
    status: open

  - name: exec-loop
    slug: exec-loop
    description: |
      Execute completion loop with objective stop criteria. Drives a single piece's
      implementation through all phases to DONE without stopping for operator input.
      Stop criteria: all plan phases complete AND oracle green AND Final Review zero
      must-fix findings. Explicit DONE/BLOCKED termination states — BLOCKED only on:
      FR-004 escalation (genuine spec contradiction), circuit-breaker hit (3 Final Review
      iterations), or unrecoverable tool error. Loop state persisted to journal; interrupted
      sessions resume from last clean phase checkpoint. On DONE: manifest status updated
      to merged, loop-run.log written. On BLOCKED: loop-run.log records blocking reason
      and last clean checkpoint. Also produces docs/exec-loop/loop-driver.md — a
      copy-paste /loop prompt for running execute on successive planned pieces (docs
      artifact, not a new skill). Covers FR-005, G-3.
    prd_sections: [FR-005, G-3]
    dependencies: [exec-self-resolve, ctx-discipline]
    status: open

  - name: learn-flywheel
    slug: learn-flywheel
    description: |
      Learning flywheel. Post-execute step added to execute's reflection phase. Scans all
      learnings.md files for the current PRD, clusters semantically similar findings, proposes
      charter amendments (draft NN-C entries) for project-level findings appearing in ≥2 pieces,
      and proposes spec-flow shared manifest pieces for pipeline process gaps. Operator reviews
      all proposals in one batched session. Approved charter amendments committed to
      .claude/skills/charter-non-negotiables/SKILL.md. Approved spec-flow pieces appended to
      docs/prds/shared/manifest.yaml. Rejected proposals recorded in exec-loop backlog.md.
      Non-blocking: execute result unaffected if step fails. Configurable threshold via
      .spec-flow.yaml key `flywheel_threshold` (default 2). Covers FR-007, NN-P-004, G-4.
    prd_sections: [FR-007, G-4]
    dependencies: [exec-loop]
    status: open

