pieces:
  - name: research-unify
    slug: research-unify
    description: |
      One deep codebase-gathering pass runs once, before spec brainstorm, in an isolated
      Opus sub-agent, and writes a durable research.md to the piece spec directory. Spec
      consumes it for proposed answers during brainstorm; plan consumes the same artifact
      as primary context and stops re-deriving introspection.md (emits [RESEARCH-CONSUMED]
      / [RESEARCH-ABSENT]). Folds in the L-10 convention scan and the plan-stage
      introspection so there is exactly one gathering pass, not three. [RESEARCH-UNAVAILABLE]
      fallback preserves current behavior. Return to main thread is ≤2K tokens; on-disk file
      may be richer. Covers FR-001, NFR-001.
    prd_sections: [FR-001, NFR-001, NFR-003, G-1]
    dependencies: []
    status: merged

  - name: plan-concrete
    slug: plan-concrete
    description: |
      Plan concreteness contract — the core piece. Each plan phase specifies exact file,
      exact location/anchor, and exact content/signatures (not "implement X"). Genuine
      unknowns become explicit [SPIKE: <unknown>] markers. Doc-as-code phases require exact
      prose plus a branch-enumeration AC per conditional (codifies the pi-011 finding).
      qa-plan gains a concreteness floor: vague deliverables, unmarked unknowns, and missing
      branch ACs are must-fix. Goal: a passing plan yields zero unmarked execute-time
      discoveries. Covers FR-002.
    prd_sections: [FR-002, G-1, G-2]
    dependencies: [research-unify]
    status: merged

  - name: test-data-up
    slug: test-data-up
    description: |
      Test data defined upfront for TDD phases. Each TDD phase in the plan carries a
      `Test Data` block (concrete inputs + expected outcomes/oracle). tdd-red transcribes
      the oracle from the plan instead of designing it live; it invents no inputs/outcomes
      absent from the plan. Unpredictable outcomes use a [SPIKE] marker instead of fabricated
      data. qa-plan flags a TDD phase with neither a Test Data block nor a [SPIKE] marker.
      Covers FR-003.
    prd_sections: [FR-003, G-1]
    dependencies: [plan-concrete]
    status: merged

  - name: sonnet-coord
    slug: sonnet-coord
    description: |
      Sonnet-driven coordinator on file-based state. Execute assigns Sonnet to coordinator +
      implementer by default. The existing 5.2.1 pre-flight already warns when the active
      model is NOT Sonnet (bbcf58c); this piece generalizes that single execute-start prompt
      into a per-stage model policy that reports the assignment and flags only exceptions
      (spike path / operator override). All resume-critical state is on disk so a fresh
      context re-derives position and resumes from the last clean checkpoint
      ([STATE-INCOMPLETE] escalation if a field is missing). Final Review circuit-breaker
      becomes configurable via .spec-flow.yaml (raised default for doc-as-code; fixes the
      pi-011 hard-3 defect). Corrects the root/.claude-plugin plugin.json version skew when
      first touched. Covers FR-004, NFR-002, NFR-003, NFR-004.
    prd_sections: [FR-004, NFR-002, NFR-003, NFR-004, G-3, G-4]
    dependencies: [plan-concrete]
    status: merged

  - name: spike-agent
    slug: spike-agent
    description: |
      New Opus spike agent (agents/spike.md) + execute wiring, serving two roles on one shared
      agent. ROLE 1 (FR-005): a [SPIKE] phase dispatches the spike agent on Opus in an isolated
      context; it resolves the genuine unknown and records a structured resolution to a durable
      artifact (consumable as FR-003 test data, so the same unknown is not spiked twice). A
      non-[SPIKE] phase the implementer cannot complete on Sonnet halts and routes to plan
      amendment (Step 6c) — never a silent Opus upgrade. Operator override forces Opus for a
      named piece/phase at invocation. ROLE 2 (FR-008): any mid-execution scope change — agent-
      discovered found-work at Step 6c OR an operator-initiated change ("add/change/do X") during
      execute — enters Step 6c triage under one uniform regime; above the size/complexity
      threshold (the 50% diff-ratio gate) the same spike agent scopes the change first and writes
      a scoping artifact that plan-amend consumes, below it the change amends the plan directly.
      The resulting amendment phases are queued onto the plan/task list at a dependency-correct
      position and do not preempt in-progress work unless the operator force-stops. Amends
      NN-P-002. Spike that cannot resolve/scope returns BLOCKED with findings; execute escalates
      (no fabricated resolution, no mid-stream patch). Covers FR-005, FR-008.
    prd_sections: [FR-005, FR-008, G-2, G-3]
    dependencies: [plan-concrete, sonnet-coord]
    status: merged

  - name: spec-preresearch
    slug: spec-preresearch
    description: |
      Investigation-First Design Protocol (Spec 2.0), two tiers, one piece. TIER 1: a 5-phase
      multi-agent deliberation protocol runs before the first user question in spec/prd/small-change/
      charter — coordinator (read all + web research) → parallel per-decision-unit-cluster viability
      agents (all paths incl. reuse/extend-existing) → synthesis → parallel single-model multi-lens
      adversarial board (architecture/scope/user-intent/backward-compat/risk; NOT multi-model, per
      NN-P-005) → convergence writing deliberation.md. Questions restricted to VOQ-tagged validated
      open questions (artifact-verifiable grounding). Depth policy full/lite/off (.spec-flow.yaml).
      Plan consumes the recommendation ([DELIBERATION-CONSUMED/ABSENT]). TIER 2: an answer-validation
      loop auto-fires a lite scoped deliberation-validate pass when an operator free-form answer
      introduces an assertion outside the evaluated path-set — verdict CONFIRM/FLAG-HARD(NN violation,
      no override)/FLAG-SOFT(override w/ rationale); validation rounds append to deliberation.md; makes
      grounding bidirectional; reuses spike-agent scope-mode. Plus an Opus pre-flight (inverse of
      execute's Sonnet check) recommending Opus for spec/prd/plan/charter. Adds FR-009 (A–N) to the
      exec-ready PRD and appends FR-009 to NN-P-005 Scope. 14 FRs, 25 ACs. Deps: research-unify.
    prd_sections: [FR-009]
    dependencies: [research-unify]
    status: merged
    merged_at: 2026-06-10

  - name: flywheel-repo
    slug: flywheel-repo
    description: |
      Repo-level self-hardening flywheel. Recurring patterns become countable against a
      durable stable-ID registry at docs/patterns.yaml, correlating charter/project/PRD
      patterns across PRDs within the repo. On recording, the flywheel proposes a pattern-ID
      match (or "new"); operator confirms classification + scope at Step 6c (no silent write).
      Count = dated occurrences (provenance: piece, date, source). At threshold (default 2,
      configurable in .spec-flow.yaml) a batched hardening proposal routes to its repo home
      (charter amendment / local QA hardening / PRD work). Rejections recorded with rationale,
      not re-proposed. Non-blocking; [FLYWHEEL-DEGRADED: repo registry unavailable] if
      docs/patterns.yaml is unwritable. Establishes the registry + match + count mechanics
      reused by flywheel-global. Covers FR-006.
    prd_sections: [FR-006, G-5]
    dependencies: [sonnet-coord, spike-agent]
    status: merged
    merged_at: 2026-06-09

  - name: flywheel-global
    slug: flywheel-global
    description: |
      Plugin-global cross-install flywheel. Plugin-level patterns (spec-flow pipeline/agent/QA
      defects) are recorded to a machine-global registry under ~/ (proposed
      ~/.claude/spec-flow/patterns.yaml; path confirmed at spec) that survives plugin updates
      and is read/written by any repo's flywheel run on the machine — so a defect appearing
      once per repo correlates across all repos on the machine. Reuses the stable-ID + match +
      count mechanics from flywheel-repo; each occurrence carries the originating repo;
      operator confirms scope=plugin before write. At threshold, the batched proposal is to
      create a spec-flow self-improvement piece in the plugin home repo. [FLYWHEEL-DEGRADED:
      plugin registry unavailable] if unwritable (repo-level recording continues; execute not
      blocked). Cross-machine correlation is an explicit non-goal (no shared remote backend).
      Covers FR-007. ORDERING (2026-06-09 audit): deliberately sequenced last — depends on
      flywheel-refresh (lifecycle mechanics must exist before a second registry is built on
      them) and metrics (cross-install correlation should consume measured signal); start
      only after the repo flywheel has produced at least one real threshold-triggered
      hardening on live pieces.
    prd_sections: [FR-007, G-5]
    dependencies: [flywheel-repo, flywheel-refresh, metrics]
    status: open

  - name: metrics
    slug: metrics
    description: |
      Pipeline instrumentation — per-piece metrics artifact (proposed metrics.yaml in the
      piece spec directory; location/schema confirmed at spec time). Spec records Q&A rounds;
      execute records Step 6c discoveries (spike-attributed vs unmarked), escalations,
      amendments, QA iterations, dispatches by model tier, resume outcomes; Final Review
      records iterations + must-fix counts. /spec-flow:status renders SC-001..SC-006 per PRD
      from disk (SC-007). Wires the flywheel's reserved `metric` occurrence source
      (flywheel-repo ADR-3) — pattern occurrences may cite measured trends, operator-confirmed
      per NN-P-004. [METRICS-DEGRADED] on unwritable artifact; [METRICS-ABSENT] rendering for
      pre-instrumentation pieces (NN-C-003). Covers FR-010.
      WHY (audit 2026-06-09): all six SCs currently "measurement pending"; a flywheel without
      a programmatic evaluator is the documented failure mode of self-improvement loops
      (PRD Research Basis R4, R6). Highest-priority new piece — baselines must exist before
      gate-scaling claims any oversight reduction.
      SPEC-TIME INPUTS (v4, telemetry research R21): token capture is feasible bash-only via
      a layered design — primary: the coordinator records totalTokens/agentType/duration from
      each Agent dispatch result at stage boundaries; reconciliation: piece-end POSIX parse of
      the session + subagents/*.jsonl transcripts (per-message usage, unredacted plugin
      attribution). Report tokens by model+agent; dollars only as a flagged estimate (pricing
      tables drift). Treat transcript schema as best-effort: probe fields, emit null on miss.
      OTel documented as optional operator add-on only (collector = runtime dep; third-party
      plugin names redacted). Copilot CLI host: degrade to wall-clock + dispatch counts +
      tool/file stats, token fields marked unavailable. ALSO record per-reviewer finding IDs +
      operator accept/reject at Final Review — this enables the FR-016/FR-017 verdict-overlap
      and leave-one-out ablation, and surfaces rubber-stamp signals (fast approvals, zero
      notes).
    prd_sections: [FR-010, SC-007, G-5, G-6]
    dependencies: [flywheel-repo]
    status: merged

  - name: exec-guardrails
    slug: exec-guardrails
    description: |
      Execute integrity guardrails. (1) Test immutability: upgrades tdd-red's SHA-256 manifest
      (pi-020 anti-cheat anchoring) from detect-later to reject-mechanically — a Build-step
      diff touching any Red-manifest file is rejected pre-commit and the implementer
      re-dispatched with violating paths named; no warn-only path. Phase exit re-verifies
      hashes; Implement-track phases that legitimately author tests declare those paths in
      the plan (qa-plan verifies). Repeated rejections route to Step 6c as plan-incompleteness,
      never an exemption. (2) Amendment budget becomes a hard cap (.spec-flow.yaml,
      documented default): reaching it halts execute with an operator escalation — no
      soft-checkpoint continuation. Covers FR-011.
      WHY (audit 2026-06-09): every major coding-agent model family has been caught deleting/
      modifying tests or hardcoding inputs (R1, R2); the proven mitigation is tests-as-
      immutable-inputs, and the 80%-reliability horizon (~1h, R3) demands hard stops, not
      soft checkpoints, for unattended runs. Precondition for safe loop-driven execute.
    prd_sections: [FR-011, SC-002, G-2, G-6]
    dependencies: []
    status: merged
    merged_at: 2026-06-10

  - name: gate-scaling
    slug: gate-scaling
    description: |
      Verifiability-scaled sign-off gates + review-cost controls. Every AC tagged at spec time
      as machine-checkable (named check) or judgment-required (named judgment); untagged ACs
      are qa-spec must-fix. Spec/plan/Final-Review gates render an evidence digest and offer a
      single summary-confirm keystroke ONLY when QA is clean, zero surviving markers, and all
      machine-checkable ACs have attached evidence — otherwise today's full gate runs
      unchanged. NN-P-001 fully preserved: a keystroke is always required; nothing
      auto-advances. Plus two review-cost controls: review_board_variant: doc-as-code
      (substitute blind-reviewer slot with a second edge-case reviewer — codifies pi-011
      retro: blind 0/6, edge-case 6/6 must-fix detection) and a single-Opus triage pre-filter
      on Final Review fix iterations (full board re-dispatches only for contested/new
      findings). Tag ratios flow into the metrics artifact. Covers FR-012.
      WHY (audit 2026-06-09): gate-hardness ladder + reviewer-zeal warning (R5); machine-
      verifiable checks as the "external source of truth" enabling reduced supervision (R13);
      gates must keep consequence (R11) while cost scales. Depends on metrics: the SC-008
      baseline (operator interactions per clean piece) must be measured before this ships.
    prd_sections: [FR-012, SC-008, G-6]
    dependencies: [metrics]
    status: merged
    merged_at: 2026-06-11

  - name: pipeline-e2e
    slug: pipeline-e2e
    description: |
      End-to-end smoke test for the pipeline itself — peer to the coherence linter. Committed
      fixture project + scripted scenario driving a minimal piece (≥1 TDD phase, ≥1 Implement
      phase); asserts artifact existence/ordering (research.md before first brainstorm commit,
      Test Data blocks, journal, discovery-log rows, metrics artifact), required dispatch
      sequence (tdd-red → qa-tdd-red → implementer → verify → QA gate → board), and manifest
      status transitions. Explicit cases for the two never-exercised round-trips: spike
      [SPIKE]-resolution → test-data consumption, and the [TEST-DATA-ABSENT] fallback.
      SKIPPED-per-capability reporting, never false green. CI wiring may land with
      pi-022-vsync-ci. Covers FR-013.
      WHY (audit 2026-06-09): only the linter has tests today; superpowers' e2e suite for its
      own framework is the proven pattern (R7). Sequenced EARLY — regression insurance should
      exist before exec-guardrails and gate-scaling perform surgery on execute/SKILL.md
      (1,986 lines of orchestration prose).
    prd_sections: [FR-013, G-1]
    dependencies: []
    status: merged
    merged_at: 2026-06-10

  - name: artifact-budgets
    slug: artifact-budgets
    description: |
      Artifact size budgets — the inverse of the FR-002 concreteness floor. Reference doc
      defines per-class budgets (spec.md, plan.md per-phase + total, research.md,
      deliberation.md, learnings.md) in lines + approximate tokens, with .spec-flow.yaml
      overrides; defaults derived from the size distribution of the 5 merged exec-ready
      pieces. qa-spec/qa-plan flag overage as must-fix with split/condense guidance;
      irreducible overage routes to piece-splitting (qa-prd ≤7-AC rule), not waivers. Budget
      compliance recorded in the metrics artifact. BINDS spec-preresearch: its deliberation.md
      budget is registered here, before that piece's plan is authored, and is verified at its
      qa-plan gate. Covers FR-014.
      WHY (audit 2026-06-09): artifact bloat is the most common way spec pipelines die —
      spec-kit's 2,577 lines of faux-context markdown per ~700 lines of code (R8); context
      rot is measurable (R10). Land before or alongside spec-preresearch execution so Spec
      2.0's investigation artifact starts bounded.
    prd_sections: [FR-014, SC-008, G-1, G-6]
    dependencies: []
    status: merged

  - name: flywheel-refresh
    slug: flywheel-refresh
    description: |
      Flywheel pattern lifecycle — outcome tracking, expiry, refresh. Pattern schema gains
      state (active/hardened/archived), last_seen, and hardening outcome (spike artifact ref +
      landing site); registries without the fields read as active (NN-C-003). Applying a
      hardening transitions the pattern to hardened; a post-hardening confirmed occurrence
      re-opens it active with an ineffective-hardening flag at the next batched review — the
      check that the fix actually worked. Operator-gated refresh pass proposes archival for
      stale patterns (configurable window) and clean hardened patterns; nothing archives
      silently (NN-P-004); archived entries stay in-file for audit and leave the
      match-proposal candidate set. [FLYWHEEL-DEGRADED: lifecycle unavailable] on malformed
      registry. Covers FR-015.
      WHY (audit 2026-06-09): capture without expiry rots — compound-engineering pairs
      compound with refresh (R9); retained items must be re-verified in the loop (R4, R14).
      Gates flywheel-global: lifecycle mechanics must exist before a second registry is
      built on them.
    prd_sections: [FR-015, SC-003, SC-005, G-5]
    dependencies: [flywheel-repo]
    status: merged

  - name: gate-evals
    slug: gate-evals
    description: |
      Gate-efficacy evals + cheater track. Committed fixture corpus (~60-80) across three
      gate classes: defective + known-clean specs/plans (qa-spec/qa-plan), planted-defect +
      clean phase diffs (per-phase QA), and whole-piece fixtures with one defect mapped to
      the board seat that should own it (per-reviewer recall). Per-gate metrics: catch rate,
      clean-fixture flag rate (FP control), verdict-flip rate over 3 runs, severity accuracy,
      per-seat unique-catch. QA agent prompts/rubrics version-frozen — any edit triggers a
      gold-set re-run before release. Cheater track red-teams the FR-011 guardrails
      (SHADE-Arena pattern): >=10 scripted cheat scenarios (edit assertions, skip failing
      tests, hardcode outputs incl. except-handlers, stub the function under test, weaken
      tolerances, AC-done-with-no-diff) + >=5 legitimate test-refactor fixtures the gate must
      allow; sub-100% detection = guardrail bug + permanent regression; cheat set refreshes
      on executor model change. Escaped defects feed back as fixtures; saturated fixtures
      retire to a regression tier. SKIPPED-per-capability, never false green. Covers FR-017.
      WHY (v4 research): judges flip on perturbations and degrade up to 27.9% from benign
      rubric edits (R17); uncalibrated reviewers span 6-82% catch rates (R19); monitors top
      out at AUC 0.87 so gaps must be red-teamed (R18). This is the calibration prerequisite
      for every FR-016 board cut and any future seat model-downgrade.
    prd_sections: [FR-017, SC-009, G-6]
    dependencies: [pipeline-e2e, metrics]
    status: merged
    merged_at: 2026-06-12

  - name: pipeline-economics
    slug: pipeline-economics
    description: |
      Pipeline economics — cost cuts with equal-or-stronger assurance, never gate removal.
      (a) TDD-lean: qa-tdd-red becomes a deterministic Red-conformance check against the
      phase's Test Data block (LLM dispatch only for [SPIKE] fallback or detected deviation;
      [CONFORMANCE-FALLBACK] on parse failure — never silent skip); combined Red+Build single
      dispatch once exec-guardrails' hash gate is the integrity wall (orchestrator verifies
      the manifest at phase exit; verify/QA stay separate contexts; split track remains
      available); direct-verify (run the named commands) for phases whose ACs are all
      machine-checkable. (b) Conditional board slots over a documented always-on core
      (security <-> input/auth/crypto/scripts; integration <-> boundary changes; ground-truth
      <-> computational components); ambiguous signal errs toward inclusion; every seat
      removal/downgrade cites gate-evals catch-rate + verdict-overlap/leave-one-out ablation.
      (c) Deliberation depth defaults to lite except documented new-surface criteria; depth
      decision + dispatch delta recorded in metrics. Expected: TDD phase ~6 -> 2-3 dispatches;
      2-4 fewer Opus board seats on most pieces; measured via SC-005. Covers FR-016.
      WHY (v4 research): 8-9 same-model seats are past the diminishing-returns knee
      (+14.9pp -> +11.2pp by reviewer 4, R16); same-family correlated blind spots are
      structural (R15); the oracle moved into the plan (FR-003) so Red is transcription and
      the expensive anti-theater ritual can become deterministic. Deliberately sequenced
      AFTER gate-evals (no cut without catch-rate evidence) AND after discovery-triage and
      outcome-acs (2026-06-12 re-prioritization): discoveries during pipeline-economics
      execution route through structured triage, not freeform Opus; new pieces produced here
      carry outcome ACs by default. The $12.3k/2mo behavior-gate gap is the higher-return
      fix; construction-gate trimming lands after the larger inefficiency is addressed.
      NOTE (PRD v6): part (a) is "Road B" — keep TDD semantics + hash-lock, collapse the
      dispatches. The implement-oracle piece (FR-021) is the alternative "Road A" — abandon the
      hash-lock and go code-first with a validated tests-after. They are ALTERNATIVES (operator
      picks one road per piece), not additive; Road A is READY now (gate-evals-independent),
      Road B's qa-tdd-red-deterministic + board cuts stay gate-evals-gated.
    prd_sections: [FR-016, SC-005, SC-002, G-3, G-6]
    dependencies: [metrics, exec-guardrails, gate-evals, outcome-acs, discovery-triage]
    status: open

  - name: outcome-acs
    slug: outcome-acs
    description: |
      Outcome & negative-space acceptance criteria — the missing oracle. Behavior-bearing
      specs must state what the running system must and must NOT produce, not only that a
      function returns a value. Two additions: (a) ELICITATION — the FR-009 deliberation
      user-intent lens AND the spec brainstorm gain a mandatory negative-space question
      ("when this runs, what does unacceptable output look like?"); the answer is captured as
      one or more outcome ACs tagged distinctly from mechanism ACs; a behavior-bearing spec
      cannot reach sign-off with zero recorded answers. (b) ENFORCEMENT — qa-spec raises a
      must-fix when a behavior-bearing spec has only mechanism ACs; a piece declared
      non-behavioral (config/glue/docs) is exempt with a recorded one-line rationale (ambiguous
      status defaults to behavior-bearing). Outcome ACs are addressable by ID as the oracle for
      campaign (outcome-campaign) and the ground-truth board seat — referenced, not re-derived.
      Additive/backward-compat (NFR-003): legacy specs without tags are not retro-failed.
      Covers FR-018.
      WHY (2026-06-12 efficiency eval, R22): result-level wrongness ("$0 masquerading as an
      earned result", "large negative windows") passed every construction gate because no
      artifact recorded the unacceptable-output criterion. Foundational — sequenced first;
      the campaign and the ground-truth seat both grade against the oracle it defines.
    prd_sections: [FR-018, SC-010, G-7]
    dependencies: [spec-preresearch]
    status: open

  - name: discovery-triage
    slug: discovery-triage
    description: |
      Standalone discovery-triage skill (spec-flow:triage) — execute's Step 6c synchronous-
      discovery triage extracted into a skill invocable from ANY session, not only inside a
      running execute loop. Given a discovery (agent-found or operator-stated) it classifies to
      exactly one disposition (small-change / plan-amend / new-piece / note-on-scheduled /
      explicit-defer-with-rationale), dispatches the FR-005 spike agent in SCOPE MODE as a
      bounded isolated dispatch when the change needs design (never main-window Opus thinking),
      and writes a recorded manifest/backlog entry with provenance. Preserves NN-P-002 (no
      silent mid-stream change) and NN-P-004 (no silent defer). HONORS NN-P-006: when a
      discovery is bug-classified and routed to a fix (small-change / plan-amend / new piece),
      that fix carries the red-first reproduce->fail->fix->pass obligation out of band — a
      triage-surfaced bug is not patched-and-moved-on. Execute keeps its inline Step
      6c unchanged (additive extraction); both share one documented triage contract. Reachable
      from intake routing (an "investigation/discovery" classification points here). Spike
      scope-mode BLOCKED -> recorded open needs-scoping item with the blocker, never a
      fabricated disposition. Covers FR-019.
      WHY (2026-06-12 eval, R22): ~$12.3k/2mo June Opus was deviation + freeform validation,
      much of it the operator hand-rolling Step 6c-style triage in a 180k-context main window
      because the machinery was execute-only. Sequenced after spike-agent (scope mode) and
      before outcome-campaign (which routes every finding through this skill).
    prd_sections: [FR-019, SC-011, G-7]
    dependencies: [spike-agent]
    status: open

  - name: outcome-campaign
    slug: outcome-campaign
    description: |
      Results-campaign gate (spec-flow:campaign) — a new gate CLASS, sibling to the Final
      Review board: review-board points adversarial lenses at a DIFF; campaign points them at a
      RUNNING SYSTEM's outputs. Per-piece gates structurally cannot see whole-platform seam
      behavior or result-level degeneracy, so those defects today surface only in freeform Opus
      validation (~$12.3k/2mo June uncovered channel per 2026-06-12 eval). Invoked out of band
      like review-board, it: (1) loads in-scope FR-018 outcome ACs + declared product
      money/safety rules as the ORACLE; (2) runs the system (pilot/backtest/e2e) from the main
      window on SONNET; (3) dispatches OPUS adversarial lenses as bounded isolated agents
      grading real output against the oracle — three always-on lenses: GROUND-TRUTH
      (degeneracy/dead-knob: does any output column report a forced value while appearing
      earned?), SEAM (cross-piece integration: do pieces work correctly TOGETHER, not just in
      isolation — the failure class no per-piece gate sees), EDGE-CASE (boundary/regime behavior
      at the envelope); (4) routes every finding synchronously through spec-flow:triage (FR-019);
      (5) records findings with source=campaign into the FR-010 metrics artifact and the
      FR-006/FR-015 flywheel. Seam analysis is the primary motivation: individual piece
      construction gates are healthy; the gap is whole-platform wiring and tuning across pieces,
      currently discovered only by expensive freeform operator-in-main-window sessions.
      Honors NN-P-005 (system on Sonnet, judgment on Opus), NN-P-002 (findings route through
      triage, not mid-stream patches), NN-P-004 (operator-gated writes). Seat activation
      conditional per FR-016(b); omissions reported, never silent. Changes no version-bearing
      file by itself. SKIPPED-per-capability when the system can't be run. HONORS NN-P-006:
      a campaign result/seam finding that becomes a fix is red-first (reproduce the bad output
      with a failing test, see it fail, fix, see it pass) — never a patch-and-move-on on a
      finding the campaign surfaced. Covers FR-020.
      WHY (2026-06-12 eval, R22): root-cause decomposition — (1) results-level wrongness
      invisible to diff gates, (2) whole-platform seam/tuning gaps no per-piece gate addresses,
      (3) missing outcome ACs so no oracle exists for "wrong" output. All three feed the same
      expensive venue. Sequenced LAST of the three: needs outcome-acs (oracle) +
      discovery-triage (routing) + metrics (source=campaign recording) + flywheel-repo
      (occurrences).
    prd_sections: [FR-020, SC-010, SC-005, G-7]
    dependencies: [outcome-acs, discovery-triage, metrics, flywheel-repo]
    status: open

  - name: implement-oracle
    slug: implement-oracle
    description: |
      Implement-track oracle (Road A) — make tdd:false a SUPPORTED EFFICIENT DEFAULT for
      behavior-bearing pieces, not a silent integrity downgrade. The 2026-06-12 research pass
      (docs/research/tdd-first-vs-test-after-for-ai-agents.md) established that test-first
      ORDERING has no measured result-quality edge over test-after; the only separable value of
      the red-first ritual is an oracle specified INDEPENDENTLY of the implementation — and
      tests-after captures that value equally IF the after-written tests are validated against a
      pre-stated expected outcome instead of against the code just written. This piece wires
      exactly that: (1) a behavior-bearing Implement-track phase carries the same expected-outcome
      block the FR-003 Test Data contract gives TDD phases (inputs + expected outputs, authored at
      plan time, independent of the implementation); qa-plan flags a behavior-bearing Implement
      phase with neither the block nor a [SPIKE] (mirrors FR-003). (2) The [Write-Tests] step
      transcribes those expected values, inventing none absent from the plan. (3) qa-phase raises
      a must-fix when the authored tests assert the code's ACTUAL output rather than the plan's
      PRE-STATED output (the "tests codify the code" blind spot — the one real weakness of
      tests-after). This closes that blind spot WITHOUT the Red ceremony: no separate tdd-red
      dispatch, no qa-tdd-red review, no SHA hash-lock — dropping ~2 serial dispatches/phase.
      tdd:true stays available, recommended only for adversarial-sensitive pieces wanting the
      immutable pre-commit lock (FR-011); the no-hash-lock tradeoff is documented so the choice is
      explicit. Where the piece also declares outcome ACs (FR-018) the expected-outcome block
      references them by ID (one oracle chain, spec-time → plan-time). Covers FR-021.
      WHY (operator-driven, 2026-06-12): the TDD red ceremony is the operator's standing
      cost/latency pain; the research says the ordering buys no quality and the integrity value is
      capturable by a validated tests-after. This is "Road A" — distinct from FR-016(a)'s "Road B"
      (keep TDD semantics, collapse the dispatches). An operator picks one road per piece; this
      piece makes Road A real. SEQUENCING: depends only on test-data-up (MERGED — the
      expected-outcome block construct it extends), so it is READY now; synergy with outcome-acs
      (FR-018) when both ship (the Implement-phase oracle references the spec's outcome ACs), but
      no hard dependency — Road A can move ahead of the behavior-gate track.
    prd_sections: [FR-021, SC-002, SC-005, G-3, G-6]
    dependencies: [test-data-up]
    status: open

  - name: bugfix-redfirst
    slug: bugfix-redfirst
    description: |
      Bug-fix / regression red-first (NN-P-006 + FR-022) — the one non-substitutable case for
      test-first, carved out as a general spec-flow principle. Any phase or change whose purpose
      is to fix a defect or guard a regression (a test asserting "broken behavior Y no longer
      happens", not "the feature does X") uses the red-first reproduce -> SEE IT FAIL -> fix ->
      see it pass cycle and records the OBSERVED FAILURE (test seen red against the unfixed code)
      as evidence — REGARDLESS of the piece's tdd setting, including a tdd:false Implement piece
      (FR-021) and the small-change / hotfix tracks. The non-substitutable artifact is observing
      the test fail against the actual broken code: a test written AFTER the fix passes against
      fixed code with no evidence it would have caught the original defect (may not exercise the
      buggy path), and the broken state is gone so the regression claim is unverifiable. Scope of
      edits: (1) small-change skill routes bug-signal work (fix/bug/broken/regression/patch) to
      the red-first cycle by default; (2) hotfix track defaults bug work to red-first; (3) plan
      phase classification gains a phase-level bug-fix/regression tag (a feature piece may carry
      one regression-guard phase while other phases use the Implement track); (4) qa-plan/qa-spec
      raise a must-fix when a bug-fix/regression phase proposes tests-after or omits the
      observed-red evidence; (5) FR-021's tdd:false default documents the exclusion. Defect not
      reproducible by a failing test -> [SPIKE] to establish a reproduction or explicit no-repro
      rationale at triage; never an unobserved-red test. Covers FR-022; codifies NN-P-006.
      OUT-OF-BAND REACH: NN-P-006 follows the fix wherever raised — when discovery-triage
      (FR-019) routes a bug-classified discovery to a fix, or an outcome-campaign (FR-020)
      finding becomes a fix, that fix is red-first too. Those pieces HONOR NN-P-006 (noted in
      their descriptions); this piece owns the rule + its small-change/hotfix/qa implementation.
      WHY (operator-driven, 2026-06-12): the bug-fix case is the 100%-valid pushback FOR
      red-first that survives the TDD-vs-test-after research — the ordering-inert finding is
      specific to greenfield-with-known-oracle; a regression's oracle ("Y does not recur") is
      only verifiable by observing the failing state first. Important for the plugin in general,
      especially /small-change and hotfix bug work where the temptation is to patch and move on.
      SEQUENCING: depends on nothing structural (edits existing small-change/hotfix/qa-plan/qa-spec
      surfaces) — READY now, independent of implement-oracle and the v5 track. Pairs with
      implement-oracle as its explicit carve-out; either can ship first (the carve-out language in
      FR-021 is forward-safe if this lands first, and NN-P-006 stands alone if implement-oracle is
      not yet built).
    prd_sections: [FR-022, SC-009, G-6]
    dependencies: []
    status: open

