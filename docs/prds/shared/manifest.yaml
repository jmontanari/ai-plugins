    status: merged
    merged_at: 2026-05-01

  - name: pi-010-discovery
    description: |
      v3.2.0 — Synchronous discovery triage. Eliminates silent backlog deferrals by making the execution that finds new work also fix it. Today the pipeline writes deferred QA findings, "NOT COVERED — deferred" AC matrix rows, and reflection-future-opportunities findings to backlog files at end-of-piece, surfacing them only at the next piece's spec brainstorm. Operators have no signal that prerequisite work is undone until much later. This piece restructures discovery → resolution as a synchronous flow with operator triage at discovery time.

      Operator principle (binding): "the execution that found the work also fixes it." Inline plan amendment is the default response to discovery, not a separate skill. The piece bundles five distinct sub-areas as Phase Groups:

      Capability (user-visible):
        - **`/spec-flow:defer` skill** (sub-area F) — sole supported path for writing to backlog files. Records source piece, source phase, finding text, operator's rationale for non-blocking. After this lands, every other skill's automatic backlog-write code path is removed.

      Orchestrator (no new user-facing surface):
        - **depends_on enforcement at spec/plan time** (sub-area A) — `/spec-flow:spec` and `/spec-flow:plan` gain a precondition check that surfaces unmet `depends_on` to the operator with three triage options (pull-deps-in as Phase 0, fork to manifest piece, proceed with `--ignore-deps`). Recorded as a `## Dependency triage` section in the spec or plan file. Today only `execute` reads `depends_on`.
        - **AC matrix deferred-row rejection at Verify gate** (sub-area B) — verify-agent rejects any `NOT COVERED — deferred to ...` row by default. New required `Reason:` field with three values (`does-not-block-goal | requires-amendment | requires-fork`). Phase-in via `legacy_deferred_rows: true` plan flag for one release cycle, then strict.
        - **Discovery triage + inline plan amendment** (sub-area D, load-bearing) — new step in `skills/execute/SKILL.md` between phase-complete and next-phase-start. Aggregates discoveries from the just-finished phase's QA review and AC matrix gate; on each discovery, prompts operator with amend / fork / defer. The amend path dispatches a new `plan-amend` agent (Sonnet) that emits a unified diff inserting suffix-named phases (`phase_<n>_amend_<k>`) before the next original phase, then the orchestrator commits `amend(plan): <reason>` and resumes. Budget: 2 amendments per piece. qa-plan re-review on diff + neighborhood. Auto-mode default: amend if absorption < 50% of cumulative diff, escalate otherwise. New `.discovery-log.md` artifact per piece records every discovery and its triage outcome. Final-Review-board misses route through the same triage flow (re-opening the piece for amendment phases instead of writing deferred-finding stubs).
        - **Reflection agents emit triage reports** (sub-area E) — `reflection-future-opportunities` and `reflection-process-retro` stop writing directly to backlog files. They emit findings to the orchestrator at Step 4.5; orchestrator dispatches the same triage UX from sub-area D for each finding. Operator's `defer` choice invokes `/spec-flow:defer`. Process-retro `process-improvement` category items batch-confirm at end of piece (cross-PRD learnings get one batched defer prompt rather than per-finding triage).

      Architectural shape: 5 Phase Groups (A, B, C-as-D-prep, D, E+F bundled). Plan-amend agent is a new Sonnet agent under `plugins/spec-flow/agents/plan-amend.md`. Discovery-log artifact is a new per-piece file. All other changes modify existing skill / agent prose plus minor templates.

      Backwards-compatibility: minor bump (NN-C-003: additive + opt-in stricter behavior). The `legacy_deferred_rows: true` flag preserves today's AC matrix behavior for one release. Existing `backlog.md` entries are grandfathered (no one-time triage pass forced); operators may invoke a `--triage-existing-backlog` mode of /spec-flow:defer manually if desired (out of scope for this piece — captured for future).

      Risks called out for spec brainstorm:
        - Amendment loops bounded by per-piece budget (2). Hitting the budget escalates to "scope was wrong; abandon and re-spec."
        - Triage prompt fatigue mitigated by auto-mode defaults and the principle that better specs/plans (which this feature's adoption pressures) produce fewer discoveries.
        - Plan-amend agent's diff+neighborhood scope must include any phase that scopes the same SKILL.md block as an amended phase — inherits the cross-phase content-dependency lesson from pi-009 (Phase B.1 → B.4 collateral damage).
        - Spec amendments (vs plan amendments) handled identically but with stricter budget (1 per piece) and full qa-spec re-dispatch since spec drift has PRD impact.
    prd_sections: [FR-004, NFR-003, NFR-004, NN-P-002]
    dependencies: [pi-009-hardening]
    status: merged

  - name: pi-009-hardening
    description: |
      v3.1.0 — bundles all v3.0.0-reflection-driven follow-up work into one minor release. Single bigger piece by design: ships a coherent v3.1.0 rather than 3+ point releases that each pay the spec/plan/release ceremony cost. Slug renamed from PI-009-v3.1.0-hardening to comply with v3 slug-validator rules ([a-z0-9-]+, ≤20 chars). Spec authored 2026-04-25 in worktree spec/shared-pi-009-hardening; QA cleared after 3 iterations.

      Capability (user-visible):
        - FR-005 branch-design resolution — pick single-branch (current code reality) or three-branch (spec text). Update spec OR SKILL.md and add ACs covering the chosen model.
        - Charter-drift deep scan — extend `/spec-flow:status` with `--include-drift` mode that parses NN/CR citations in each spec and verifies them against current charter bodies (semantic drift, not just timestamp).
        - Worktree-token sweep — add `{{worktree_root}}` template token; replace hard-coded `worktrees/` references across all 17 implementer agent prompts.
        - Migrate-skill environment precondition — formally document "the migrate skill runs in an LLM environment with `yq`/`python3` available" as a precondition; update NFR-004 and clarify NN-C-002 scope. Path 2 (ship an embedded helper script) is deferred — it would need a charter brainstorm before being specced.

      Orchestrator (no user-visible surface change):
        - Sharpen Opus QA skip-predicate — skip only for additive markdown/YAML/config; default to Opus when phase touches shell/branching logic or new skill body.
        - Mid-piece Opus QA pass for ≥6-phase pieces — insert at half-way commit; reviewer reads cumulative diff vs. spec.
        - "Deferred to reflection" finding tracking — orchestrator appends stub to PRD-local backlog at deferral time so reflection agents see them as input.
        - Plan-skill phase-sizing rule — split phases >150 LOC of new behavioral prose into Phase Groups.
        - Plan-skill exit-gate semantics rule — "X ran" cannot downgrade to "X is documented to run later."
        - Default `[Verify]` commands to `python3 -c` for YAML/JSON validation (drop yq/jq dependency in pipeline self-checks).
        - Iter-until-clean QA loop, applied universally — every QA gate (spec, plan, charter, execute per-phase, mid-piece Opus, Final Review fix-up) keeps iterating until the reviewer returns no must-fix findings. Iter-1 is full review; iter-2+ is focused re-review on the diff. Today's `qa_iter2: auto` skip predicate is retired; the 3-iter circuit breaker stays as the escalation guard, not as auto-stop. Codified in a single shared reference doc that all QA-running skills cite.

      Minor bump (NN-C-003: backwards-compatible additions). 11 items, plan likely splits into 2-3 Phase Groups (capability vs. orchestrator vs. plan-skill rules) so per-area QA stays focused. Brainstorm during spec authoring will negotiate FR-005 path-pick and confirm migrate-skill stays on path 1.
    prd_sections: [FR-004, NFR-003, NFR-004]
    dependencies: [PI-008-multi-prd-v3.0.0]
    status: done

