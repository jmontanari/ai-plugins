  - name: PI-007-copilot-coship
    description: |
      Apply a superpowers-style co-ship pattern to the `spec-flow` plugin so GitHub Copilot CLI users can install and invoke it. Delivered as a single-path dual-host co-ship — one `plugins/spec-flow/` tree with plain-`.md` agent files serves both Claude Code and Copilot CLI. Copilot CLI users install via subdirectory syntax (`/plugin install jmontanari/ai-plugins:plugins/spec-flow`) or via the marketplace 2-step flow (`/plugin marketplace add jmontanari/ai-plugins` → `/plugin install spec-flow@shared-plugins`). No mirror branch, no sync scripts, no content translation. Supersedes PI-005 and PI-006 with a strictly simpler architecture. Three smoketests on Copilot CLI v1.0.34 recorded in `docs/specs/PI-007-copilot-coship/learnings.md` — install + `/spec-flow:status` (PASS), `/agents` discovery (PASS), `/agents` listing + frontmatter hygiene (PASS). Fixed a path-duplication bug in `metadata.pluginRoot` during review.
