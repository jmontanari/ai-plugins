      semantic anchor (e.g. confidence ~ 0.5 at 1σ, ~ 0.9 at 2.5σ);
      per-adapter anchor-calibration tests guard the contract.

      Out of scope: NO Signal 3 (LLM `news_sentiment`) wire-up — stays
      a `DoNothingEvidenceSource` stub. NO new evidence sources
      beyond the 7 registered (REGISTERED_SIGNAL_SOURCES is the
      closed set per FR-OS-26). NO threshold/cap tuning of
      EvidenceThresholds (current defaults stay). NO cross-strategy
      sharing of OversightPolicy state. NO weight value changes
      beyond what news-flow-activate already committed.

      Predecessor handoff:
      `docs/prds/prop-firm/specs/unify-runtime-policy/handoff.md`
      (authored 2026-05-25 at the close of news-flow-activate;
      includes per-adapter cost ranking, charter NN-C-011 proposed
      text, run_one_tick Step 8 pseudocode, suggested 8-phase
      structure, and 4 spec-time open questions).

      Recommended next action:
      /spec-flow:spec prop-firm/unify-runtime-policy.
    prd_sections:
      - FR-EVIDENCE-04   # Signal 7 + the broader evidence stack now shared live+backtest
      - FR-OS-26         # REGISTERED_SIGNAL_SOURCES closed set
      - NN-P-005         # evidence stack mandatory on every OracleVerdict
      - NN-P-006         # signal independence (Signal 7 vs Signal 3 deferred)
      - SC-003           # adapter correctness for the full registered set
    internal_phases:
