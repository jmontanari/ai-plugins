  - name: phase-2-6-dukascopy-websocket-live
    slug: phase-2-6
    status: open
    disposition_note: >
      L-2 audit (live-source-parity, 2026-06-06): no sub-minute Dukascopy
      consumer exists in the current stack; phase-11 trades via TopstepX
      SignalR (not Dukascopy WS). This piece remains DEFERRED — activate
      only when a downstream consumer explicitly needs sub-minute Dukascopy
      freshness. See
      docs/prds/prop-firm/specs/live-source-parity/dispositions.md §(i).
    description: >
      Exploration piece — evaluate replacing Phase 2's hot-fetch + batch
      Dukascopy polling path (2-5 min CDN lag) with a WebSocket streaming
      path. Memory reference_upstream_quirks.md documents Dukascopy's
      Akamai/TLS hostility to third-party clients; the stable WebSocket
      path is SWFX-KYC-gated (contradicts feedback_no_kyc_for_spikes.md);
      the reachable-without-KYC freeserv.dukascopy.com surface is
      reverse-engineered and known-brittle (breaks every few months).
      Activated only when a downstream consumer actually needs
      sub-minute Dukascopy freshness — Phase 11 trades via TopstepX
      (real-time SignalR) so the current pipeline has no such consumer.
    prd_sections:
      - FR-ING-02
    internal_phases:
      - "P1 Feasibility spike: which WebSocket surface reachable without KYC; measure stability over 7-day window"
      - "P2 If feasible: subscriber implementation + tick→bar aggregation + dual-mode polling fallback"
      - "P3 Shadow-mode parity validation vs existing CDN polling path"
    exit_criteria: >
      Either (a) produces a subscriber passing 30-day parity vs the
      CDN path within §6.7 tolerance, OR (b) documents why the
      WebSocket path isn't viable and closes the piece.
    activation_condition: >
      A downstream consumer needs sub-minute Dukascopy freshness, OR
      the user schedules exploratory spike work explicitly. Not on
