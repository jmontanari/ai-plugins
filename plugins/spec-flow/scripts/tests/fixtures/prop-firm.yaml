  - name: news-mechanical-signal-7
    slug: news-mech-signal-7
    status: halted
    halt_reason: >
      Phase 0 verdict = HALT (2026-05-25). Mechanical V2Tone↔bar-return
      correlation does not pass the dual-criterion gate. global Pearson
      |r| = 0.009 (≪ 0.10 threshold); max statistically-meaningful cell
      |r| = 0.101 (< 0.15 cell disjunct). CAgg latency criterion PASSED
      (p95 = 0.94ms ≪ 10ms threshold) — TimescaleDB infrastructure works,
      but the mechanical signal itself is too weak to gate trading on its
      own. Verified across a 3-month window (Oct-Dec 2025) AND a 2-year
      window (2024-25, global Pearson -0.0087 — consistent). Per spec
      halt semantics, Phases 1-5 did NOT execute; 0035 CAgg migration was
      reverted; Phase 0 module + verdict artifact remain as a record of
      the measurement. See docs/prds/prop-firm/specs/news-mech-signal-7/
      phase_0_verdict.md for the full artifact. Successor candidates:
      (a) augment with entity-resolved subject filtering (NER-derived
      org/person matches), (b) revisit with prose-substrate path (Alpaca
      News / Polygon — actual headline + body text), (c) integrate as a
      tilt rather than a gate (Signal 7 contributes to evidence stack at
      sub-threshold weight). None of these scoped here — re-evaluate
      after the gating signals (regime, technical) ship and stabilize.
    description: >
      P0+ successor authored 2026-05-23 from
      docs/prds/prop-firm/specs/news-store-rd/exploration_no_prose_path.md.
      Build Signal 7 (mechanical news_flow) using ONLY GDELT structured
      outputs — no LLM, no prose. This is the PRIMARY news trading signal
      under the post-exploration analysis: GDELT's V2Tone[0] directly
      gives a -100..+100 sentiment score per article (no LLM derivation
      needed); V2Tone[3] gives polarity (impact magnitude); Themes give
      macro relevance (FOMC / ECON_FED / ECON_INFLATION / etc.); Persons
      + Organizations give entity-level filtering (Powell / Fed / Treasury);
      Amounts give direct numeric impact magnitude; GCAM gives ~3000
      emotional/topical dimensions.

      Scope: (1) Phase 0 measurement — compute
      corr(mean(V2Tone[0]) for ts in (bar-60m, bar), bar_close - bar_open)
      across MES bars in a post-backfill-fix populated week. If |corr| > 0.1,
      mechanical tone has signal; proceed. If ~0, halt and re-evaluate.
      (2) Same correlation restricted to macro-themed articles only — does
      it strengthen? If yes, theme taxonomy IS the filter; if no, entity-
      level filter required. (3) Author the per-bar mechanical score:
      composite of theme-density × tone-magnitude × polarity × entity-match
      × amount-extracted × article-count amplification — weighting
      learned per regime via the calibration loop. (4) Wire into
      RuleEngine's pre-entry gate (replaces or augments existing news-veto
      flag that's been default-disabled pending the audit). (5) Add unit
      tests + integration tests; honor NN-P-006 (signal independence vs
      Signal 3 which remains a deferred LLM path) + NN-P-007 (live data
      holdout). (6) Bench latency target: per-bar score < 5ms via
      bar_news_context denormalization (depends on news-store-query-perf).

      Out of scope: NO LLM call. NO prose acquisition. NO pgvector
      semantic-search (the prose-substrate path remains deferred per
      exploration_no_prose_path.md). NO provider swap.

      Recommended next action: /spec-flow:spec prop-firm/news-mech-signal-7
      after news-backfill-fix-and-replay's writer fix lands + has been
      replayed for 2020-2026 + has populated the GDELT structured fields
      enumerated above.
    prd_sections:
