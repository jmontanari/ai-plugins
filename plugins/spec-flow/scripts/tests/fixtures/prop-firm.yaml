  # pending L-1 execute. qa-spec CLEAN. status: specced.
  # WAVE L — Live Ingestion Operational (added 2026-06-03; L-1 re-specced 2026-06-05)
  # Goal: take the live ingester from "code-complete but crash-looping" to
  # "running 24/7, monitored, trustworthy, fully utilized" — the operational
  # bridge that unblocks shadow-validation (≥30 days of live data) and feeds
  # phase-11 paper trading. Decomposed from the operator ask "make the live
  # ingestor production-ready + start ingesting + fully plumb all sources +
  # add live-first reactive feeds." Ground-truth at decomposition time:
  #   • ingester container has been crash-looping since 2026-05-19
