  - name: phase-4-6a-indicator-computation
    slug: phase-4-6a
    status: merged
    description: >
      *Replaces original phase-4-6-indicator-library (split into 4-6a + 4-6b on
      2026-05-03 per Option B after 20-thread research pass — see manifest
      changelog 2026-05-03T20:00 + docs/research/2026-05-03-phase-4-6-research-synthesis.md).*

      Pure OHLCV → indicator computation layer + Signal 4 narrative formatter.
      The "dumb" computation half — no time-of-day calibration, no event-day
      flagging, no pattern-cell axes (those live in phase-4-6b). Becomes
      Signal 4 of the evidence stack via decomposed sub-scores in IndicatorContext.

      Indicators in scope: ATR (consolidated from portfolio/wilder_atr.py;
      role = position-sizing normalizer + ATR-percentile context, NOT
      directional evidence), session VWAP + Anchored VWAP at canonical
      anchor points (prior swing high/low, year/month open, FOMC dates),
      Opening Range high/low + Initial Balance (5/15/30/60-min variants),
      Volume Profile / TPO / Value Area (POC, VAH, VAL, single prints,
      HVN, LVN), RSI (divergence-only, NOT OB/OS thresholds — regime
      classifier owns trend state), MACD histogram (acceleration only,
      NOT direction), Bollinger Bands %B (position-within-band only;
      bandwidth dropped as redundant with ATR), pivot points / S-R levels
      (confluence-only role).

      THREE NEW peer-reviewed-backed additions over the original scope
      (research-justified — see docs/research/2026-05-03-signal-4-indicator-evidence.md):
      (a) NYSE $TICK + cumulative $TICK — universal pro-trader consensus,
          91% trend-day ID accuracy, genuine breadth-vs-price independence
          (different inputs from MES bars: NYSE-level breadth aggregate);
      (b) NYSE $ADD (advance-decline line intraday) — exposes cap-weighting
          breadth divergence (S&P dominated by ~5 mega-caps; ADD shows
          whether breadth supports the index move);
      (c) Cumulative Volume Delta (CVD) — strong academic backing for
          absorption/divergence at 5-15min cadence (arxiv 2408.03594 Hawkes
          processes; Quantitative Finance 2023 cross-asset OFI);
      (d) Intraday Momentum (Baltussen r_ROD) — strongest peer-reviewed
          intraday signal in entire research (Gao-Han-Li-Zhou JFE 2018 +
          Baltussen-Da-Lammers-Martens JFE 2021; R² 0.6%-11% (FOMC days);
          Sharpe 0.87-1.73 across 60+ futures contracts; effect
          STRENGTHENED post-2018 due to 0DTE-driven gamma flows).
          Compute at 10:00 ET (early/low-conf) AND 15:30 ET (late/high-conf).

      `IndicatorContext` schema with category-tagged sub-scores
      (`trend / volatility / structure / breadth / flow_imbalance`).
      `signal_category_diversity` field for downstream NN-P-006 awareness
      (phase-7-oversight-policy reads this; if Signal 4's diversity is 1,
      treats Signal 4's effective contribution as half-weight).

      Internal-redundancy guardrail AC: ≥2 non-volatility-derived
      sub-indicators required for non-empty IndicatorContext (ATR + BB-width
      + vol-percentile + 20-bar realized-vol all collapse to one factor in
      stress regimes; spec must require category diversity).

      Narrative formatter extends BaseContextBuilder with
      `build_indicator_narrative()` per NN-C-007 (no raw numerics in
      LLM-bound output).

      OUT OF SCOPE for this piece (route to phase-4-6b or backlog):
      - Time-of-day calibration / event-day flagging → phase-4-6b
      - Order Flow Imbalance (OFI proper) → backlog (signal decays <1s,
        Databento Plus $1,399/mo cost, cadence mismatch with 30-60s veto)
      - Footprint charts / Level-2 depth → deferred infrastructure
      - TRIN as standalone signal → binary extreme-only flag in phase-4-6b
      - VIX-family signals / options gamma standalone → phase-4-6b as
        pattern-cell axes (NN-P-006 protection — they collapse to SPX
        implied-vol surface)
    prd_sections:
      - FR-EVIDENCE-04
    internal_phases:
      - "Phases detailed at plan time. High-level: (1) IndicatorContext + sub-score schemas; (2) ATR + WilderATR consolidation; (3) VWAP + Anchored VWAP; (4) Opening Range + Initial Balance; (5) Volume Profile / POC / VAH / VAL; (6) RSI divergence + MACD histogram + BB %B; (7) Pivot points (confluence-only); (8) NYSE $TICK + cumulative; (9) NYSE $ADD; (10) Cumulative Volume Delta; (11) Intraday Momentum (Baltussen r_ROD) at 10:00 ET + 15:30 ET; (12) narrative formatter (NN-C-007); (13) category-diversity guardrail; (14) integration test producing IndicatorContext for fixture bars."
    exit_criteria: >
      All sub-indicators implemented + tested with hand-computed values;
      Intraday Momentum reproduces GHLZ vol-tercile R² monotonicity
      (~0.5% / 1.0% / 3-4%) and FOMC R² ~5-12% on MES backtest fixtures;
      $TICK / $ADD / CVD ingest paths landed; narrative formatter passes
      NN-C-007 hook (no raw numerics in template output); IndicatorContext
      consumed by ContextBuilder in test fixtures with non-empty
      `signal_category_diversity` ≥ 2.
    depends_on:
      - phase-1-backtester-orb        # done — provides existing WilderATR + bar event types to consolidate from
      - phase-4-5-pattern-library-v1  # merged — pattern library Protocol contract + ContextBuilder shape

