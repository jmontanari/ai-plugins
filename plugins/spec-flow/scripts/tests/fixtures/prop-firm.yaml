  - name: live-ingester-prod-ops
    slug: live-ingester-ops
    status: merged
    description: >
      WAVE L-1 — Stabilize & Trust. Take the live ingester from crash-looping
      to verified-running, monitored, and producing trustworthy price data.
      Four strands: (1) CRASH-FIX — give the ingester a lean entrypoint that
      imports only the data/ingester layer (no cli.harness, no
      intelligence/regime/lightgbm) so the collector has a minimal dependency
      surface per NN-C-008, plus add libgomp1 to the runtime image defensively;
      (2) DEPLOY & SOAK — install + load the launchd ingester keepalive (today
      only the POSTGRES keepalive is loaded; the ingester relies solely on the
      docker-compose restart policy, which is what masked the crash loop) and
      run a 24–48h soak verifying enabled subscribers advance their watermarks;
      (3) RECONCILE GATE + DATA QUALITY — operationalize the existing manual
      ingester_reconcile machinery (live `bars` vs IntradayBarsAdapter
      rebuild=True, p95 ≤ 2.5 bps, Dukascopy lineage matching backfill) into a
      scheduled gate that pages on breach; add gap/duplicate/stale-watermark
      detection with an alert+quarantine-and-continue posture (never silently
      lose coverage, never silently serve bad data); (4) OBSERVABILITY +
      RUNBOOK — wire the ingester into the Phase-3 MetricsEmitter bus
      (Prometheus, dashboard panels, structured logs) with a page on
      container-restart-loop / no-watermark-advance, and write a
      docs/runbooks/ operational runbook (bootstrap, credentials, freshness
      check, incident response). DoD STOPS at verified-running + trustworthy —
      the ≥30-day accumulation runs in the background; shadow-validation
      activates on day-count, NOT on this piece staying open. Absorbs the
      residual scope of the superseded `ingester-reconcile` piece.
    prd_sections:
      - FR-ING-05
      - FR-ING-06
      - FR-ING-07
      - FR-OBS-02
      - SC-004
    internal_phases:
      - "Phases detailed at plan time. High-level: (P0) lean ingester entrypoint + libgomp1, prove clean container start; (P1) launchd ingester keepalive install + 24–48h soak with watermark-advance assertion; (P2) reconcile gate (schedule the existing script + alert on breach) + data-quality gap/dup/stale detection with quarantine; (P3) Phase-3 observability retrofit (MetricsEmitter, Prometheus, dashboard panels, restart-loop/stall paging); (P4) operational runbook."
