  - name: phase-3-observability-core
    slug: phase-3
    status: merged
    description: >
      Observability substrate — sits right after Phase 2 because the ingester
      is the first continuously-running thing and needs real-time visibility
      beyond "is the health endpoint green." Delivers the contracts and
      surfaces every subsequent piece will emit through. (a) Unified
      MetricsEmitter protocol consumed by runtime / venue / portfolio /
      rule engine / strategy / router / oversight; (b) event taxonomy with
      three severity levels — INFO (log-only), WARN (Discord rate-limited),
      CRITICAL (Discord + configurable halt); (c) structured JSON log
      aggregation to $PROP_FIRM_ROOT/shared/logs/ with per-day rotation;
      (d) live runtime dashboard at :9201/dashboard — subscriber grid for
      ingester (ts advancing? last error? rows/hour?) and stubbed panels
      for positions / day PnL / current regime / active strategies (Phase
      11 activates those); (e) Prometheus-shaped metrics endpoint at
      :9202/metrics; (f) severity routing config at
      configs/observability/routing.yaml. Retrofits Phase 2 ingester +
      Phase 1 backtester to emit through MetricsEmitter; all downstream
      pieces (4+) are built against the contract from day one. Does NOT
      ship the live-trading-specific triggers (position-drift warnings,
      strategy-silence detector, rule-approach warnings) — those land in
      Phase 11 where they have real venues + real positions to monitor.
    prd_sections:
      - FR-OBS-01
      - FR-OBS-02
      - FR-OBS-04
      - FR-OBS-05
      - FR-OBS-08
      - FR-ALERT-01
      - FR-ALERT-02
      - FR-ALERT-03
      - FR-ALERT-04
      - NFR-26
    internal_phases:
      - "P1 Protocol layer — MetricsEmitter protocol, Event / Severity enums, event-taxonomy schema + severity routing config (configs/observability/routing.yaml)"
      - "P2 Log aggregation — JSON log writer with daily rotation to shared/logs/, integration with existing core/logging.py"
      - "P3 Discord severity routing — extends Phase 0a alerter: INFO (log-only), WARN (Discord rate-limited), CRITICAL (Discord + optional halt hook)"
      - "P4 Dashboard — :9201/dashboard minimal viable (HTML + SSE updates from runtime state). Phase 3 ships the ingester subscriber grid; live-runtime dashboard panels (positions/PnL/regime/active-strategies) are stubbed and activated by Phase 11"
      - "P5 Prometheus endpoint — :9202/metrics with scrapable counters + gauges (uptime, rows_ingested_total, watermark_lag_seconds, error_rate, tick_budget_p95)"
      - "P6 Retrofit Phase 2 ingester — wire all ingester events through MetricsEmitter; verify dashboard renders live subscriber state; verify Discord severity routing"
      - "P7 Retrofit Phase 1 backtester — events.jsonl stays the primary offline artifact, but runtime-loop events also emit through MetricsEmitter so Phase 10 validation-suite shadow mode produces real-time observability output too"
    exit_criteria: >
      (a) MetricsEmitter protocol defined + integration test coverage across
      Phase 1 backtester and Phase 2 ingester. (b) Dashboard renders
      ingester state live for a running ingester. (c) Prometheus endpoint
      scrapes cleanly from curl. (d) Severity routing verified against a
      LIVE Discord webhook (NOT mocked — resolves Phase 0a Gate J caveat):
      fabricated WARN reaches Discord ≤5s; fabricated CRITICAL triggers
      the halt hook in <1 tick. (e) Log rotation verified with a 24h soak.
      (f) Observability overhead ≤5% of tick budget (NFR-26).
      (g) Sync-surface enforcement landed: observability/sync.py and
      observability/async_surface.py submodules exist; new
      `no-emit-async-in-core-or-rules` AST pre-commit hook rejects
      violations; import-linter forbidden-modules contract prevents
      rules/ and core/ from importing async_surface (FR-OBS-01
      mechanism).
    depends_on:
      - phase-1-backtester-orb
      - phase-2-live-ingester
    dependency_note: >
      phase-1-backtester-orb is listed because Phase 3's internal P7
      retrofits the backtester's runtime-loop events to emit through
      MetricsEmitter — that retrofit cannot run until Phase 1 has shipped.
      Phase 3's substrate (P1-P5: MetricsEmitter, log aggregation,
      dashboard, Prometheus, severity routing) can begin AS SOON AS
      Phase 2 is underway; in practice the retrofit work (P6 ingester,
      P7 backtester) runs when each upstream piece completes. Implementers
      should treat Phase 3 as "start parallel with Phase 2; retrofit
      landing lags the upstream piece being retrofitted." The literal
      `depends_on` order is conservative — pipeline tooling that blocks
      Phase 3 substrate work on Phase 1 completion is overly cautious
      but safe; split into sub-pieces if the schedule demands otherwise.

