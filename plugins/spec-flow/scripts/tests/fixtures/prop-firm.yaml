  - name: phase-3_5-execution-substrate
    slug: phase-3-5
    status: merged
    description: >
      Distributed execution substrate — N remote workers (today: 1 Mac
      Mini M2 Max; design accommodates additional workers without code
      changes) configured + supervised via a single-tool Ansible stack
      with launchd handling per-host service supervision and a
      `prop_trader remote` CLI thin wrapper that gives operators a
      CI/CD-shaped UX (push → run → tail → diag → deploy). Same fleet
      hosts both ad-hoc dev/research jobs (bare ssh + command via
      `ansible-playbook`, no container — NN-C-005-compliant dev
      iteration) and long-running production daemons (docker compose
      services supervised by launchd plists, Phase 2 P7 pattern
      preserved + Ansible-managed — NN-C-005-deploy-allowed). Federated
      Prometheus on the dev box scrapes each worker's Phase 3
      :9202/metrics endpoint; Discord + Healthchecks.io fan-out reuses
      Phase 3's reaction wiring directly (no per-worker
      re-implementation). Adopts and Ansible-manages Phase 2 P7's
      docker-compose.ingester.yml + Dockerfile.ingester +
      keepalive-ingester.sh + ingester plist + ingester_reconcile.py
      (no supervisor swap; deploy verb is tag-bump-and-restart, not
      orchestrator-substitution). Modular role library at
      `configs/remote/roles/` provides the building blocks; playbooks
      at `configs/remote/playbooks/` compose roles into operator-visible
      verbs. Renamed from earlier "phase-0g-remote-mac-mini-execution"
      kickoff seed (2026-04-24). Hard depends_on
      phase-3-observability-core because the production observability
      story is Phase 3's MetricsEmitter + federated Prometheus + reused
      reactions — there is no half-baked observability to ship in this
      piece, so Phase 3 lands first.
    prd_sections:
      # NEW family added by this piece's PRD amendment
      - FR-OPS-01      # fleet definition + modular role library (ansible inventory + group_vars + host_vars + roles + playbooks)
      - FR-OPS-02      # dev-mode remote run (ansible-playbook + async/poll:0 + tail-file streaming)
      - FR-OPS-03      # production-deploy verb (build → docker save | scp | docker load → bump compose tag → restart compose service → wait for healthcheck)
      - FR-OPS-04      # diag + state introspection
      - FR-OPS-05      # schema parity check (alembic head reconciliation pre-dispatch)
      # Existing IDs this piece extends or fulfills
      - FR-CLI-08      # `prop_trader embed` is the motivating dev-mode consumer (warm-tier backfill on Mac Mini)
      - FR-ING-06      # docker-compose.ingester.yml — reused, Ansible-managed in place
      - FR-ING-07      # `prop_trader ingest run|status` — production deploy via this piece's verb
      - NFR-25         # backfill ≤4h budget — i9-WSL throughput failure for warm-tier embed motivates remote execution
      - NFR-26         # observability overhead ≤5% — Prometheus federation + log forwarding must respect it
    internal_phases:
      - "Phases detailed at plan time. High-level: P1 inventory + group_vars + host_vars + Pydantic v2 schema; P2 modular role library (homebrew, colima, uv, secrets, shared_layout, prop_trader_repo, prop_trader_venv, ingester_compose, ingester_keepalive, ingester_image, observability_local, observability_federation, healthchecks_endpoint, alembic_check, alembic_migrate, caffeinate, log_sync, teardown); P3 composed playbooks (bootstrap_worker, push, run_embed/run_backfill/run_dev_verify, deploy_ingester, rollback_ingester, diag, tail_logs, status, sync_logs, rotate_secrets, teardown_worker); P4 prop_trader remote CLI thin wrapper (~250 LOC) shelling to ansible-playbook with the right inventory limit + extra-vars; P5 ops/ Python package (workers, ansible, dispatch, parity, run_ids, observability/render_prometheus); P6 schema parity check (alembic head reconciliation as pre-task); P7 sidecar Prometheus on dev box (repo/docker-compose.observability.yml + infra/dev-box/prometheus.yml); P8 federated observability verification (Phase 3 reaction wiring exercised end-to-end); P9 24h soak (multi-job dispatch + production daemon + ssh-disconnect drill + worker reboot drill)."
    exit_criteria: >
      (a) `prop_trader remote run --worker mac-mini-01 -- prop_trader embed
      --start 2020-01-01 --end 2020-02-01` runs on the Mac Mini, streams
      output to WSL via the tail-file pattern, exits 0, watermark
      advances; survives ssh disconnect (ad-hoc task continues, log
      tail re-attaches via `prop_trader remote logs <run_id> --follow`).
      (b) `prop_trader remote deploy --service ingester --tag <sha>
      --worker mac-mini-01` upgrades the ingester to a new image tag
      with monotonic watermark advancement across the cutover (zero
      data loss). The launchd-keepalive supervisor pattern from Phase 2
      P7 is preserved; only the image tag inside the supervised
      container moves. (c) `prop_trader remote diag` returns row counts
      + alembic head + watermark + launchd service state + :9202
      metrics sample in <5s. (d) Schema parity check blocks dispatch
      when the worker's alembic head is behind the deploying commit's
      expected head (regression test against the phase-0e
      events-table-missing trap). (e) 24h soak: multi-job dispatch + 1
      production daemon + simulated ssh disconnect + worker reboot
      drill — all jobs survive or auto-resume per their respective
      contracts. (f) Phase 3 federated Prometheus scrapes worker :9202
      cleanly from the dev box; an ingester-emitted CRITICAL event
      reaches Phase 3's Discord + Healthchecks.io fan-out without
      per-worker reaction re-implementation. (g) Two-run idempotency
      assertion: every playbook in `configs/remote/playbooks/` runs
      twice against a containerized SSH fixture in CI; the second run
      reports zero changed tasks.
    depends_on:
      - phase-2-live-ingester
      - phase-3-observability-core
      - observability-http-wiring
      - prereqs-phase-3-5
    dependency_note: >
      Spec authored in parallel with Phase 3 execution (Phase 3 status:
      planned, ready to dispatch). Plan + execute sequenced AFTER Phase 3
      lands so the federated Prometheus + Discord + HC.io wiring can be
      tested against real Phase 3 surfaces, not stubs. The warm-tier
      backfill (phase-0e production run) is acknowledged blocked by this
      piece + Phase 3 — accepted slip per user direction (2026-04-25):
      "getting architecture and plumbing in place first is good moves
      here." Phase 2 P7's existing launchd+keepalive supervisor pattern
      is preserved + Ansible-managed — this piece does not swap
      supervisors.
    carryover_from_phase_3: >
      Backlog items from `docs/prds/prop-firm/backlog.md` (post-merge
      2026-04-26) that the phase-3_5 spec brainstorm should fold INTO
      this piece's scope BEFORE the daemon goes live, since each is a
      production-ops gap that phase-3_5's deploy story will expose:

        (1) Operator runbook `docs/runbooks/observability-overlay.md` —
            currently a `.gitkeep` placeholder. Phase 3 deferred the
            actual runbook; phase-3_5 ships the deploy verb, so the
            runbook (env-var matrix, port-forward verification, log
            inspection, post-halt restart verification) belongs with
            phase-3_5's operator-facing docs.

        (2) Cache `aiohttp.ClientSession` in `HealthchecksHeartbeatRegistry`
            (currently creates a fresh session per heartbeat POST). At
            phase-3_5's production cadence (60s+) this is measurable
            TCP/TLS churn; trivial fix; do it before live ops.

        (3) Honor or remove `url_env` field in routing.yaml schema —
            currently decorative because `observability_healthchecks_endpoint_url(name)`
            always reads `PROP_FIRM_HEALTHCHECKS_URL_{name.upper()}`,
            ignoring the declared `url_env`. Operator misconfiguration
            risk; fix before phase-3_5 operators set routing.yaml.

        (4) `failure-drill-docker-leg` (Phase 12 deferred sub-scope) —
            the post-halt Docker `restart: unless-stopped` 30s recovery
            loop. phase-3_5's container deploy is the natural home for
            its manual verification; fold into phase-3_5's manual exit
            gates.

      Two HIGH-priority items from the same backlog should land as
      DEDICATED PIECES BEFORE phase-3_5 goes live (real production
      reliability gaps that Phase 3 ships but does not fully cover):

        (5) `discord-alerter-resilient` — async + SQLite-buffering
            DiscordAlerter. Until this lands, AC-19 flush-on-recovery
            is xfail and production WARN/CRITICAL alerts will be
            permanently lost on any Discord webhook outage. Becomes
            real the moment phase-3_5 runs the daemon against a live
            webhook.

        (6) `observability-http-wiring` — wire `record_http_response()`
            (already implemented at `src/prop_trader/observability/seams/http.py`)
            into the four Phase 2 subscriber adapters (`cot_weekly`,
            `dukascopy_live`, `economic_calendar_hourly`,
            `fred_daily`). Currently the seam exists but no caller
            invokes it; HTTP 5xx detection is inert in production and
            the rate-threshold escalator (5×http_5xx → CRITICAL) will
            never fire. Critical for phase-3_5 live ops to actually
            catch upstream HTTP errors.

      Cross-PRD process retros from `docs/improvement-backlog.md`
      (FO-7..FO-14) are spec-flow plugin process changes; each new
      piece (including phase-3_5) should adopt the FO-7
      (`--cov-fail-under=0` scoping) and FO-8 (pre-stage
      `pre-commit run --files`) rules.

