trigger, (b) `_news_features_writer.py` ETL, (c) the `bar_news_context` denormalized table from scope entirely (no longer needed — adapters already read from news_flow_features). Add macro-relevance whitelist as an ANNOTATION on events.payload (not a drop) for reversibility. Hard prerequisite remains news-replay-rd. Cascading edits: news-substrate-pgvector-streamingdiskann depends_on + dependency_note updated (slug + bar_news_context references); news-no-lookahead-enforcement description + exit criteria + dependency_note updated (bar_news_context → news_flow_features; slug ref). Old slug `news-store-query-perf` survives only in historical re_evaluations entries (2026-05-25 + earlier) and in halted/done piece descriptions (news-mech-signal-7, news-store-rd, news-flow-activate dependency_note) where the rename would falsify history. Recommended next action: /spec-flow:spec prop-firm/news-ingest-unity (with the four design questions resolved per the 2026-05-27 evaluation thread)."
