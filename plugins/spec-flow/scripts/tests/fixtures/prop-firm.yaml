      docs/research/2026-06-09-ingester-alarm-health-audit.md. Operator directive:
      alarms must be VALID (fire only on real, accurate conditions — no noise),
      STRUCTURED + user-consumable + actionable, and must NOT repeat so frequently
      they become noise; and the underlying ingester content must actually flow.
      Combined scope (operator chose ONE ingester-health piece over a split):
      alarm-correctness AND source-resilience AND data-quality. Consolidates the
      open 2026-06-07 cutover GAPs 3/4/6 (re_evaluations above) with new findings.

      AUDIT FINDINGS (the work this piece must fix):
      - Alarm FLOOD: discord_spool grew to 48,674 rows in 2 days; ~48,632 are
        `subscriber_stalled @ ingester`. 29,304 have an EMPTY dedup_key; the rest
        never collapse because the body carries an ever-increasing `stalled_for_s`.
        Dedup is effectively disabled (violates FR-ALERT-02 duplicate-suppression).
      - FALSE POSITIVES: the `subscriber_stalled` watchdog is NOT schedule-aware and
        fires on daily/weekly-cadence sources (fred_daily idling ~24h is normal). The
        schedule-aware `stall-thresholds` fix (0e3498d7) + calendar-alert-gate
        (81448d9b) only covered the SEPARATE `watermark_stale_critical` path (GAP 3) —
        the two staleness mechanisms must be unified under one cadence-aware threshold.
      - REPEAT CADENCE: re-emits every watchdog tick; needs notify-once -> bounded
        re-ping -> escalate.
      - NON-ACTIONABLE CONTENT: alarm body is a raw JSON blob; no impact/recommended
        action/cadence context. Folds in the existing backlog 'alert readability' item.
      - BOT HEARTBEAT SPIN: ~10 of 24 CRITICAL spool rows are delivered but have
        thread_id=NULL; the discord-bot heartbeat re-scans them every tick -> 14,299
        identical "incident thread None ... skipping this tick" log lines in 34h.
        Threadless delivered CRITICALs must be terminalized, not re-scanned forever.
        (Related to GAP 6 silence-coverage, but distinct: terminalization, not silence.)
      - NO RETENTION: discord_spool is unbounded (48k rows / 2 days). Needs GC.
      - SOURCE RESILIENCE (a real outage during the audit): a ~50-min transient
        Dukascopy 503 blip (00:14-01:04 UTC) wedged dukascopy_live PERMANENTLY — no
        retry-exhaustion recovery / gap-skip / catch-up. bars frozen at 00:55 for 22h+
        while the subscriber still reported is_connected=t. Dukascopy itself is UP (host
        curl of the exact failing URL returns 200). Transient blips must self-heal.
      - STALENESS COVERAGE GAP: only 4 of N subscribers register a watermark in
        ingester_state; news/gdelt/cot/vix/eia/earnings/intraday_bars have NO staleness
        tracking at all.
      - DATA-QUALITY noise (non-fatal): eia_scrape 'skipping unparseable date'
        (792/34h, date-parser bug dropping calendar rows); yfinance_earnings
        YFRateLimitError (495/34h, earnings not collected); intraday_bars hard_404
        (95/34h); command_queue MissingGreenlet (GAP 4 — async session called sync;
        bot->ingester command path degraded).
    description: >
      Make the live ingester trustworthy end-to-end before live activation depends on
      it: (1) alarms fire only on real, schedule-aware conditions (no false positives),
      (2) one ongoing condition = one alert with bounded re-notify cadence (no per-tick
      flood), (3) alarm content is structured, user-consumable and actionable, (4) the
      discord-bot heartbeat terminalizes threadless delivered CRITICALs, (5)
      discord_spool has a retention/GC policy, (6) subscribers self-heal after transient
      upstream failures (retry-exhaustion recovery / gap-skip / catch-up), (7) every
      subscriber exposes a watermark in ingester_state, and (8) recurring data-quality
      warnings are fixed or correctly suppressed.
    prd_sections:
      - FR-ING-05
      - FR-ALERT-01
      - FR-ALERT-02
      - FR-ALERT-03
      - FR-ALERT-04
      - FR-OBS-05
      - NFR-09
    internal_phases:
      - "Phases detailed at spec/plan time. High-level: unify subscriber_stalled +
        watermark staleness under one schedule-aware threshold; always-populated
        dedup_key independent of volatile body fields + notify-once/bounded-re-ping/
        escalate cadence; structured actionable alarm payload + clean embeds; bot
        heartbeat terminalization for threadless delivered CRITICALs; discord_spool
        retention/GC; subscriber retry-exhaustion recovery + gap-skip + catch-up
        (the dukascopy wedge); register all subscribers in ingester_state; data-quality
        fixes (eia date parser, yfinance backoff, intraday_bars 404, command_queue
        MissingGreenlet)."
    exit_criteria: >
      Over a multi-day live run: zero false-positive alarms (no alarm on a source
      behaving within its own cadence); each distinct ongoing condition produces at
      most one active alert with re-notify bounded to the configured interval;
      discord_spool growth bounded by retention; no heartbeat re-scan spam; a simulated
      transient upstream failure self-heals without permanent stall; every subscriber
      exposes a watermark in ingester_state; the recurring eia/yfinance/404 warnings are
