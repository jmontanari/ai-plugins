  - name: news-ingest-unity
    slug: news-ingest-unity
    status: merged
    specced_at: 2026-05-28
    planned_at: 2026-05-28
    merged_at: 2026-05-29
    aliases:
      - news-store-query-perf      # original slug, renamed 2026-05-27 (was over 20-char limit + reframed scope)
    notes: |
      WAVE 1 priority (pivot_2026_05_28_calibration_measurement_completeness, re_evaluations top
      entry). Live/backfill news_flow_features drift (live=15-min boundary bucket vs
      backfill=1-hour trailing window — same table, different content) blocks the oversight
      news_flow signal from contributing real evidence in cell windows. Until the writer is
      unified, the news_flow EvidenceSource's contribution during calibration is sparse / uncertain
      and the iter-1 1% peak measurement under-represents what a full evidence stack would produce.

      See policy-regime-cal/decision.md + this manifest's pivot_2026_05_28 re_evaluations entry for
      full rationale.
    description: >
      P1 piece (was `news-store-query-perf`, renamed 2026-05-27).
      Originally framed as a perf fix (build `bar_news_context`
      sidecar to retire the 652ms per-bar events scan); REFRAMED
      2026-05-27 after grounding against running code. Reality today:
      the news adapter already consumes a 2nd-layer aggregated table,
      `news_flow_features`, but that table is populated by TWO
      different paths whose drift IS the operator-visible problem.
      (1) LIVE path: NewsBatchCommitted bus event triggers a debounced
      `compute()` on the next 15-min boundary in NewsFlowService
      (src/prop_trader/intelligence/news_flow/_service.py:316-345) →
      reads FROM events for the window → writes news_flow_features +
      caches in `self._last_features[run_id]`; live NewsFlowSource.fetch
      reads the in-memory cache (no DB at decision time).
      (2) BACKFILL path: manual ETL via
      src/prop_trader/data/sources/_news_features_writer.py whose
      per-bar `select_news_for_bar()` query (_db.py:353) is the 652ms
      p95 NFR-NSR-01 violator — populates the same news_flow_features
      table but with a different (1-hour trailing) window vs the live
      path's 15-min boundary bucket. BacktestNewsFlowService
      (src/prop_trader/backtester/services/news_flow.py:34) reads
      news_flow_features directly. Result: today backfill is a manual
      2-step (write events → run features writer ETL); live has a
      0-15min staleness window; both paths produce subtly different
      content in the same table.

      NEW SCOPE: unify both aggregation paths into a single in-line
      writer that maintains news_flow_features as an invariant on every
      news commit. (1) Introduce `NewsIngester.record(doc, run_id)`
      contract on Store; all 4 writers (gdelt_live, live_news,
      cc_news_live, backfill scripts) call through it. (2) Inside
      `record()`: append events row + UPSERT the news_flow_features
      bucket for the doc's source × 15-min window IN ONE TRANSACTION;
      publish NewsBatchCommitted to the bus (unchanged). (3) Retire
      the bus-driven debounced compute() trigger — bus event still
      fires for non-NewsFlowService subscribers, but NewsFlowService
      no longer consumes it for compute triggering. (4) Retire
      `_news_features_writer.py` ETL entirely — backfill goes through
      `NewsIngester.record()` like live. (5) BacktestNewsFlowService
      continues reading news_flow_features (no schema change); a
      one-time canonical replay seeds the table from the existing 128M
      events rows so historical backtests have features without
      re-running the writer at replay time. (6) Macro-relevance
      whitelist becomes an ANNOTATION on events.payload (not a drop —
      annotation is reversible; whitelist-expansion does not require
      re-backfill). (7) Live NewsFlowSource in-memory cache becomes
      redundant — table is the cache; remove or deprecate
      `self._last_features` accordingly.

      Out of scope: no `bar_news_context` table (retired from scope —
      adapters already read aggregated state from news_flow_features,
      and the unified writer keeps it fresh); no semantic-search
      substrate (still news-substrate-pgvector-streamingdiskann's
      job); no news_flow_features schema changes (same columns —
      ts, source, volume_z, tone_shift, tone_dispersion, novelty,
      epu_density, gpr_pulse, composite_magnitude); no
      news_flow_baselines refresh-policy change (slow-changing prior,
      separate concern); no LLM signal changes; no live trading
      hookup. Recommended next action:
      /spec-flow:spec prop-firm/news-ingest-unity.
    prd_sections:
      - FR-DATA-02      # ingest-completeness verdict (unified writer is the canonical path)
      - NN-P-007        # holdout enforcement (UPSERT honors `ts ≤ doc.ts < bucket_end`)
      - NN-P-005        # service availability (in-line writer cannot raise into the bus path)
      - NN-P-006        # signal-source independence (news_flow_features unchanged downstream)
      - SC-003          # adapter count + correctness (live + backtest read same canonical table)
    internal_phases:
      - "Phases detailed at plan time."
    exit_criteria: >
      (a) `NewsIngester.record(doc, run_id)` (or equivalent unified
      writer entry point) committed on Store; all 4 writers
      (gdelt_live, live_news, cc_news_live, backfill scripts) route
      through it — verified by import-linter / pre-commit check that
      no other path writes to events for `kind LIKE 'news:%'`.
      (b) In-line UPSERT of news_flow_features row for the doc's
      source × 15-min bucket happens in the SAME transaction as the
      events row; integration test demonstrates atomicity (rollback
      on events-write failure leaves features unchanged).
      (c) `_news_features_writer.py` ETL fully retired (file
      removed OR reduced to a deprecation stub that raises
      NotImplementedError); no caller in src/ or scripts/ remains.
      (d) Live `NewsFlowService.compute()` bus-debounce path removed
      (or deprecated and unused); the bus event still publishes but
      NewsFlowService is no longer a subscriber for compute
      triggering. Live + backtest adapters read the same canonical
      news_flow_features table.
      (e) One-time canonical replay script seeds news_flow_features
      from the existing 128M-row events corpus via the unified writer
      — produces byte-identical rows to a fresh ingestion of the same
      window (determinism check by row hash).
      (f) Macro-relevance whitelist annotates events.payload with
      `is_macro_relevant: bool` (no drop); unit test demonstrates
      that toggling the whitelist re-annotates without re-backfilling.
      (g) Per-bar adapter read latency p95 ≤ 50ms confirmed by bench
      (NFR-NSR-01 satisfied via point lookup on (ts, source) in
      news_flow_features — no per-bar events scan remains anywhere).
      (h) Live/backfill aggregation determinism — replaying the same
      window through the unified writer twice produces byte-identical
      news_flow_features rows.
      (i) `prop_trader dev verify` exits 0.
    depends_on:
      - news-replay-rd
    dependency_note: >
      `news-replay-rd` (merged, slug for `news-backfill-fix-and-replay`)
      is a hard prerequisite — the 128M-row events corpus must be in
      place because (h) the determinism check and (e) the one-time
      canonical replay both test the unified writer against the real
      historical corpus, not a synthetic fixture.

