  - name: phase-0d-gdelt-bigquery-source
    slug: phase-0d
    status: done
    description: >
      Replace the news_corpus._gdelt HTTP/CSV pull path with a BigQuery
      server-side-filtered source. Same NewsDocument output shape (byte-equal
      parity-tested), same composite adapter surface — the HTTP path stays
      as a fallback under a config flag (GDELT_CLIENT=bigquery|http, default
      bigquery). Resolves the NFR-25 wall-clock miss for GDELT (current
      adapter ≈ multi-hour per year due to GKG file pulls + Akamai 503
      clusters; partitioned BigQuery query is seconds-to-minutes for the
      same window). Foundation piece for the news-RAG architecture; embedding
      generation + retrieval API are scoped to follow-on pieces (planned
      phase-0e-news-embedding-pipeline, phase-0f-news-rag-retrieval) and
      explicitly OUT OF SCOPE here. Implemented on the existing 0c worktree
      per user direction (additive, not a separate worktree).
    prd_sections:
      - FR-DATA-04        # news adapter
      - NFR-18            # free data sources only (BQ free tier covers our footprint at ~520 GB/6yr scan)
      - NFR-25            # ≤4h per year backfill
      - SC-003            # backfill exits 0
    internal_phases:
      - "P1 google-cloud-bigquery dep + ADC auth wiring + cost guardrail (maximum_bytes_billed)"
      - "P2 BigQueryGdeltClient with same fetch_gkg(start, end) -> AsyncIterator[NewsDocument] surface; sync BQ client wrapped via asyncio.to_thread to match adapter pattern (CR-021)"
      - "P3 Query builder: REGEXP_CONTAINS(Themes, '(^|;)ECON_') for byte-equal parity (NOT naive LIKE); partition prune via _PARTITIONTIME bracket; column projection of GKGRECORDID/DATE/SourceCommonName/DocumentIdentifier/Themes/V2Tone"
      - "P4 NewsDocument iterator + tone determinism (round_tone reused) + translated-doc handling (T-prefix in GKGRECORDID preserved)"
      - "P5 Config switch GDELT_CLIENT=bigquery|http with bigquery default; HTTP path retained for offline/CI; configs/resilience/gdelt.yaml gains client field"
      - "P6 Test suite — unit tests mock BQ client (Option C per user 2026-04-23); live tests in tests/integration/ hit real BQ behind RUN_BQ_LIVE=1 env gate; 1-month parity test (≥99.9% row match) compares HTTP vs BQ output byte-by-byte"
      - "P7 NFR-25 re-measurement on a full year via BigQuery; cost-budget verify; docstring fix to _gdelt.py:370-377 (V2THEMES → V1THEMES, V2.1TONE → V1.5TONE per GKG codebook)"
    exit_criteria: >
      1-month parity test ≥99.9% row match against HTTP adapter; full-year
      backfill via BigQuery completes within NFR-25 budget; bytes_billed
      stays inside maximum_bytes_billed cap (10 GB/query default); both
      GDELT_CLIENT=bigquery (default) and GDELT_CLIENT=http (fallback)
      paths green in CI.
    depends_on:
      - phase-0c-backtest-data-hardening

  - name: phase-0e-news-rag-warm-tier
    slug: phase-0e
    status: done
    description: >
      Warm tier of the 3-layer news-RAG architecture (cold=BigQuery / warm=
      pgvector+Timescale / hot=in-process). Consolidates the former
      phase-0e-news-embedding-pipeline + phase-0f-news-rag-retrieval into a
      single piece — same host (Mac Mini Postgres), same alembic migration
      (0007), same module tree (prop_trader.intelligence.*), and the
      retrieval API's integration coverage requires the embedding
      pipeline's data anyway. Delivers two things on one worktree:

      (A) EMBEDDING PIPELINE — bge-base-en-v1.5 (768-dim) embeddings of
      NewsDocument rows streaming from phase-0d-gdelt-bigquery-source's
      BigQueryGdeltClient, stored in a `news_embeddings` hypertable
      (doc_id PK, ts TIMESTAMPTZ, embedding VECTOR(768), outlet, tone,
      theme_tags, headline) via alembic 0007 with HNSW cosine index.
      NewsEmbedder wraps sentence-transformers; batch embed + idempotent
      upsert; new `prop_trader embed` CLI subcommand with watermark
      resumability mirroring `prop_trader backfill`.

      (B) RETRIEVAL API — `prop_trader.intelligence.retrieval.NewsRAG`
      exposing 5 query primitives consumers (Phase 4 llm-bridge, Phase 5
      news-interpretation, strategies) depend on: find_similar_news
      (semantic search, pgvector cosine), daily_topic_vector (macro-mood
      mean vector), novelty_score (distance-from-rolling-baseline),
      cluster_density (breaking-news detection via embedding density),
      correlate_with_price (ranked clusters preceding MES moves >X% —
      the real research engine). Primitives 1-4 target p95 < 200 ms;
      primitive 5 scales with window size. In-memory LRU cache for
      repeat-query backtests.

      Architecture context at docs/research/2026-04-23-news-rag-architecture.md.
    prd_sections:
      - FR-DATA-04        # news adapter — extended with embedding + retrieval layer
      - FR-CLI-08         # prop_trader embed CLI verb (2026-04-24 amendment)
      - NFR-18            # free data sources (bge-base is local, no API cost)
      - NFR-24            # ≤500 GB shared/ budget (~115 GB on Mac Mini host, not on shared/)
      - SC-003            # backfill exits 0
      - SC-005            # backtester signal quality (enabled by RAG primitives)
    internal_phases:
      - "P1 alembic migration 0007: news_embeddings hypertable + HNSW cosine index"
      - "P2 NewsEmbedder wrapping sentence-transformers(BAAI/bge-base-en-v1.5); batch embed + idempotent upsert"
      - "P3 prop_trader embed CLI + watermark resume (mirrors backfill pattern)"
      - "P4 Embedding pipeline unit + integration tests (mock embedder/DB; RUN_INTEGRATION=1 hits Mac Postgres)"
      - "P5 NewsRAG service + pgvector cosine + SQLAlchemy wiring (sync via asyncio.to_thread per CR-021)"
      - "P6 Query primitives 1-3 (find_similar_news, daily_topic_vector, novelty_score)"
      - "P7 Query primitives 4-5 (cluster_density, correlate_with_price)"
      - "P8 In-memory LRU cache layer for repeat-query backtest workloads"
      - "P9 Retrieval unit + integration tests (integration seeds embeddings fixture on real Mac Postgres)"
      - "P10a 1-month real-data E2E round trip on local infra (dev-manual, ≤60 min)"
      - "P10b Full production backfill (2020-01-01 → today) against remote Mac Mini Postgres (user-gated, multi-day, watermark resume between sessions) + post-backfill p95 retrieval benchmark. `--end today` sentinel resolves at each session's invocation time."
    exit_criteria: >
      (a) `prop_trader embed --source news_corpus --start 2020-01-01
      --end today` completes (across one or more watermark-resumed
      sessions) with 26-38M doc embeddings written to news_embeddings
      on the remote Mac Mini Postgres (192.168.1.158); HNSW index built;
      re-invocation is idempotent (composite PK (doc_id, embedding_model)
      permits no duplicates). Row-count band scales at ~5M rows/year ± 17%
      if AC-16 slips past spec authoring date (2026-04-24). (b) All 5
      NewsRAG primitives have unit + integration coverage (AC-1..AC-15
      in the spec). (c) Production latency benchmark: 100 repeated
      find_similar_news("Federal Reserve monetary policy", ...) calls
      against the fully-populated remote Mac Mini news_embeddings table
      yield p95 < 100 ms wall-clock from the dev box (AC-16). (d) The
      1-month dev-manual E2E round trip (AC-16a) passed on local infra
      before the 6-year production run was authorized. (e) Phase 4+
      consumers can import `prop_trader.intelligence.retrieval` cleanly.
    depends_on:
      - phase-0d-gdelt-bigquery-source
    merged_from:
      - phase-0e-news-embedding-pipeline  # 2026-04-24 consolidation
      - phase-0f-news-rag-retrieval       # 2026-04-24 consolidation

