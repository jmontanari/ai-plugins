      - phase-0i-market-breadth      # superseded 2026-05-02 — market_breadth adapter
      - phase-0j-cross-asset         # superseded 2026-05-02 — cross_asset adapter
    description: >
      PatternLibrary v1 — the mechanical pattern-matching evidence source
      (Signal 1) of the six-source evidence stack. Mines historical news
      → MES outcome correlations from existing data via a hybrid build
      pipeline (BigQuery JOIN over gdelt-bq.gdeltv2.events ⨝
      gkg_partitioned at build-time + pgvector cosine similarity over
      news_embeddings at query-time + local TimescaleDB MES bars for
      outcome computation). Ships:

      (1) PatternLibrary protocol concrete (PatternLibraryV1) with stable
          three-method interface: similar_sessions(embedding) →
          list[SessionOutcome], outcome_distribution(event_class, context)
          → OutcomeStats, calendar_pattern(date) → CalendarPattern.
      (2) Nightly offline batch builder (prop_trader patterns build CLI)
          producing version-pinned parquet artifacts at
          $PROP_FIRM_ROOT/shared/pattern-library/<version>/ with
          deterministic replay (byte-identical on identical inputs).
      (3) Versioning schema:
          <embedding_model_version>-<gdelt_corpus_end_date>-<build_iso>
          — embedder-agnostic; supports phase-4-8 RAG-tuning campaigns
          that swap embedders side-by-side.
      (4) Cell collapse policy for sparse cells: prioritized axis-drop
          chain (time_of_day → iv_rv_regime → breadth_regime →
          risk_on_off → vol_regime → vix_regime → cameo_event_code only).
      (5) No-strong-analog detector returning UNCERTAIN when top-K
          similarity below threshold OR cell n_samples below threshold
          (FR-PATTERN-02 — "I don't know" pathway).
      (6) Calendar pattern lookup with 3rd-Friday OpEx + FOMC + NFP +
          CPI flags + typical_atr_percentile + typical_range_bps per
          (month, week_of_month, day_of_week) triplet.
      (7) Phase-4 stub completion: PatternLibrary Protocol concrete
          return types (was list[object] / object); BaseContextBuilder.
          build_pattern_context concrete narrative formatter (was empty
          string stub); CallTrace.pattern_library_version field added.
      (8) Forward-compat for phase-4-7 multi-model-cohort + phase-4-8
          test-harness: embedder-dimension-agnostic Protocol return
          types (centroids typed as np.ndarray, no fixed-dim encoding);
          two distinct embedder-version artifacts coexist without state
          contamination.
      (9) Three absorbed data adapters (operator directive 2026-05-02
          pull-deps-in of phase-0h + phase-0i + phase-0j):
          - data/sources/cross_asset/ — DXY, GC=F, CL=F, ^TNX, BTC-USD
            (yfinance + twelvedata fallback). Feeds risk_on_off axis.
          - data/sources/market_breadth/ — NYSE TICK + advance/decline
            daily aggregates. Feeds breadth_regime axis.
          - data/sources/vix_realized/ — realized vol (20-day rolling)
            + IV/RV ratio. Feeds vix_regime + iv_rv_regime axes.
      (10) MetricsEmitter integration: pattern_match_score_distribution
           (histogram), no_analog_rate (gauge),
           pattern_library_build_duration_seconds (gauge),
           pattern_library_cell_coverage_ratio (gauge).

      Coupled PRD amendments (applied at signoff): FR-PATTERN-04 wording
      extension (data sources include gdelt-bq.gdeltv2.{events,
      gkg_partitioned} + cross_asset + market_breadth + vix_realized
      tables); FR-LLM-09 schema extension (CallTrace.pattern_library_version
      field); SC-003 adapter count (≥5 of 9 → ≥7 of 12).

      Known limitations documented in spec: embedding-level lookahead
      (bge-base-en-v1.5 trained post-2022; pre-2022 news embeddings carry
      implicit forward-looking semantic content; cross-temporal control
      mitigation deferred to phase-4-7-multi-model-cohort); 6-year corpus
      depth ceiling (cell density limited; phase-0f-deep-history lifts
      the ceiling); no live re-build trigger (strictly nightly).

      Out of scope (per spec): live consumption in trading loop (phase
      5/6/7), EvidenceItem assembly (phase-7-1), cross-temporal control
      (phase-4-7), embedder swap execution (phase-4-8), PatternLibrary v2
