  - name: events-payload-zstd-dictionary
    slug: events-compression
    status: merged
    notes: |
      Added 2026-06-03 from a storage-optimization investigation (full empirical
      record + path comparison in docs/research/2026-06-03-events-compression-spec.md).
      The `events` hypertable is 390 GB (~99% of the 393 GB DB); `bars` is 548 MB.
      MEASURED on a real 2018 chunk (scratch-table probe, prod):
        - TimescaleDB Hypercore columnar, segmentby=kind_class: 1.59× (payload is
          already pglz-TOAST-compressed → columnar LZ4 has little left to squeeze).
        - segmentby=kind (the failed 2026-05-24 0033/0034 config): 0.81× — BIGGER.
        - dropping unused payload fields: only 1.57× (consumed fields ARE the bulk).
        - per-row zstd, no dictionary: 1.63×.
        - per-row zstd + TRAINED DICTIONARY: 4.17× (dict ~110 KB, captures cross-row
          redundancy in source names / theme vocab / JSON keys that per-row pglz can't).
        - batched xz (offline): 9.1×.
      DECISION (operator, 2026-06-03): pursue the zstd trained-dictionary path —
      the only ONLINE, per-row-queryable lever that hits the original ~<100 GB goal.
      TimescaleDB columnar (prior spec, slug retained) is SUPERSEDED.
    description: >
      Re-encode `events.payload` from `jsonb` to a per-row zstd-trained-dictionary
      `bytea` (`payload_z`) to reach ~4× (390 GB → ~95–110 GB), data staying ONLINE,
      per-row, lossless, no new hardware, no NAS/NFS/cloud (NFR-06). Design (forced
      by the audit): PURE blob — headline/themes/body live ONLY in payload_z (no
      duplicate typed text columns, which would halve the win); decompression happens
      at the Python READ BOUNDARY (store read helpers), so all downstream dict
      consumers are UNCHANGED. Schema: payload jsonb → payload_z bytea + dict_version
      smallint + is_macro_relevant bool (the one field that is filtered/mutated).
      The dictionary is a LOAD-BEARING artifact: stored in a payload_dicts(version,
      dict) table (travels in pg_dump) AND committed to the repo. Work surface
      (13 items, fully audited): (1) zstandard dep + charter-tools; (2) train +
      store dict; (3) EventRow + migration (payload_z/dict_version/is_macro_relevant,
      drop payload jsonb); (4) compress in the 2 NN-C-012 allowlisted writers +
      store.write_event; (5) decompress-at-boundary in store.get_events +
      _news_document_from_row + _macro_obs_from_row + _calendar_event_from_row;
      (6) rewrite the 3 news_flow/_db.py readers (select_news_embeddings,
      select_gdelt_events_in_window, select_events_in_window_by_prefixes) to fetch
      payload_z + decompress + project in Python — this covers the entire feature
      table chain (news_flow_features/baselines/calibrations/news_signals);
      (7) reannotate_macro_relevance.py → UPDATE is_macro_relevant column (no jsonb_set);
      (8) parity hooks + parity doc; (9) resumable per-chunk re-encode backfill
      (128M rows, oldest→newest, disk-safe); (10) rollback; (11) tests. AUDITED SAFE
      (no change): all events_*_by_class CAggs (kind/ts only), the pgvector/embedding
      layer (news_embeddings + DiskANN/HNSW read their OWN columns, never events.payload;
      embeddings generated from NewsDocument at ingest, not from events),
      llm_context_embeddings (placeholder), events_cell_assignment/gdelt_events_cache,
      all metadata-only reads, single-writer hook. Retention/archival and `bars`
      compression DEFERRED.
    prd_sections:
      - FR-STORE-01
      - NFR-06
    internal_phases:
      - "Phases detailed at plan time. High-level: (0) round-trip-fidelity + ratio validation on a real sample (operator/prod) — gate ≥3.5×; (1) zstandard dep + dictionary train/store/backup; (2) EventRow + superseding migration (payload_z/dict_version/is_macro_relevant; chains off head 0035); (3) writer compression (2 allowlisted + store.write_event); (4) decompress-at-boundary read helpers; (5) news_flow reader rewrites (Python projection) + reannotate column update; (6) parity hooks/doc + tests; (7) resumable per-chunk re-encode backfill + size verification; (8) rollback + runbook."
    exit_criteria: >
      hypertable_size('events') reduced ≥3.5× (390 GB → ≤110 GB); the dict parsed from
      decompress(payload_z) deep-equals the original payload dict for every sampled row
      (lossless at the parsed-object level; NN-C-011 replay parity holds); the news_flow feature chain produces identical
      features pre/post (parity test); ON CONFLICT (kind,ts) DO NOTHING still dedupes;
      the dictionary is recoverable from a pg_dump-only restore (load-bearing-artifact
      AC); the per-chunk re-encode backfill is kill/restart resumable and never needs
      more than one uncompressed chunk of transient free space; parity pre-commit hook
      stays green; a tested rollback restores the prior queryable state; alembic
      single-head and `alembic upgrade head` reproduces the end state on a fresh DB.
      prop_trader dev verify exits 0.
    depends_on: []
    dependency_note: >
      ✅ SEQUENCING GATE CLEARED 2026-06-04: `calibration-2` MERGED to master
      (squash f9b64ae8; master @50c05e67). This branch merged master in (merge, not
      rebase, per operator policy) — clean except the shared manifest/backlog appends.
      Spec RE-EVALUATED against the merged tree + live DB: no changes needed. cal-2
      touched ZERO of this piece's file surface (event writers, store.py,
      news_flow/_db.py, _models.py, parity hooks); alembic still single-head 0035;
      live DB still alembic 0032 / events 390 GB jsonb uncompressed — all spec premises
      intact. READY for /spec-flow:plan.
      No hard CODE deps. Touches the canonical events schema (alembic), the two
      NN-C-012-allowlisted event writers, store.py read helpers, news_flow/_db.py,
      the reannotate ops script, the parity hooks/doc, and adds the `zstandard` dep.
      The live ingester is down (Wave L) → no write contention; coordinate if Wave L
