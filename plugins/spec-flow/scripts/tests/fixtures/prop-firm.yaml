  - name: strategy-rd-3-regime-fit-strategies
    slug: strategy-rd-3
    status: superseded
    superseded_at: "2026-06-07"
    superseded_by:
      - ev-selection-layer
      - regime-calibration-pilot
    superseded_reason: |
      SUPERSEDED 2026-06-07 by the Trading Manager epic (PRD v2). strategy-rd-3's
      premise — that weak per-cell efficiency means the strategy LIBRARY must be
      redesigned — was (a) measured against the regime_aware_ceiling proven ~89%
      structurally unreachable (ceiling-realism-rd) and mis-computed at 1 contract,
      and (b) produced on a harness later found broken 86+ ways. The reframe builds
      the missing DECISION/SELECTION layer over the EXISTING strategies (eligibility
      from oracle-derived regime characterization; expected-value selection replacing
      the signal_strength sort; survival-tiered sizing; per-regime playbooks tuned by
      the OADHVC loop) rather than redesigning strategies. ceiling-realism-rd already
      showed a perfect selector over existing primitives reaches 40–87% of the
      realistic ceiling on the "dead" cells — a routing/selection gap, not a library
      gap. If, after ev-selection-layer + regime-calibration-pilot, specific cells
      still have no capturable edge with any existing strategy, a narrow
      coverage-only successor may be spawned then — but the full-redesign premise is
      retired. calibration-2's open AC-17 validation_signoff is moot under the
      reframed (survival-dollars, NN-P-008) method. Full rationale:
      docs/research/2026-06-07-trading-manager-problem-definition.md §4, §9, §13.
      Original blocking context preserved below for the record.
    notes: |
      Blocked 2026-05-28 by outside-in audit pivot
      (pivot_2026_05_28_calibration_measurement_completeness, re_evaluations top entry).
      iter-1's 1% finding is largely a measurement artifact of an incomplete production stack:
      no router (phase-9 unbuilt), no validation suite (phase-10 unbuilt), oversight evidence
      largely uncertain on cell windows (news-ingest-unity not collapsed, 4 of 7 oversight
      sources sparse — `cal-rerun-hindsight` was originally in this list but closed
      `obsolete` 2026-05-28 when an empirical scan found zero tainted artifacts;
      historical verdicts are lookahead-clean), strategy entry decisions purely mechanical
      (oversight only vetoes post-proposal at runtime/loop.py:222 — `live↔backtest drift via
      run_one_tick` memory).

      Activate this piece ONLY IF calibration-2 Phase 0 (post-Wave-1 remeasurement) confirms
      the efficiency gap persists after the production stack is complete. If the stack alone
      lifts iter-1 to a defensible fraction of the efficiency-bench-rd target, this piece is
      retired (or radically rescoped) rather than executed.

      RETIREMENT LIKELIHOOD RAISED 2026-05-30 (phase-10 survival findings,
      docs/prds/prop-firm/specs/phase-10/survival-features-research.md): the deep-research
      pass found the dominant Combine-failure mode is drawdown/consistency (~85% fail there),
      NOT a missing-alpha/strategy-library gap. The new WAVE R survival features
      (adaptive-position-sizing, mechanical-derisk-guards, consistency-profit-guard) + the
      routing-config population in calibration-2 Phase 0 address that dominant failure mode
      directly. If survival + routing + per-cell tuning reach a defensible ceiling fraction,
      strategy redesign is unnecessary — this piece most likely RETIRES or shrinks to
      coverage-only. Re-confirm against calibration-2 Phase 0's verdict before any redesign.

      See policy-regime-cal/decision.md + this manifest's pivot_2026_05_28 re_evaluations entry
      for full rationale.

      2026-05-29 REFRAME (ceiling-realism-rd merged, squash 97444a7e): the decomposition
      gate is now SATISFIED, but its premise is largely overturned. The "1% / 50x gap" that
      justified a full redesign was measured against the regime_aware_ceiling, which
      ceiling-realism-rd proved is ~89% UNREACHABLE inflation (and was mis-computed at 1
      contract — rebuild_oracle used default_ceiling_config not ceiling.yaml). On the realistic
      engine-basis CONSTRAINED ceiling the existing efb library reaches 40-87% with perfect
      selection; the worst "no-winner" cells are ROUTING gaps, not missing strategies —
      bear-shock-backwardation actually captures 59-68%, and the dead transitional cells
      (transitional-normal-contango/-flat) jump to 57-68% under a perfect selector. So the
      no-winner / dead-strategy evidence in the description below is SUSPECT (old inflated
      denominator + the calibration strategy set, not the efb primitives). DO NOT run a full
      redesign until calibration-2 Phase 0 RE-MEASURES on the realistic + MULTI-POSITION bar.
      (The one-position cap in ceiling-realism-rd's constrained ceiling was a measurement
      modeling choice, NOT a Topstep rule — Topstep permits concurrent positions within the
      5-contract + DLL + trailing + session-flat envelope, and Variant A already trades
      multi-position.) Expected outcome: this piece SHRINKS to a coverage-only scope (new
      primitives only where a perfect pick over the existing pool still falls short of the
      realistic bar) or RETIRES in favor of routing (phase-9, now merged) + multi-position +
      calibration-2 per-cell tuning. Seed brief + single-regime-at-a-time tuning loop +
      the multi-position correction: docs/prds/prop-firm/specs/ceiling-realism-rd/strategy_rd_3_scoping.md
      + decision.md.
    description: >
      BLOCKED 2026-05-28 — see `notes:` above. Third strategy-redesign successor to
      `policy-regime-cal`, originally forked from its branch HEAD after
      iter-1 wide sweep landed (2026-05-28, 11 cells × 12,500 backtests
      = 137,500 rows at `shared/policy-calibration/v1/<cell>/iter1_output/`).
      Iter-1 revealed that per-regime calibration of the existing
      strategy library cannot close the matrix-bar efficiency gap:
      MAX observed ceiling efficiency across 137,500 grid points was
      **1.001%** (`bull-normal-flat-noevent-comfortable / orb`); median
      efficiency 0%; strategy-rd's prior 5.6% baseline was actually
      BETTER than iter-1's peak. Calibrating bad-fit strategies wider
      or narrower does not bridge a 50× gap against the operator's
      ≥50% target (per cal-measure-rework pass bar). This piece
      redesigns the strategy library to fit the populated regime
      universe, then re-evaluates against the same calibration substrate.

      Concrete iter-1 evidence the redesign must address:

      (1) **2 cells have NO passing winner under ANY strategy**:
      `bear-shock-backwardation-noevent-comfortable` (median efficiency
      -7.33%, ALL 5 strategies all-negative across full 2500-grid;
      worst single tuple orb -$1,839) and
      `transitional-normal-contango-noevent-comfortable` (median -0.31%,
      same all-negative pattern). The current 5-strategy library has
      no entry that fits bear+shock+backwardation (classic risk-off
      counter-rally) or transitional+normal+contango (mixed-signal
      chop). New entries are required.

      (2) **`momentum_fade` is structurally DEAD across all regimes**:
      zero trades in 27,500 attempts (5,500 grid points × 5 strategies
      slot). Either the adapter has a wiring bug (the entry condition
      never fires) or its filter is calibrated such that no MES bar
      ever crosses the threshold. Audit + repair or retire.

      (3) **`mean_reversion` non-viable in 9 of 11 cells** (all-negative
      median, marginal-or-failing status counts dominate). Only
      `bull-calm-contango-noevent-comfortable` and
      `bull-normal-contango-noevent-comfortable` show any passing
      winners. The 2026-05-23 strategy-rd-2 VWAP-band + RSI-2 variant
      didn't ship the cross-cell improvement expected.

      (4) **`trend_follow` non-viable in 6 of 11 cells** including
      every shock cell except `bull-calm-flat`. The Intraday-Momentum-
      Boundary archetype shipped by strategy-rd doesn't survive
      high-VIX volatility — needs either a vol-conditional sizing
      gate or a different entry trigger in shock cells.

      (5) **Zero-trade rate 20-60% per cell** indicates entry triggers
      don't fire on real bar history (regime data gap OR over-strict
      thresholds). Strategy-rd-2's premise that strategies just need
      better signal-bus inputs is partially refuted — the entry-trigger
      cadence itself needs work.

      Out of immediate scope (deferred to follow-up pieces): per-regime
      tuning, oversight-axis activation (blocked by Gap 16 in
      policy-regime-cal backlog), pattern-hindsight density expansion
      (operator accepted ≈0 contribution per density-decision).

      In scope (this piece):
      - **A. Audit + repair OR retire `momentum_fade`** — diagnose
        the zero-trade pattern; if entry condition is salvageable,
        repair; otherwise retire from the matrix.
      - **B. Author 1-2 new strategy concretes** targeting the
        two no-passing-winner cells — operator-led naming (e.g.,
        `bear_shock_counter_rally`, `transitional_chop_breakout`).
        Reuse strategy-rd-2's hybrid signal bus + SessionContext
        substrate (no new infrastructure).
      - **C. Vol-conditional gates on `trend_follow`** —
        the strategy survives `bull-calm-flat` (calm regime) but dies
        in every shock cell; add a VIX-tier sizing/skip gate.
      - **D. Revisit `mean_reversion` entry triggers** — the
        VWAP-band + RSI-2 work shipped, but entries don't fire
        often enough to be measurable in 9 of 11 cells. Either
        loosen thresholds or retire variants that don't fit any
        regime.
      - **E. Re-evaluate against `shared/baselines/v1/regime_map/`**
        using the policy-regime-cal calibration substrate (sweep
        tooling, oracles, grid specs all already wired). Target:
        ≥5 cells reach ≥10% efficiency, ≥3 cells reach ≥25% as
        meaningful progress toward the strategy-rd-2 ≥50% gate.

      Fork basis: branch from `piece/prop-firm-policy-regime-cal`
      HEAD (commit TBD at fork time). Preserves all wiring fixes
      (Gaps 1-15 from policy-regime-cal session log), oracle
      artifacts, grid specs, and the iter-1 outcome dataset as
      reference for measuring lift.

      Recommended next action: /spec-flow:spec prop-firm/strategy-rd-3.
