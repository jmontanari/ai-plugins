      orders=[]. (3) _wire_components passes contract_resolver=None; portfolio
      observe_bar returns early (no ATR) and size() raises. Iterative fix loop:
      patch → run small backtest → patch remaining issues until equity_curve_points > 0.
    prd_sections:
