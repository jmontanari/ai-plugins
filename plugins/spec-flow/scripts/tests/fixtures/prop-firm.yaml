  - name: efficiency-benchmark-rd
    slug: efficiency-bench-rd
    status: merged
    notes: |
      WAVE 1 analyst-track piece (pivot_2026_05_28_calibration_measurement_completeness,
      re_evaluations top entry). Runs ~1 week in parallel to the Wave 1 engineering pieces
      (phase-9, phase-10, news-ingest-unity — `cal-rerun-hindsight` removed from this
      list 2026-05-28 when it was closed `obsolete`; see the top re_evaluations entry).
      Produces the defensible
      "realistic efficiency target" against which calibration-2 Phase 0 (post-stack
      remeasurement) and all future calibration verdicts grade themselves — replacing the
      operator-aspirational 50%-of-omniscience target per strategy-rd handoff ("we know is not
      possible but it's the aim").

      See policy-regime-cal/decision.md + this manifest's pivot_2026_05_28 re_evaluations entry
      for full rationale.
    description: >
      Analyst-track research piece. Construct a "synthetic skilled discretionary trader"
      baseline: rule-based, hand-tuned, with full hindsight benefit-of-doubt on parameter
      choice (the synthetic trader is allowed to peek at each cell's regime, news flow,
      microstructure, etc. and pick the textbook-best playbook for that context). Measure
      this synthetic trader's efficiency against the same oracle ceiling that
      policy-regime-cal's iter-1 used. The resulting "synthetic-realistic" efficiency
      becomes the anchor for future calibration PASS bars (proposed: PASS = ≥50% of
      synthetic baseline efficiency, NOT 50% of literal omniscience).

      Scope:
      (1) Author the synthetic trader as a rule library at
      `shared/efficiency-benchmark/v1/synthetic_trader.py` — a hand-curated set of
      regime-conditional rules drawn from public trader playbooks (e.g., bull-calm-flat →
      mean-reversion to VWAP with RSI-2 entry; bear-shock-backwardation → fade-the-rip
      counter-trend with vol-scaled stops; transitional-normal-contango → no-trade /
      pattern-day-only). Each rule may consult the cell's ground-truth regime + the same
      input features the strategy library sees.
      (2) Run the synthetic trader against the same 11 cells × same windows as
      policy-regime-cal iter-1; produce `synthetic_outcome_matrix.parquet` per cell.
      (3) Compare synthetic-trader efficiency vs oracle ceiling per cell → per-cell
      synthetic_efficiency_ratio.
      (4) Author `docs/prds/prop-firm/specs/efficiency-bench-rd/realistic_target.md`
      naming the realistic target (e.g., "PASS bar = 50% of synthetic baseline =
      ~Xn% of oracle ceiling, varying per cell"). Operator review gates whether the
      proposed target replaces the 50% absolute target.
      (5) Propose a `configs/calibration/thresholds.yaml` update applying the new
      per-cell PASS bars — proposed only, NOT applied (operator review gates
      application).

      Out of scope: no production-strategy changes; no router changes; no measurement-engine
      changes; no calibration runs of the existing strategy library; no LLM use; no live
      trading.

      Recommended next action: /spec-flow:spec prop-firm/efficiency-bench-rd.
    prd_sections:
      - FR-STRAT-06       # matrix-bar gate — this piece rewrites its anchor (defensible realistic target)
      - SC-011            # matrix-bar success metric
    internal_phases:
      - "Phases detailed at plan time. High-level: (Phase 0) Synthetic trader rule library authored per cell using public discretionary-playbook references. (Phase 1) Run synthetic trader against the 11 iter-1 cells using policy-regime-cal's measurement substrate. (Phase 2) Compute per-cell synthetic_efficiency_ratio vs oracle ceiling. (Phase 3) Author realistic_target.md naming the defensible per-cell PASS bar. (Phase 4) Propose thresholds.yaml diff (not applied). (Phase 5) Operator review gate."
    exit_criteria: >
