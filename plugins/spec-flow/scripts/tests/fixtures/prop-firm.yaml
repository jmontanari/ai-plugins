      §"GDELT-derived Mechanical News Features" §"Architectural decision".
      PRD FR-EVIDENCE-01/04 + NN-P-005 + charter-intelligence-architecture
      §4-5 amended concurrently.]

      Mechanical (non-LLM) news-flow features computed from GDELT structured
      fields. Distinct from Signal 3 (LLM news sentiment) by inputs (V2Tone
      scores + NumMentions + theme tags vs raw text) AND methodology
      (statistical aggregation vs transformer interpretation) — satisfies
      NN-P-006 on both independence axes.

      Features: news_flow_magnitude composite (volume z-score + |tone shift|
      z + tone dispersion z + novelty z + topic-HHI z); direction signal
      from sign(tone_shift); EPU narrative density (Baker-Bloom-Davis
      keyword-and-theme construction); GPR pulse (Caldara-Iacoviello-style
      CAMEO 14/17/18/19/20 event count). Strong empirical backing for
      volatility prediction (Glasserman-Mamaysky-Qin 2023 "New News is
      Bad News"; Tetlock 2007; BBVA 2022). For prop-firm survival use
      case the role is REDUCE/BLOCK gating, not directional alpha
      (consistent with charter doctrine).

      Reuses existing infrastructure heavily: phase-0e-news-rag-warm-tier
      Fin-E5 embeddings (for novelty cosine-distance computation); phase-0d
      gdelt-bigquery-source GKG sync (raw structured fields); phase-2-5
      gdelt-live-bridge NewsBatchProcessor pattern. Mostly composition,
      not new infrastructure.

      Cadence: 15-min batches (matches GDELT update cadence; suitable for
      regime/risk gating, NOT sub-minute entry triggers). For sub-second
      news shocks, data-sources (data-sources piece) provides the
      live-mode primary-source paths.

      Ships BEFORE phase-7-oversight-policy (phase-7 added as downstream
      dependent so it targets all 7 signals from day 1).
    prd_sections:
