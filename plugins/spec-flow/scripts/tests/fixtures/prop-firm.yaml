  - name: pattern-hindsight
    slug: pattern-hindsight
    status: merged
    merged_at: 2026-05-27
    description: >
      Hindsight-graded ideal-trade store replacing the current cold
      `pattern_match` adapter. Surfaced by `oversight-rd` Phase 9 smoke
      (2026-05-26): the `pattern_match` adapter reports
      `pattern_library_cold` 100% of bars because (a) `BacktestPatternMatchService`
      queries a non-existent SQL `pattern_library` table (the migration
      named `0011_phase_4_5_pattern_library_tables` creates ancillary
      tables but not the eponymous one), and (b) the file-based
      `PatternLibraryV1` GDELT-clustering artifacts at
      `$PROP_FIRM_ROOT/shared/pattern-library/` are empty.

      Per operator design (2026-05-26, verbatim): "We have lookback
      and hindsight and can say we should do X when we see Y and store
      that pattern for the future." This piece implements that as a
      *clustering-on-outcomes* approach (rather than the existing
      *clustering-on-inputs* `PatternLibraryV1` GDELT design): the
      builder backtests with full forward-visibility, identifies the
      ideal action per bar (long/short/flat that achieves best risk-
      adjusted PnL over a forward window — gated by an MFE-vs-MAE
      quality filter against random sideways noise), and stores the
      `(signal_snapshot, ideal_action, achieved_outcome)` tuple. At
      live decision time, `pattern_match.fetch()` reads the current
      bar's signal snapshot, looks up the matching cell in the
      library, and proposes the modal historical ideal action with
      confidence reflecting sample size + outcome consistency.

      Storage: parquet artifacts at `$PROP_FIRM_ROOT/shared/pattern-hindsight/<build_id>/`,
      separate from existing `shared/pattern-library/<version>/` so
      the two coexist during A-B. Build_id = hash of
      `(t_train_start, t_train_end, forward_window_bars, quality_atr_k)`.
      A *family* of snapshots is produced (e.g., quarterly) so
      backtests can consult the snapshot whose training window ends
      strictly before the test window — the **temporal-leakage guard**
      (hindsight IS lookahead; the only valid use at decision time is
      a library built on data ending before the decision bar).

      Signal-snapshot key: discrete tuple
      `(regime_cell, technical_bucket, account_posture_state, tod_band)`.
      No raw OHLCV / no raw indicator numbers in the key (NN-C-007).
      Sample-size confidence tiers reuse `PatternLibraryV1` defaults
      (`min_strong_samples = 20`, `min_weak_samples = 8`). Below-floor
      cells return uncertain/0.0/`pattern_library_cold`.

      The companion LOW backlog item `pattern_library DB-mirror
      migration` is OBSOLETED by this piece (parquet not SQL).

      Activation gating: pattern_match is *always-on once live*; a
      half-wired pattern library shipping mid-piece would contaminate
      every other adapter's measured `used_delta` in oversight-rd's
      scorecard and any re-run of `policy-regime-calibration`. This
      piece MUST be tested in isolation (stub-injection harness from
      oversight-rd Phase 4 verified for new adapter) and gates
      activation on a per-strategy / per-regime acceptance threshold:
      pattern_match in a fresh oversight-rd-style audit on
      `shared/baselines/v1/` produces non-uncertain direction on ≥
      60% of bars in at least one regime cell with
      directional_accuracy ≥ random.

      Pre-spec design doc:
      `docs/prds/prop-firm/specs/pattern-hindsight/draft-design.md`
      (authored on `piece/prop-firm-oversight-rd` parallel-handoff B
      2026-05-26 as a brainstorm — surfaces 6 open questions with
      recommendations for the eventual spec to ratify or override).

      Out of scope: NO replacement / deletion of `PatternLibraryV1`
      (dormant on disk until a separate deprecation piece). NO
      live-news-driven incremental update of the library (static
      artifact, periodic rebuild). NO LLM augmentation. NO NN-trained
      pattern matching (that's `phase-X-pattern-library-v2`, future,
      deferred). NO per-regime weight tuning of pattern_match in
      oversight (that's `policy-regime-calibration` once this piece
      produces non-uncertain output).

      Recommended next action: /spec-flow:spec prop-firm/pattern-hindsight.
    prd_sections:
      - FR-PATTERN-01    # PatternLibrary FRs (existing — extended for hindsight schema)
      - FR-PATTERN-02
      - FR-PATTERN-03
