  - name: consistency-profit-guard
    slug: consistency-guard
    status: merged
    merged_at: 2026-05-31
    notes: |
      Added 2026-05-30 from phase-10 scenario-calibration findings (WAVE R,
      Tier-2 Combine-passing — small piece, could fold into adaptive-sizing).
      Research + rationale:
      docs/prds/prop-firm/specs/phase-10/survival-features-research.md §5-§7.
      Closes capability gap #4: the bot has NO awareness of the Topstep
      consistency rule (best day ≤ 50% of the $3,000 target). A single outsized
      winning day silently INFLATES the bot's own Profit Target (new total =
      best-day ÷ 0.50), making the Combine harder to pass. Acceptance =
      phase-10 regime envelopes (the big-winning-day cases).
      SPEC (2026-05-30): the "remaining Profit Target" wording below was
      superseded at brainstorm by an operator decision — the cap is the
      config-derived, constant `consistency_max_best_day_ratio × profit_target`
      (50% of the WHOLE target; scales with the account seed), enforced as a
      pre_entry BLOCK + session lockout latch that never cuts open winners.
      description/exit_criteria corrected accordingly. Full spec:
      docs/prds/prop-firm/specs/consistency-guard/spec.md.
    description: >
      A risk-engine guard that stops-for-the-day (blocks new entries + latches a
      session lockout, mirroring the DLL) once a single day's booked profit
      reaches the config-derived consistency cap
      (`consistency_max_best_day_ratio × profit_target`, ≈50% of the whole
      target, scaling with the account seed), so the bot never inflates its own
      target via the consistency rule. Never cuts open winners. Reads the firm
      consistency parameters; no new strategy logic. Prop-combine only — never
      wired into personal-trading configs.
    prd_sections:
      - NN-P-007
    exit_criteria: >
      No single trading day's booked profit exceeds the config-derived
      consistency cap (`ratio × profit_target`) under the guard — enforced by a
      pre_entry BLOCK once the cap is reached plus a session lockout latch;
      phase-10 regime scenario envelopes pass. FR/AC authored at spec time
      (10 FRs / 13 ACs in spec.md).
    depends_on:
      - phase-9-strategy-router-portfolio
      - phase-10-validation-suite

