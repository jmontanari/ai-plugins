  - name: oversight-validation-and-combination-rd
    slug: oversight-rd
    status: merged
    merged_at: 2026-05-27
    description: >
      Successor to `unify-runtime-policy` (merged 2026-05-25 at
      commit 5188358e). The predecessor codified NN-C-011 and wired
      all 5 LOW/MEDIUM-cost EvidenceSource adapters
      (account_posture, rule_engine, news_flow, regime, technical)
      into the shared `run_one_tick` per-tick path, plus pattern_match
      (HIGH) and the news_sentiment stub. But four unanswered
      questions persist about the per-tick combination mechanism:
      (a) HEARD — does each adapter actually produce non-trivial
      signal at the bar level? (b) USED — does each adapter's signal
      actually move the verdict (or is its contribution dominated
      by other sources)? (c) CORRECT — when an adapter says
      'supports' or 'against', does that prediction align with
      realized PnL? (d) ARBITRATION — when adapters disagree, the
      current `combine_evidence` does a flat weighted-average that
      treats all 7 as commensurable voters, but they have different
      ROLES: `halts` and `rule_engine` are GATES (any veto should
      short-circuit, not be averaged in), `account_posture` is a
      CONTEXT modulator (it should adjust thresholds, not vote on
      direction), and only 4 (regime, technical, news_flow,
      pattern_match) are true directional SIGNALS. The current
      undifferentiated weighted-average can let a strong gate veto
      be diluted by signals, or let a context contribute a phantom
      directional vote it shouldn't have.

      Scope: validation + redesign in one piece. (1) Per-adapter
      role classification — add `role: ClassVar[Literal["gate",
      "signal", "context"]]` to the EvidenceSource protocol; each
      adapter declares its role. Provisional mapping (operator-
      confirmed): gates = halts + rule_engine; signals = regime +
      technical + news_flow + pattern_match; context =
      account_posture; deprecated = news_sentiment.
      (2) Redesigned `combine_evidence` with sequential 3-tier
      semantics: Step 1 — evaluate all GATES; any gate returning
      direction='against' short-circuits to BLOCK. Step 2 — compute
      weighted-average across SIGNAL adapters only (signals-only
      subset of EvidenceWeights). Step 3 — CONTEXT adapters
      modulate the signal posterior's effective thresholds (e.g.,
      `account_posture` in drawdown raises `allow_min_confidence`
      from 0.60 → 0.75). Step 4 — apply modulated thresholds →
      ALLOW/REDUCE/BLOCK. Direct replacement (no feature flag) —
      project is pre-production. (3) Counterfactual stub-injection
      audit harness — `BacktestEngine.__init__` gains
      `stub_evidence_sources: set[str] | None = None`; swapping
      named adapters for `DoNothingEvidenceSource` enables
      per-adapter ablation. (4) Per-(regime × adapter × strategy)
      scorecard with five metrics: `heard_rate` (fraction of bars
      adapter produces non-uncertain direction OR confidence ≥
      0.1), `used_delta` (absolute fractional change in
      ALLOW/REDUCE/BLOCK counts when adapter stubbed),
      `directional_accuracy` (fraction of supports-then-entries
      with PnL > 0 + fraction of against-then-entries with PnL ≤ 0,
      scored over each strategy's own lookback window per
      FR-STRAT-03), `disagreement_rate` (fraction of bars adapter
      direction differs from signals-consensus direction),
      `dissenter_correctness` (when dissenting, fraction where
      adapter direction aligned with realized PnL better than
      consensus). (5) Per-regime iterable audit — `prop_trader audit
      adapters --regime <cell>` runs one regime cell at a time so
      operator can iterate cell-by-cell, view scorecard, and
      capture verdicts (`keep`/`keep-at-zero`/`remove`/`reclassify
      role`) with hardcoded heuristic defaults and per-adapter
      rationale. Skipped: news_sentiment (already a permanent
      DoNothingEvidenceSource stub per 2026-05-24 backlog
      disposition). (6) NN-C-011 parity test extension — the
      redesigned `combine_evidence` MUST be parity-tested
      live↔backtest at every code path (gate short-circuit, signal
      weighted-avg, context modulation). (7) Charter doctrine —
      a new section in `charter-intelligence-architecture` (or
      sibling) naming role-aware combination the project-standard
      mechanism, plus a candidate NN-C-012
      (Combination-Role Doctrine) — finalize NN status at QA time.
      (8) Audit run produces
      `shared/oversight-calibration/v1/adapter_scorecard.json` as
      machine-readable input to the successor
      `policy-regime-calibration` piece.

      Re-baselining note: changing `combine_evidence` semantics
      will shift the cal-measure-rework microscope matrix numbers
      because oversight gating behavior changes. Re-baseline is
      expected as a side effect of this piece — operator must
      re-run the canonical baseline at `shared/baselines/v1/` post
      merge OR accept that the previous per-cell efficiency
      numbers no longer compare apples-to-apples.

      Out of scope: NO per-regime `EvidenceWeights` or
      `EvidenceThresholds` tables (deferred to
      `policy-regime-calibration` — that piece tunes the per-regime
      knobs of THIS piece's new role-aware mechanism). NO per-regime
      entry-trigger tuning in strategies/. NO per-regime
      exit-primitive tuning in rules/. NO `OversightPolicy`
      regime-resolution code path. NO new EvidenceSource adapters
      (REGISTERED_SIGNAL_SOURCES stays the closed set per FR-OS-26).
      NO new strategies. NO new measurement engine (reuses
      cal-measure-rework's ExerciseRunner as bar-window source).
      NO LLM augmentation tuning. NO live trading enablement.

      Predecessor handoff:
      `docs/prds/prop-firm/specs/unify-runtime-policy/handoff.md`
      seeded NN-C-011 + run_one_tick Step 8 + the 7-adapter wiring;
      the post-merge state in `intelligence/oversight/_config.py`
      shows the current global weights + thresholds the AUDIT scores
      adapter contribution against. The successor piece
      `policy-regime-calibration` consumes this piece's scorecard
      AND the new role-aware combination mechanism as its
      starting state.

      Recommended next action:
      /spec-flow:spec prop-firm/oversight-rd.
    prd_sections:
      - FR-EVIDENCE-01    # EvidenceItem schema — role field is a new attribute
      - FR-EVIDENCE-03    # combination function — REDESIGNED role-aware
      - FR-EVIDENCE-05    # verdict thresholds — modulated by context adapters
      - FR-EVIDENCE-06    # A/B baseline tracking — counterfactual stub IS A/B
      - FR-OS-26          # REGISTERED_SIGNAL_SOURCES closed set
      - FR-RT-04          # OversightPolicy review() — combine_evidence is its core
      - FR-STRAT-03       # per-strategy config — audit_lookback_bars is a new attribute
      - NN-P-005          # mandatory evidence stack — role-aware preserves the floor
      - NN-P-006          # signal independence — zero used_delta surfaces hidden coupling
      - SC-003            # adapter correctness for the full registered set
    internal_phases:
      - "Phases detailed at plan time. High-level (11 phases, several parallelizable via Phase Groups): (Phase 0) charter doctrine + EvidenceSource role metadata schema. (Phase 1) declare role on all 7 adapters (provisional mapping). (Phase 2) redesign combine_evidence — sequential Gates → Signals → Contexts; direct replacement, no flag. (Phase 3) NN-C-011 parity test extension for new combine_evidence. (Phase 4) counterfactual stub-injection harness (BacktestEngine `stub_evidence_sources` param + audit module). (Phase 5) heard metric. (Phase 6) used metric. (Phase 7) correct metric — per (adapter × regime × strategy) with strategy-specific lookback (new `audit_lookback_bars` strategy config attribute). (Phase 8) disagreement metrics (disagreement_rate + dissenter_correctness). (Phase 9) per-regime CLI subcommand + scorecard schema + operator verdict prompt with hardcoded heuristic defaults. (Phase 10) full audit run on canonical baseline `shared/baselines/v1/` + operator verdicts captured + decision.md authored naming `policy-regime-calibration` as successor with adapter-inclusion list populated. Phases 5-8 are candidate Phase Group sub-phases (parallelizable — each metric is independent measurement)."
    exit_criteria: >
      (a) EvidenceSource protocol carries `role: ClassVar` field;
      all 7 adapters declare role; (b) `combine_evidence` redesigned
      with sequential Gates → Signals → Contexts semantics — direct
      replacement, prior weighted-average path deleted; (c)
      NN-C-011 parity test extended with role-aware fixtures
      (gate-short-circuit case, signals-only case, context-modulated
      case) + all pass; (d) counterfactual stub-injection harness
      committed (BacktestEngine supports `stub_evidence_sources`
      parameter); (e) per-(regime × adapter × strategy) scorecard
      run produces `shared/oversight-calibration/v1/adapter_scorecard.json`
      with five metrics per cell across the 9-cell canonical
      baseline; (f) `prop_trader audit adapters --regime <cell>`
      CLI subcommand committed + per-regime iterable + emits
      operator-verdict prompt with hardcoded heuristic defaults;
      (g) verdicts (`keep`/`keep-at-zero`/`remove`/`reclassify
      role`) recorded for each adapter — rationale field non-empty;
      (h) charter doctrine for role-aware combination committed
      (NN-C-012 candidacy decided at QA time); (i) `decision.md`
      authored naming `policy-regime-calibration` successor +
      adapter-inclusion list populated from scorecard; (j) all
      existing tests pass against new combine_evidence (no
      regressions); (k) `prop_trader dev verify` exits 0.
    depends_on:
      - unify-runtime-policy
    dependency_note: >
      `unify-runtime-policy` (merged 2026-05-25 at commit 5188358e)
      is a hard logical prerequisite — the audit operates on the
      7-adapter wiring it landed in `run_one_tick`, and the
      stub-injection mechanism depends on `BacktestEngine`
      constructing `OversightPolicy` (the unify-runtime-policy code
      path). The redesigned `combine_evidence` also requires the
      NN-C-011 parity test infrastructure from the predecessor as
      its starting point. Branch base: `master` post predecessor
      merge.

  - name: policy-regime-calibration
    slug: policy-regime-cal
    status: done
    merged_at: TBD
    notes: |
      Done 2026-05-28 with DISCOVERY-BASED EXIT. Wiring + iter-1 measurement
      substrate shipped (21 commits closing Gaps 1-17). Iter-1 wide sweep
      across 11 cells × 12,500 grid points = 137,500 backtest rows produced
      MAX efficiency 1.001% (vs 50% target — strategy library does not fit
      populated regimes; worse than strategy-rd's 5.6% baseline). Two
      successor pieces named: strategy-rd-3 (strategy redesign) and
      calibration-2 (per-cell tuning loop, gated on strategy-rd-3 lift).
      Original exit criteria (d) + (e) reframed below as
      "wiring + iter-1 substrate" rather than "per-cell winning configs"
      — see docs/prds/prop-firm/specs/policy-regime-cal/decision.md for
      the full rationale, the 21-commit chain, the iter-1 finding chain
      that surfaced 5 structural issues, and the 2-successor handoff.

    description: >
      Successor to `oversight-rd`. The predecessor delivered (a) a
      redesigned role-aware `combine_evidence` mechanism with
      Gates → Signals → Contexts sequential semantics and (b) a
      per-(regime × adapter × strategy) scorecard with operator
      verdicts on each adapter's keep/zero/remove decision. This
      piece JOINTLY tunes per-regime configuration across three
      subsystems whose calibration is coupled: oversight weights+
      thresholds (signal subset only — gates and contexts are NOT
      weighted under the new mechanism), strategy entry triggers,
      and rule-engine exit primitives. Splitting per-regime tuning
      into separate pieces would measure each subsystem's "winners"
      against stale knobs in the other two subsystems and produce
      dishonest per-cell numbers; this piece preserves the coupling
      by extending the cal-measure-rework ExerciseRunner with a
      unified `--policy-grid` that sweeps all three surfaces together
      per regime cell.

      Scope: (1) Extend `EvidenceConfig` (oversight) with
      `weights_by_regime: dict[str, EvidenceWeights] | None` and
      `thresholds_by_regime: dict[str, EvidenceThresholds] | None`,
      back-compat null = current global behavior. (2) Extend
      strategy config schemas (per `FR-STRAT-03`) with per-regime
      entry-trigger overrides — schema-only, back-compat null
      preserves global behavior. (3) Extend rule-engine config (per
      NN-C-010 firm-config patterns) with per-regime exit-primitive
      overrides — schema-only, same back-compat shape. (4)
      `OversightPolicy` + `Strategy` + `DeclarativeRuleEngine` each
      gain a regime-resolution code path that consumes
      `daily_context.compound_regime` (3-component short-form keying:
      bull/bear/transitional × shock/calm/normal × flat) and selects
      the matching per-regime row. (5) Extend cal-measure-rework
      ExerciseRunner with a `--policy-grid` parameter that sweeps the
      joint (oversight × entry × exit) per-regime knob set per
      cell, against the canonical baseline at
      `shared/baselines/v1/regime_map/`. (6) Run the joint sweep, pick
      per-cell winners by composite_pnl_lift × preservation_pass,
      land winning configs in `configs/intelligence.yaml` +
      `configs/strategies/*.yaml` + `configs/firms/*.yaml`. (7)
      Extend `tests/integration/runtime/test_live_backtest_parity.py`
      with a per-regime fixture matrix (NN-C-011 compliance gate —
      regime-resolution code path itself must not drift). (8) Charter
      doctrine: a new section (`charter-intelligence-architecture` or
      a sibling) naming per-regime calibration the preferred substrate
      for the 3-subsystem coupled tuning, with rationale tied to
      observed lift.

      Adapter inclusion list: consumes
      `shared/oversight-calibration/v1/adapter_audit.json` from
      predecessor. Adapters marked `remove` are stubbed in the
      sweep; adapters marked `keep-at-zero` get weight=0 in every
      per-regime row; adapters marked `keep` are tunable knobs in
      the sweep grid.

      Out of scope: NO new adapters. NO new strategies. NO new
      measurement engine. NO live trading. NO Signal 3 wire-up.

      Activation: after `oversight-rd` merges and
      its scorecard verdicts are operator-approved.

      Recommended next action (gated on predecessor merge):
      /spec-flow:spec prop-firm/policy-regime-cal.
    prd_sections:
      - FR-EVIDENCE-03    # combination function + weights config
      - FR-EVIDENCE-05    # verdict thresholds
      - FR-STRAT-03       # per-strategy config schema (entry triggers)
      - FR-STRAT-06       # matrix-bar gate — exit primitives part of preservation gate
      - FR-RT-04          # OversightPolicy review() contract
      - NN-P-002          # config precedence (per-regime over global)
      - NN-P-005          # mandatory evidence stack
      - NN-P-006          # signal independence
