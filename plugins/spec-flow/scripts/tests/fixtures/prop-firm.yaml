      mismatch) + `news_relevance.yaml` schema. (5) pgvector workflow
      assessment: news_embeddings has 0 rows, 0 chunks; design the embedding
      workflow given no headline prose ships from GDELT — what gets
      embedded (theme tags? URL? scraped prose if we add a 1-time ETL?),
