  - name: backfill-continuity-gate
    slug: backfill-continuity
    status: open
    description: >
      WAVE L (pre-live data-integrity gate) — before the live ingester is
      trusted as canonical, prove the historical backfill is complete and
      gap-free right up to the live-ingestion start boundary, so the canonical
      series (backfill for dates < ingester-start-date ∪ live for dates ≥ it,
      per SC-004) has NO discontinuity. Three strands: (1) GAP AUDIT — scan the
      existing backfilled record across the price stream and the key sources for
      holes / missing date ranges within expected coverage (session-calendar
      aware, roll-window aware); (2) CATCH-UP BACKFILL — the existing backfill
      was last run at a past date, so fill from each source's last-backfilled
      date up to the live-start boundary (the moment L-1 makes the ingester
      actually collect); (3) SEAM RECONCILE — assert no gap and no divergent
      overlap between the last backfilled bar and the first live bar, reusing
      L-1's reconcile machinery (live `bars` vs IntradayBarsAdapter rebuild,
      same Dukascopy lineage, p95 ≤ 2.5 bps). Output: a gap-free reconciled
      canonical series up to the seam + a committed continuity report with
      operator sign-off. This gates the "continuous series" assumption that
      shadow-validation and downstream backtests/calibration rely on.
    prd_sections:
      - FR-DATA-05
      - SC-004
      - SC-003
    internal_phases:
      - "Phases detailed at spec/plan time. High-level: (1) gap-audit tool over the historical record (per-source missing-range report, session/roll aware); (2) catch-up backfill driver to the live-start boundary; (3) seam-continuity assertion + reconcile at the backfill↔live boundary; (4) continuity report + operator sign-off gate."
    exit_criteria: >
      Gap-audit report shows no unexplained holes across the price stream + key
      sources up to the live-start boundary; catch-up backfill executed; the
      backfill↔live seam has no gap and reconciles within tolerance; continuity
      report committed and operator-signed. Specific FR/AC authored at spec time.
    depends_on:
      - live-ingester-ops              # L-1 — defines the live-start boundary + provides the gap-detection/reconcile framework
    dependency_note: >
      Continues on the WAVE-L branch lineage off live-ingester-ops. The
      live-start boundary is undefined until L-1 makes the ingester actually
      collect (pre-L-1 it crash-loops and collects nothing), so this gate runs
      after L-1 brings the ingester up. Runs parallel to L-2. Pre-requisite for
      trusting the continuous backfill∪live series in shadow-validation.

  - name: docker-deploy-consolidation
    slug: deploy-consolidation
    status: merged
    merged_at: 2026-06-06
    description: >
      WAVE L (deploy-infrastructure consolidation; operator-requested 2026-06-06
      during L-1 live deploy). Collapse the `docker/` folder's currently
      per-component, duplicated compose files into a SINGLE production
      docker-compose.yml that is THE production run (postgres + ingester + any
      future containers as services). Add a per-container BUILD-IMAGE script
      (build what each container needs, tag deterministically). The `deploy.sh`
      becomes the single gate: it takes whatever images are built and
      (re)starts the production docker-compose, then loads/refreshes the
      keepalives + monitoring. Self-contained: one command brings the whole
      production stack (DB + ingester) up. Folds in the credential/env handling
      so the launchd-managed run actually works.
      GAPS SURFACED DURING L-1 LIVE DEPLOY (this piece must fix):
        (1) the ingester launchd plist injects only DISCORD_WEBHOOK_URL, NOT
            PROP_TRADER_DB_URL — so a keepalive/launchd-managed `docker compose
            up` falls back to the password-less default and can't reach Postgres;
            the deploy must source the DB URL (from secrets/postgres_password)
            into the keepalive env (env-file preferred over plist, CR-032);
        (2) `docker/ingester/deploy.sh` does NOT build the image (assumes
            prop-trader-ingester:local exists) — the consolidated deploy.sh
            builds-then-deploys;
        (3) macOS Colima `network_mode: host` binds ports in the VM, so
            /health (9200) /metrics (9201) are not reachable from the macOS host
            (the in-container healthcheck works) — decide the production
            networking model (host vs bridge + published ports) here;
        (4) two compose files (postgres + ingester) duplicate network/secrets/
            keepalive wiring — collapse to one.
        (5) HIGH — shared-dir path mis-alignment breaks disk audit logs:
            `core.paths.paths()` derives logs/results/state/data/secrets/cache
            from `PROP_FIRM_ROOT/shared`, but the compose uses the SAME
            `${PROP_FIRM_ROOT}` var for BOTH the host bind-mount source AND the
            in-container env — they cannot share one value. In-container
            `PROP_FIRM_ROOT=/Volumes/...` (a host path) is not writable, so
            `LogReaction` (observability disk-audit reaction) fails on EVERY
            event: first FileNotFoundError, then (after L-1 added mkdir self-heal)
            `[Errno 13] Permission denied: '/Volumes'`. Primary Discord alerting +
            /metrics are unaffected, but the JSONL audit trail is lost + logs spam.
            FIX HOLISTICALLY: decide the shared/secrets/data/logs/results/state
            volume layout (likely a `PROP_TRADER_SHARED_DIR` override added to the
            core.paths env whitelist — getter + test + spec §2.3 + .env template —
            set to the in-container mount, with the bind-mount source as a SEPARATE
            host var). A piecemeal `PROP_TRADER_SHARED_DIR=/shared` alone would
            also redirect SECRETS + DATA to `/shared/...`, so the mount map must be
            designed coherently (do NOT do this without the volume-layout decision).
            L-1 left the code correct (LogReaction now mkdir-self-heals when the
            path IS writable); only the deploy env/volume wiring remains.
      L-1 left the ingester container verified-running + docker-healthy via a
      direct `docker compose up`; this piece makes that deployment self-contained,
      persistent (launchd + reboot survival with creds), and unified with the DB.
      OWNS (descoped from live-ingester-ops 2026-06-06): AC-4 RunAtLoad /
      reboot-survival (the persistent launchd run needs PROP_TRADER_DB_URL wired
      into the keepalive env, which this piece does correctly). L-1 verified the
      recovery mechanic (kill → keepalive restart → healthy).
    prd_sections:
      - FR-ING-06
      - NFR-LIO-03
    internal_phases:
      - "Phases detailed at spec/plan time. High-level: (1) one production docker-compose.yml (postgres + ingester services, shared network/secrets); (2) per-container build-image scripts; (3) deploy.sh = build-gate + compose (re)start + keepalive/monitor (re)load, with DB-URL + webhook env wired from the secrets layout; (4) production networking decision (host vs published bridge ports); (5) reboot-survival + recovery verification for the whole stack."
    exit_criteria: >
      A single `deploy.sh` builds the needed images and brings up the unified
      production docker-compose (DB + ingester), both reaching healthy; the
      launchd-managed run resolves PROP_TRADER_DB_URL + DISCORD_WEBHOOK_URL
      without manual env; /health + /metrics reachable per the chosen networking
      model; reboot-survival verified; the per-component compose files are
      removed in favour of the one production compose. Specific FR/AC authored at
      spec time.
    depends_on:
      - live-ingester-ops              # L-1 — provides the ingester deploy.sh / compose / keepalive / restart_monitor this consolidates
    dependency_note: >
      Continues on the WAVE-L branch lineage off live-ingester-ops. Consolidates
      both `docker/postgres/` and `docker/ingester/` deploy artifacts. L-1's
      ingester runs healthy via a direct compose up; this piece makes the whole
      stack a self-contained, persistent, single-command production deploy.

  - name: discord-bot-integration
    slug: discord-bot
    status: merged
    merged_at: 2026-06-07
    description: >
      Observability/ops enhancement (operator-requested 2026-06-06; originally
      floated early in WAVE-L). Grow the Discord alerting from the current
      fire-and-forget WEBHOOK + REST-only text path into a first-class Discord
      BOT integration so the bot can send rich/complex posts AND support two-way
      interaction.
      CURRENT STATE (what exists): `src/prop_trader/alerter/discord.py` uses
      discord.py 2.3.2 *raw REST* (no gateway). `AlerterConfig` already supports
      a bot path (`DISCORD_BOT_TOKEN` + `DISCORD_CHANNEL_ID` via `discord_bot_token`
      / `discord_channel_id`) that `_create_message` uses (`HTTPClient.send_message`)
      else falls back to the webhook; it does create-then-edit dedup. BUT it is
      text-`content`-only, ONE-directional, no gateway, no embeds/attachments,
      no commands. The deployed ingester uses the webhook.
      SCOPE (this piece): (1) RICH POSTS — Discord embeds (color-coded by
      severity, titled fields, timestamps) + attachments (e.g. reconcile p95
      drift plot, quarantine summary table, soak report, dashboard link) instead
      of plain text; threaded/grouped alerts so a recurring incident updates a
      thread rather than spamming the channel. (2) GATEWAY BOT — a persistent
      gateway connection (not just REST) so the bot is live + can receive events.
      (3) TWO-WAY INTERACTION — slash commands / operator actions FROM Discord:
      e.g. `/ingester status` (freshness/watermarks), `/ingester quarantine`
      (recent DQ rows), trigger `alert-test` / on-demand reconcile, and an
      ACK/silence workflow + the AC-14 receipt-confirmation done from Discord
      (operator signs from chat). (4) Keep the webhook as a degraded fallback;
      CR-032 secrets (bot token via env/secret, never embedded).
      OWNS (descoped from live-ingester-ops 2026-06-06): AC-13 (live alert-test
      to the real webhook/bot) + AC-14 (operator-confirmed receipt + FR-LIO-12,
      moved into Discord via the bot's two-way interaction). L-1 retains the
      `ingest alert-test` cmd + the AC-12 mock-webhook contract + the UNSIGNED
      receipt scaffold.
    prd_sections:
      - FR-OBS-02
      - FR-ING-05
    internal_phases:
      - "Phases detailed at spec/plan time. High-level: (1) embed/attachment rich-post layer over the existing alerter (severity-colored embeds, charts/files, threading/dedup); (2) gateway bot connection (discord.py gateway) with lifecycle + reconnect, alongside the REST send path; (3) two-way slash commands / interactions (status, quarantine, alert-test, reconcile, ack/silence); (4) AC-14 receipt-confirmation-from-Discord workflow; (5) webhook fallback + secrets/test (mock-gateway in CI, @live for the real bot)."
    exit_criteria: >
      The bot posts severity-colored embeds (+ attachments where relevant) for
      the live-ingester alert kinds; a persistent gateway connection is up with
      reconnect; at least one two-way slash command works end-to-end (e.g.
      `/ingester status`); an ack/receipt interaction is wired (incl. the AC-14
      receipt confirmation from Discord); webhook fallback retained; tested with
      a mocked gateway in CI + a `@live` real-bot smoke. Specific FR/AC authored
      at spec time.
    depends_on:
      - live-ingester-ops              # L-1 — lands the alerting foundation: DiscordAlerter wiring, routing.yaml severity routing, the bus→DiscordReaction→alerter path
      - docker-deploy-consolidation    # provides the single production compose + FR-DC-13 "add a service" pattern + bot-token/no-webhook deploy decision; gates the bot-container phase (added at spec time 2026-06-06, operator-chosen execution-gate)
    dependency_note: >
      Builds on L-1's alerting foundation (the real DiscordAlerter wired into the
      observability runtime + routing.yaml). L-1 already exercises the alert route
      end-to-end via webhook (AC-12/13) and scaffolds the AC-14 receipt; this
      piece upgrades the channel to a full bot (rich posts + two-way) and can
      move the AC-14 operator-confirmation into Discord itself.
    notes: >
      DESIGN CAPTURED 2026-06-06 (during docker-deploy-consolidation /spec-flow:spec
      brainstorm; this scope was briefly merged in then reverted to keep the bot in
      its own piece — finalize these at this piece's own spec): (1) the bot lands as
      its OWN gateway container, added as a service to the single production compose
      via the multi-service "add a service" pattern that docker-deploy-consolidation
      establishes; (2) code lives in a NEW top-level package src/prop_trader/discord_bot/
      (gateway lifecycle + slash commands + DB-backed handlers) — alerter/ keeps the
      embed/payload building so its "consumes only core" layer contract stays intact;
      this piece authors the discord_bot import-linter contract (consumes core + data +
      observability + alerter); (3) LEADING ARCHITECTURE (confirm at spec time): enrich
      the EXISTING in-process DiscordAlerter with embeds/attachments (embeds work over
      REST/webhook — no gateway needed for rich posts, so L-1's stabilized alert-delivery
      path is untouched, just richer) + a SEPARATE gateway container ONLY for the
      genuinely two-way features (slash commands, ack/receipt) that read the DB.
      Alternative considered: centralize all posting in the bot via the existing
      discord_spool (purer "one bot owns Discord" but reworks L-1's delivery path);
      (4) secrets scope = env_file [infra.env, discord.env] (discord.env = bot token +
      channel id + webhook fallback; NO ingest/firm creds) per the NN-C-009 per-service
      isolation pattern; (5) command set per this entry's SCOPE block (/ingester status,
      /ingester quarantine, alert-test, on-demand reconcile, ack/silence, AC-14 receipt).

  - name: observability-stack
    slug: observability-stack
    status: open
    description: >
      WAVE L (ops/observability; operator-requested 2026-06-06 during the
      docker-deploy-consolidation /spec-flow:spec). Stand up the dedicated
      metrics CONSUMER stack. Every long-running container is a metrics
      PRODUCER — each publishes a Prometheus-shaped `:9202/metrics` endpoint
      (FR-OBS-05) plus a `:9201/dashboard` — but today there is no always-on
      consumer that scrapes, stores, reports, and monitors ACROSS all
      producers (operator framing: "each container generates a producer of
      metrics; we need Grafana/Prometheus/InfluxDB or similar to consume,
      report, and monitor"). This piece adds a Prometheus container (scrape +
      TSDB retention) and a MINIMAL Grafana overview — the PRD caps Grafana at
      "minimal overview" (prd.md §6 non-goals) — as their own service(s) in
      the single production compose, via the multi-service "add a service"
      pattern that docker-deploy-consolidation establishes. Wire scrape
      targets to each producer on the compose bridge network; ship a minimal
      cross-service dashboard (uptime, rows_ingested, watermark_lag,
      error_rate, tick_budget_p95) + a small set of alert rules routed through
      the existing Discord severity path. Builds on the seed
      `docker/observability-federation/` Prometheus container (scrape config
      lives at repo-root `infra/dev-box/prometheus.yml`).
    prd_sections:
      - FR-OBS-05
      - SC-009
    internal_phases:
      - "Phases detailed at spec/plan time. High-level: (1) Prometheus container as a production-compose service (scrape config targeting each producer's :9202 on the bridge net + TSDB retention); (2) minimal Grafana overview container + provisioned dashboard, held within the 'minimal overview' non-goal; (3) alert rules routed to Discord via the existing severity path; (4) reachable-from-host + scrape-clean verification."
    exit_criteria: >
      Prometheus scrapes every producer's `:9202/metrics` cleanly on the
      bridge network; a minimal Grafana overview renders the core
      cross-service panels; at least one alert rule fires end-to-end to
      Discord; the stack comes up as part of the single production deploy and
      is reachable per the chosen networking model; respects the PRD "Grafana
      beyond a minimal overview" non-goal. Specific FR/AC authored at spec
      time.
    depends_on:
      - docker-deploy-consolidation    # provides the one production compose + the "add a service" pattern + the published producer endpoints
    dependency_note: >
      The metrics PRODUCERS (MetricsEmitter, the `:9202/metrics` + `:9201`
      surfaces) are delivered by phase-3-observability-core + phase-11; this
      piece is the dedicated CONSUMER. It consumes the producer side that
      docker-deploy-consolidation keeps intact (each service publishes its
      metrics endpoint reachable on the compose bridge network) and the
      multi-service extensibility that piece establishes. Gated on
      docker-deploy-consolidation landing the unified production compose.

  # ════════════════════════════════════════════════════════════════════════
  # TRADING MANAGER epic (added 2026-06-07, PRD v2)
  # The missing runtime decision/selection layer: perceive regime → eligibility
  # → expected-value selection → survival-tiered sizing → transition adaptation,
  # calibrated offline to maximize survival-weighted P&L within Topstep rules.
  # Supersedes strategy-rd-3. Sequences BEFORE the (re-gated) shadow-validation
  # → phase-11 live path. Problem definition + method + decomposition + gating:
  #   docs/research/2026-06-07-trading-manager-problem-definition.md
  # ALL pieces obey NN-P-008 (calibration honesty invariants) + NN-C-011 (parity)
  # + NN-C-012 (hindsight isolation). Critical path (post qa-prd must-fixes):
  #   regime-perception-verify → per-trade-gap-diagnostic → regime-characterization
  #   → ev-selection-layer / survival-tiered-sizing → regime-calibration-loop-harness
  #   → regime-calibration-pilot (A) → transition-adaptation (B)
  #   → news-decision-calibration → trading-manager-integration → shadow-validation
  # (perception-verify gates characterization so EV/char aren't built on a stub;
  #  the loop is split into deterministic HARNESS + open-ended research PILOT so the
  #  engineering pieces complete independently of the research outcome.
  #  news-decision-calibration (2026-06-07) calibrates strategy+rules+news TOGETHER
  #  into the per-regime decision and GATES integration [operator decision]; it
  #  completes either way — positive lift OR honest provenance-backed zero — so the
  #  gate terminates and cannot stall integration on a research outcome.)
  # ════════════════════════════════════════════════════════════════════════
  - name: per-trade-gap-diagnostic
    slug: gap-diagnostic
    status: merged
    specced_at: 2026-06-07
    planned_at: 2026-06-07
    merged_at: 2026-06-07
    description: >
      The missing instrument. Surface the per-trade gap report and build
      MAE/MFE/E-Ratio attribution. For each actual trade in a continuous walk,
      emit a structured {actual_action, ideal_action (constrained ceiling),
      pnl_gap, error_type} record — matched actual→ideal via CeilingMatcher —
      and classify each gap into exactly one error type from the fixed taxonomy
      (should-not-have-traded / direction / entry-timing / early-exit /
      late-exit / stop-too-tight / stop-too-wide / sizing / wrong-selection).
      Assembles primitives that already exist (compute_ceiling at
      calibration/hindsight/ceiling.py:203, compute_per_trade_metrics at
      per_trade_grading.py:156, CeilingMatcher) but are immediately aggregated
      away into a cell scorecard and never surfaced per-trade; adds the missing
      ATR-normalized per-bar E-Ratio. Rolls up by regime and by transition
      window to surface the SYSTEMATIC (recurring) error. Hindsight-isolated
      under calibration/hindsight/ (NN-C-012). This is the diagnostic engine the
      OADHVC loop reads — it is NOT a gate (NN-P-008 invariant 2/3).
    prd_sections:
      - FR-TM-01
      - FR-TM-02
      - NN-P-008
    internal_phases:
      - "Detailed at plan time. High-level: surface per-trade list from per_trade_grading; constrained-ceiling matcher wiring; MAE/MFE/exit-efficiency; ATR-normalized E-Ratio; error-type classifier (taxonomy); per-regime + per-transition rollup; structured report artifact."
    exit_criteria: >
      Given a walk's actual trades + the constrained ceiling, the engine emits a
      per-trade gap report with a single classified error_type per trade and
      regime/transition rollups; verified against hand-computed MAE/MFE/E-Ratio
      on a known-outcome episode; lives entirely under calibration/hindsight/
      (NN-C-012 import-linter green).
    depends_on:
      - calibration-harness-validity-rd
      - ceiling-realism-rd

  - name: regime-characterization
    slug: regime-char
    status: open
    description: >
      Derive the empirical "what/when to trade" per regime — the thing that has
      never existed in validated form. From the constrained-ceiling oracle + tape,
      profile each regime: trade frequency, time-of-day concentration, direction
      bias, hold-duration distribution, typical size, and the STAND-ASIDE signal
      (low ideal-P&L density ⇒ don't-trade). Output is the eligibility menu + the
      tuning target; replaces configs/routing/regime_to_strategies.yaml's
      failed-sweep provenance as the source of "what to trade per regime."
      Granularity is DATA-DRIVEN (FR-TM-04): a regime splits finer only when its
      per-trade gap data shows a distinct, recurring behavior justifying its own
      playbook — countering the prior arc's manufactured data starvation (the
      27-cell compound grid + ≥60%-purity slicing left only 2/11 cells gradeable,
      while the raw tape is ~1,800 days; see research doc §5).
    prd_sections:
      - FR-TM-03
      - FR-TM-04
      - NN-P-008
    internal_phases:
      - "Detailed at plan time. High-level: per-regime oracle profiling (frequency/time-of-day/direction/hold/size); stand-aside signal derivation; eligibility-menu artifact; data-driven split-decision test; regenerate routing eligibility from the FIXED harness (not the failed sweep)."
    exit_criteria: >
      A per-regime characterization artifact (eligibility menu + behavioral
      profile + stand-aside signal) is produced from the oracle+tape for the
      pilot regimes; the split-decision test is pinned; replaces the failed-sweep
      routing eligibility for those regimes.
    depends_on:
      - per-trade-gap-diagnostic
      - ceiling-realism-rd
      - regime-perception-verify   # must-fix #4: characterization consumes causal regime labels — gate on verified perception, not a possible stub

  - name: ev-selection-layer
    slug: ev-selection-layer
    status: open
    description: >
      The first-class SELECTION criterion the prior arc completely missed.
      Replace the entire selection logic — today one line,
      sorted(contributing, key=lambda p: (-p.signal_strength, p.strategy_id))
      at portfolio/risk_manager.py:78 — with a regime-conditional EXPECTED-VALUE
      selector that ranks competing proposals by calibrated per-regime dollar
      expectancy under the 5-contract budget. signal_strength becomes an input,
      not the decision. The per-regime expectancy table is produced + versioned
      by the calibration loop (FR-TM-06) and read as pinned config at runtime —
      no hindsight at decision time (NN-C-012). Runs identically in backtest and
      live (NN-C-011). "During regime X choose certain trades over others because
      they earn more" — this is where that lives.
    prd_sections:
      - FR-TM-05
      - FR-TM-06
      - NN-P-008
      - SC-012
      - SC-013
    internal_phases:
      - "Detailed at plan time. High-level: EV-table schema + provenance; selector replacing the signal_strength sort under the contract budget; pinned-config runtime read (NN-C-012); A/B harness vs signal_strength baseline (SC-013); NN-C-011 backtest↔live parity test."
    exit_criteria: >
      SC-013: in an A/B over the same walk the EV selector adds net realized
      dollars over the signal_strength baseline; selector reads only pinned
      config (NN-C-012 green); backtest↔live parity verified.
    depends_on:
      - regime-characterization

  - name: survival-tiered-sizing
    slug: survival-sizing
    status: open
    description: >
      Size for survival, not raw edge. A DLL-consumed three-tier policy
      (green/yellow/red at configured fractions of the $1,000 daily loss limit),
      bounded by $2,000-trailing-DD proximity and the 5-contract cap, with
      regime-aware volatility targeting; reject any sizing that admits
      non-trivial trailing-DD breach probability. Plus a consistency-aware daily
      cap that shapes the P&L path so no single day exceeds the 50%
      consistency-rule fraction of cumulative profit (stand down once the
      regime-appropriate daily target is met). Extends the merged
      adaptive-position-sizing (firm-global today) with the per-regime + tiered +
      consistency-aware behavior. ~85% of Combine failures are
      drawdown/consistency — this addresses the dominant failure mode directly.
    prd_sections:
      - FR-TM-07
      - FR-TM-08
      - NN-P-008
      - SC-012
    internal_phases:
      - "Detailed at plan time. High-level: DLL-consumed green/yellow/red tiers; trailing-DD proximity bound (breach P ≤ 2% default, config-pinned); regime-aware vol target; breach-probability rejection; consistency-aware daily cap + stand-down."
    exit_criteria: >
      Sizing respects the $2,000 trailing floor / $1,000 daily limit / 5-contract
      cap with the three-tier policy + consistency cap; on the pilot walk no
      trailing-DD breach and no consistency-rule violation; sizing is
      regime-aware via pinned config.
    depends_on:
      - adaptive-position-sizing
      - consistency-profit-guard
      - regime-characterization   # nit #10: sizing is regime-aware (FR-TM-07) → depends on the regime definitions

  - name: regime-calibration-loop-harness
    slug: regime-cal-harness
    status: open
    description: >
      Part A infrastructure (deterministic, bounded — split from the research run
      per qa-prd must-fix #2). Build the OADHVC loop machinery: Observe (causal
      continuous walk on the NN-C-011 engine path) → Attribute (per-trade gap,
      this epic's diagnostic) → operator-gated hypothesis ledger (records
      hypothesis / mechanism / in-sample window / holdout window / before-after
      survival-weighted dollars) → walk-forward acceptance gate (survival-weighted
      dollars, out-of-sample) → per-regime playbook persistence. Includes the
      NN-P-008 CI checks: gate-metric-is-dollars unit test, holdout-improvement
      provenance check (invariant 4), and the SELECTION-SET PARITY assertion
      (invariant 6 / FR-TM-06: the EV table's calibration candidate set == the
      runtime eligibility menu for the same regime). No research outcome required
      — this piece is "done" when the loop runs correctly and the gates/CI hold.
    prd_sections:
      - FR-TM-09
      - NN-P-008
    internal_phases:
      - "Detailed at plan time. High-level: continuous-walk harness on the NN-C-011 path; gap-attribution wiring; operator-gated hypothesis ledger schema; walk-forward survival-dollars acceptance gate; per-regime playbook persistence; NN-P-008 CI checks (dollars-gate test, holdout-provenance check, selection-set-parity assertion)."
    exit_criteria: >
      The loop runs end-to-end on the NN-C-011 path; the acceptance gate rejects
      a seeded in-sample-only improvement and accepts a seeded out-of-sample one;
      the dollars-gate, holdout-provenance, and selection-set-parity CI checks are
      green. Bounded engineering completion — independent of any research result.
    depends_on:
      - per-trade-gap-diagnostic
      - regime-characterization
      - ev-selection-layer
      - survival-tiered-sizing

  - name: regime-calibration-pilot
    slug: regime-cal-pilot
    status: open
    description: >
      Part A research run (open-ended — split from the harness per qa-prd
      must-fix #2 + #9; its duration depends on a research outcome that may not
      converge, so it must not gate the deterministic harness/integration pieces).
      Run the OADHVC loop on the data-rich pilot regimes: Diagnose (operator/Claude
      names the dominant systematic error + mechanism) → Hypothesize (ONE
      pre-registered mechanism-backed knob change) → Validate → Commit the
      per-regime playbook {eligible strategies/directions, EV selection table,
      entry/exit/sizing config, trade/no-trade gate, expected gap profile}.
      Start small: one regime, one window → more windows (generalize) → next
      regime. Carries the epic's two money bars (SC-012 + SC-014) — graded in
      dollars under NN-P-008, never efficiency.
    prd_sections:
      - FR-TM-10
      - NN-P-008
      - SC-012
      - SC-014
    internal_phases:
      - "Detailed at plan time. High-level: pilot regime selection (data-rich first); per-regime OADHVC iterations (diagnose→hypothesize→validate→commit); generalize across windows; combine_sim Monte-Carlo pass-probability estimate (SC-014); per-regime playbook artifacts."
    exit_criteria: >
      SC-012: on held-out walk-forward windows the loop produces a positive
      survival-weighted net P&L path (respecting trailing/daily/consistency rules)
      and closes per-trade systematic-error gaps vs the pre-tuning baseline for ≥1
      pilot regime; every accepted change carries holdout-window provenance.
      SC-014: combine_sim Monte-Carlo (≥1,000 sims) over held-out windows shows
      P(pass) ≥ p_floor (default 0.10) AND ≥ +5pp over the signal_strength
      baseline.
    depends_on:
      - regime-calibration-loop-harness

  - name: regime-perception-verify
    slug: perception-verify
    status: done
    description: >
      Precursor to Part B. Confirm the live/backtest CompoundRegimeClassifier
      actually perceives regime + transitions CAUSALLY before transition
      adaptation is built on top — the old inject_regime_context stub hardcoded
      vol_tier/term (the "ROUTER perception parity-break" finding). Verify
      RegimeState.transition_detected (core/regime_state.py) fires on real
      transitions with no look-ahead, and repair only if broken. Cheap insurance
      against building adaptation on a stub.
    prd_sections:
      - FR-TM-11
      - NN-P-008
    internal_phases:
      - "Detailed at plan time. High-level: trace regime perception through the merged single-path spine; assert vol_tier/term are computed (not hardcoded); confirm transition_detected fires causally; repair if stubbed."
    exit_criteria: >
      Evidence that the runtime regime belief + transition_detected are computed
      causally (no look-ahead, no hardcoded axes) across a representative
      transition window; any stub repaired and regression-tested.
    depends_on: []

  - name: transition-adaptation
    slug: transition-adapt
    status: open
    description: >
      Part B — cross-cutting transitions. Tune causal transition detection
      (confirmation / dwell-time / hysteresis on RegimeState.transition_detected
      to avoid whipsaw), then on a confirmed A→B transition: migrate the strategy
      set (re-warmup per FR-ROUTER-03, already built in StrategyEnsemble), apply a
      sizing schedule through the uncertain window, and handle positions that
      straddle the switch per the configured policy (default: hand off to the new
      regime's exit rules). Then run the OADHVC loop over the TRANSITION windows
      specifically — diagnosing what went wrong through the handoff (held A's
      playbook too long into B, switched too early, mishandled the straddling
      position). "As the weeks migrate regime to regime we change strategies and
      sizing a bit to adapt" — this is that.
    prd_sections:
      - FR-TM-11
      - FR-TM-12
      - NN-P-008
      - SC-015
    internal_phases:
      - "Detailed at plan time. High-level: transition-detection tuning (dwell/hysteresis); sizing schedule through the uncertain window; open-position handoff policy (default hand-off); strategy-set migration verification; OADHVC loop over transition windows; persist transition handoff rules."
    exit_criteria: >
      SC-015: transition handoff rules persisted per regime-pair; on held-out
      transition windows, transitions no longer give back edge to mishandled
      straddling positions vs the no-adaptation baseline; detection avoids whipsaw
      (re-warmup events per transition ≤ config-pinned ceiling); all changes pass
      the NN-P-008 out-of-sample gate.
    depends_on:
      - regime-calibration-pilot
      - regime-perception-verify

  - name: news-decision-calibration
    slug: news-decision
    status: open
    description: >
      Bring news back as a first-class, CALIBRATED input to the Trading
      Manager's per-regime decision (what to trade / how much) — alongside
      strategy proposals and the rule engine, not as a dormant signal. Today
      Signal 7 (news_flow, FR-EVIDENCE-04/06) is fully wired into the evidence
      stack but pinned dark at weights.news_flow=0.0 (~4,450 LOC integration
      idle). This piece calibrates the per-regime news weight inside the OADHVC
      loop and measures COMBINED-STACK lift: does {strategy + rules + news}
      together earn more survival-weighted dollars on held-out walk-forward
      windows than {strategy + rules} alone? This deliberately replaces the
      discredited news-mechanical-signal-7 verdict (univariate tone |r|=0.009),
      which measured the WRONG question (univariate, not combined-stack) on a
      harness later found broken many ways — that "no edge" finding is VOID as a
      premise (see backlog + news-signal-7 reframe). Graded in dollars
      (NN-P-008), no hindsight at decision time (NN-C-012), identical
      backtest↔live (NN-C-011). Completion is outcome-independent: the piece is
      done when the combined-stack A/B is run and the per-regime news weight is
      pinned — to a positive value OR an honest provenance-backed zero — so it
      terminates and unblocks integration regardless of the research result.
    prd_sections:
      - FR-EVIDENCE-04
      - FR-EVIDENCE-06
      - FR-TM-05
      - FR-TM-06
      - NN-P-008
    internal_phases:
      - "Detailed at plan time. High-level: per-regime news-weight calibration via the OADHVC loop; combined-stack {strategy+rules+news} vs {strategy+rules}-only A/B in dollars; un-pin weights.news_flow from 0.0 into pinned per-regime config; honest dollar grading + holdout provenance (NN-P-008); NN-C-011 backtest↔live parity; NN-C-012 no-hindsight-at-decision-time contract."
    exit_criteria: >
      On held-out walk-forward windows the calibrated {strategy + rules + news}
      stack produces a net survival-weighted dollar lift over the
      {strategy + rules}-only baseline for ≥1 pilot regime, OR an honest,
      provenance-backed null result if news adds nothing on the corrected
      harness; in both cases the per-regime news weight is pinned config read at
      runtime (NN-C-012 green) and backtest↔live parity is verified. The piece
      completes on either outcome (the A/B is run and the weight is committed).
    depends_on:
      - regime-calibration-loop-harness
      - ev-selection-layer
      - regime-characterization

  - name: trading-manager-integration
    slug: tm-integration
    status: open
    description: >
      Wire perceive → eligibility → selection → sizing → transition into a single
      config-driven Trading Manager on the shared backtest/live spine; proposals
      flow strategy → Trading Manager → portfolio risk_manager → rule_engine →
      execution, identical in backtest and live (NN-C-011). All decision content
      is config produced by the offline calibration loop; no hindsight/ceiling
      data enters the runtime path (NN-C-012). With no Trading Manager config
      present the manager is mechanically INERT (pass-through to today's behavior),
      so it ships safely dark and activates per-regime as playbooks land. This is
      the piece that makes the bot's decision layer real — and the one that
      RE-GATES shadow-validation (the live shadow test resumes once this merges).
    prd_sections:
      - FR-TM-13
      - FR-TM-14
      - NN-C-011
      - NN-C-012
    internal_phases:
      - "Detailed at plan time. High-level: TradingManager runtime component on the shared spine; config schema (per-regime playbooks + transition rules); proposal flow wiring (strategy→TM→risk_manager); inert-by-default pass-through; NN-C-011 backtest↔live parity end-to-end; NN-C-012 no-hindsight-import contract."
    exit_criteria: >
      Engineering completion (qa-prd must-fix #9 — SC-014 moved to
      regime-calibration-pilot so this deterministic piece is not gated on a
      research outcome): the integrated Trading Manager runs on the shared spine
      with NN-C-011 backtest↔live parity proven end-to-end, reads only pinned
      config (NN-C-012 green), and is mechanically inert (pass-through) when no
      Trading Manager config is present. Unblocks the re-gated shadow-validation.
    depends_on:
      - regime-calibration-pilot
      - transition-adaptation
      - news-decision-calibration   # operator 2026-06-07: decision layer must account for strategy+rules+news together; news-decision completes either way (positive lift or honest zero) so the gate can't stall on a research outcome

