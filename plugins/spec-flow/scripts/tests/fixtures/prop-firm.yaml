  - name: news-flow-activate
    slug: news-flow-activate
    status: merged
    merged_at: 2026-05-25
    merged_commit: 86d46e5f
    verdict: name-successor=unify-runtime-policy
    description: >
      P0 realignment piece authored 2026-05-25 after `news-mech-signal-7`
      halted at Phase 0 on a too-strict univariate gate (verdict |r|=0.009
      global, max statistically-meaningful cell |r|=0.101; see
      `docs/prds/prop-firm/specs/news-mech-signal-7/phase_0_verdict.md`
      §6 for the annotated reframe). This piece is the integration test
      the halted gate was the wrong proxy for: turn
      `evidence.weights.news_flow` from `0.0` to a calibrated positive
      value and verify the COMBINED evidence stack outperforms the
      identical stack with weight=0 on a real backtest across populated
      regimes from the news-replay-rd dataset (128.6M GDELT rows
      spanning 2020-2026, hour-window queries p95 ~ 2.4ms).

      Product hypothesis (operator-stated 2026-05-25): news is one
      signal in a combined evidence stack, not a standalone forecaster.
      The 4,450 LOC of news_flow integration built by
      `phase-4-9-news-flow-features` and `phase-4-9c-signal-7-production`
      is already wired into `OracleVerdict` and dormant only because
      the weight is zero. Honest read of the halt verdict's two
      statistically-significant cells (the only populated regime,
      bear-normal) shows directionally-consistent ~10% effects:
      `long x negative_tone` r=-0.1012 (n=6526);
      `short x negative_tone` r=+0.0905 (n=6339) — signs flip the way
      a real small edge would. The univariate Phase 0 gate
      (|r|>=0.10/0.15) was the wrong question; this piece asks the
      right one: does combined-stack lift exist when news weight > 0?

      Scope: (1) Audit which query path `phase-4-9c`'s news_flow
      signal actually uses (per-bar no-lookahead query vs. the
      `news_tone_hourly` CAgg) — Phase 0 of `news-mech-signal-7`
      verified CAgg latency p95=0.94ms, but the per-bar path retains
      the NFR-NSR-01 violation at p95=652ms unfixed; record whether
      backtests will hit the slow path. (2) Confirm schema alignment
      between what `phase-4-9c` expects from the `events` table and
      what `news-replay-rd` actually populated (V2Tone /
      V2EnhancedThemes / V2Persons / V2Organizations / V2Locations /
      Amounts / Extras per the 2026-05-23 manifest re-eval). (3)
      Author a weight-sweep harness (config-driven; runs the existing
      backtest pipeline N times across weight values). (4) Run the
      sweep across populated regimes (bear-normal at minimum;
