    description: >
      Two mechanical de-risk rules in the unified rule engine: (a) a scheduled-
      event guard that blocks new entries / cuts size in a configurable window
      around FOMC/CPI/NFP (closes the prohibited-max-size-into-news exposure);
      (b) a generalized shock-derisking rule extending the current shock-bear
      FLATTEN to all high-volatility regimes plus a pre-entry size/stand-aside
      arm. Both derive thresholds from firm/instrument config (NN-C-008), drive
      the single DeclarativeRuleEngine (NN-C-010), no LLM/news dependency.
