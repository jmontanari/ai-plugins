  - name: phase-0g-options-flow
    slug: phase-0g
    status: superseded
    superseded_by: phase-4-6b-indicator-context-and-calibration
    superseded_on: 2026-05-03
    description: >
      *SUPERSEDED 2026-05-03: Absorbed into phase-4-6b-indicator-context-and-calibration
      after 20-thread research pass. Original assumption (gamma alongside
      classical indicators in Signal 4) was revised: research showed GEX is
      largely redundant with VIX after controls (FlashAlpha 2026 backtest:
      ρ drops from -0.36 to -0.03 after VIX + ATM IV controls; near-zero
      independent edge in high-vol regimes where signal would be most
      valuable). GEX therefore lives as a pattern-cell bucket axis
      (`gex_regime`: positive_gamma / negative_gamma / near_flip) consumed
      by Signal 1 (pattern_match), mirroring the existing `vix_realized`
      / `iv_rv_regime` precedent — NOT as a Signal 4 standalone evidence
      source. Free CBOE compute path is viable (delayed quotes CSV from
      cboe.com/delayed_quotes/spx/quote_table/ + Black-Scholes gamma
      reconstruction; sample reference implementations: jensolson,
      Matteo-Ferrara, dstadelman gist). Paid SqueezeMetrics ($720/mo) /
      SpotGamma Standard ($67/mo) NOT justified given the marginal
      predictive value after VIX controls. Research details:
      docs/research/2026-05-03-supporting-data-sources-research.md
      §"Options Dealer Gamma (GEX)".*

      *Original FORWARD-POINTER (2026-05-02): Operator directive — this piece will be
      absorbed into phase-4-6-indicator-library at phase-4-6 spec time.
      Rationale: options dealer gamma exposure feeds Signal 4 (Technical
      Indicators / Mechanical Market-Structure) of the evidence stack
      alongside classical indicators (ATR, VWAP, opening range, volume
      profile, S/R, Bollinger, RSI). Per NN-P-006 signal independence,
      gamma + classical indicators share the same evidence-source slot.
      Phase-4-6 author: amend prd_sections to include FR-DATA-01/02 +
      NFR-19 from this piece; expand description with the gamma-specific
      acceptance criteria. Status remains open here as a pointer; will
      be marked superseded when phase-4-6 spec ships.*

      Highest-impact data gap for MES specifically. SPX is the most-optioned
      index globally; dealer gamma hedging drives a huge fraction of intraday
      MES moves. No professional MES trader operates without this signal.
      Two implementation paths: (a) commercial subscription (SqueezeMetrics
      $75-200/mo or SpotGamma — clean API, immediate value); (b) compute
      from CBOE OI tape (free but multi-month engineering). Recommendation:
      start with SqueezeMetrics if budget allows, build the compute path
      as a follow-on. Emits options-derived metrics consumed by Signal 4
      (Technical Indicators) of the evidence stack OR as an additional
      independent signal pending NN-P-006 independence justification.
    prd_sections:
      - FR-DATA-01
      - FR-DATA-02
      - NFR-19          # paid subscription requires PRD amendment — this piece IS the amendment
    internal_phases:
      - "Phases detailed at plan time. High-level: vendor selection, adapter implementation, gamma exposure schema, dealer positioning ingestion, integration test against historical, ContextBuilder narrative formatter for gamma metrics"
    exit_criteria: >
      Daily dealer gamma exposure available in TimescaleDB for MES window;
      ContextBuilder produces narrative form ("dealers long $X gamma at
      key strike Y, expected hedging flow Z"); historical reconcile passes.
    depends_on:
      - phase-0c-backtest-data-hardening

