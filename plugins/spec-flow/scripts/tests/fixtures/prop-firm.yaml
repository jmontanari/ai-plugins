  - name: unify-runtime-policy
    slug: unify-runtime-policy
    status: merged
    description: >
      P0 successor named by `news-flow-activate` decision.md verdict
      (2026-05-25). The news-flow-activate harness operated end-to-end
      against the 154.8M-row news corpus and surfaced a deeper
      architectural finding than weight tuning: live and backtest paths
      DRIFT because `RuntimeContext.policy` is declared but never polled
      inside `runtime.loop.run_one_tick`. The function's docstring lists
      9 steps; Step 8 ("Poll policy") never made it into the function
      body. The partial-bridge `OversightGate` wired into the backtester
      at commit 9b4508ff demonstrates Δ=+6.7% composite lift in
      bear-normal at weight=0.20, but that bridge sidesteps the
      shared-mechanism principle by patching only the backtest side —
      papering over the drift rather than eliminating it.

      Scope: (1) Author a new project-wide non-negotiable NN-C-011
      (Single-Mechanism Doctrine) in
      `.claude/skills/charter-non-negotiables/SKILL.md` stating that
      live and backtest paths MUST share the same per-tick evaluation
      mechanism, with permitted differences limited to clock source,
      data source, and execution sink. (2) Implement `run_one_tick`'s
      documented Step 8 — `policy.review()` polled inside the shared
      per-tick loop with ALLOW/REDUCE/BLOCK action mapping; live and
      backtest exercise the identical code path. (3) Construct
      `OversightPolicy` inside `BacktestEngine` with the 7 existing
      `EvidenceSource` adapters from
      `src/prop_trader/intelligence/oversight/_sources/`; wire to
      `RuntimeContext.policy`. (4) Backtest-mode services for the
      LOW/MEDIUM-cost adapters: `account_posture`, `rule_engine`,
      `news_flow` (port `_fetch_news_flow_value` from
      `_oversight_gate.py`), `regime` (consume `_inject_macro_regime`
      daily_context output), `technical` (indicator-state exporter or
      parallel service). `pattern_match` is HIGH-cost and may ship in
      a later phase or follow-up piece; `news_sentiment` (Signal 3,
      LLM) remains a `DoNothingEvidenceSource` stub per the
      news-flow-activate backlog disposition (2026-05-24). (5) Delete
      `src/prop_trader/backtester/_oversight_gate.py` and remove the
      paired `ignore_imports` exemption in `pyproject.toml` — the
      partial bridge becomes obsolete once the shared mechanism lands.
      (6) Drift-prevention integration test
      (`tests/integration/runtime/test_live_backtest_parity.py`):
      fixed-bar-window + recorded evidence stack, run `run_one_tick`
      twice (live-mode + backtest-mode contexts), assert identical
