  - "2026-06-09 (INGESTER + ALARM HEALTH AUDIT — new piece `ingester-health` added; gates phase-11) — Read-only prod audit after the ingester's first ~2-day continuous run (evidence: docs/research/2026-06-09-ingester-alarm-health-audit.md). Verdict: data flow mostly healthy (3/4 watched sources fresh; 130 GB bulk intact) but the alarm stack is untrustworthy — discord_spool grew to 48,674 rows in 2 days and the bot logged 14,299 identical heartbeat lines in 34h. Root causes: (a) dedup effectively disabled — 29,304 `subscriber_stalled` rows have an EMPTY dedup_key + body carries an ever-increasing `stalled_for_s` so nothing collapses; (b) `subscriber_stalled` watchdog is NOT schedule-aware (false positives on daily/weekly sources like fred_daily) — the stall-thresholds/calendar-alert-gate fixes only covered the SEPARATE watermark_stale_critical path (GAP 3); (c) every-tick repeat cadence; (d) raw-JSON non-actionable content; (e) discord-bot heartbeat re-scans ~10 threadless-but-delivered CRITICAL rows forever (thread_id=NULL) -> the 14k log spam; (f) no spool retention. Real outage found: a ~50-min transient Dukascopy 503 blip (00:14-01:04 UTC) wedged dukascopy_live PERMANENTLY (bars frozen at 00:55 for 22h+) because the subscriber has NO retry-exhaustion recovery / gap-skip / catch-up — Dukascopy itself is UP (host curl of the exact failing URL returns 200). Coverage gap: only 4 of N subscribers register a watermark in ingester_state. Operator directive: alarms must be valid/accurate/no-noise, structured + user-consumable + actionable, and not repeat into noise. Operator chose ONE combined ingester-health piece (alarm-correctness + source-resilience + data-quality). Consolidates open GAPs 3/4/6. phase-11 depends_on now includes ingester-health."
  - "2026-06-07 (PROD CUTOVER — local master made live; NN-C-018 applied; live deploy surfaced 4 operational gaps) — Per NN-C-018, deployed the merged-but-undeployed local master to the running containers: migration 0041 applied to prod :5432 (additive claimed_at + last_reposted_at); deployed secrets plumbed from shared/secrets/.env into ~/prop_trader/secrets/ (GOOGLE_CLOUD_PROJECT -> ingest.env; DISCORD_GUILD_ID/CATEGORY_ID/ALLOWED_USER_IDS/IS_LIVE/BOT_TOKEN/CHANNEL_ID -> infra.env); ingester rebuilt off master (now writes discord_spool, no longer the dead direct-alerter path — suppressed-alert count 1107/hr -> 0) and the prop_trader_discord_bot container deployed for the first time. **ALERTING IS NOW LIVE + PROVEN**: producer->discord_spool->bot->Discord delivered 51 alerts (incl. 3 ALERT-TEST CRITICAL + watermark criticals); the bot reuses the existing alerts/command-log channels by (name, category) via ensure_channels — NO prod/test channel variations (channel-store: shared/state/discord-bot-channels.json, alerts_id=1513226553566167040). FOUR live-surfaced gaps to fix (each a path below): "
  - "2026-06-07 (GAP 1 — gdelt DISABLED in prod; FIX AT CALIBRATION) — live-source-parity enabled gdelt_live in configs/ingester/subscribers.yaml AND made it fail-loud, but the GCP Application Default Credentials it needs (bigquery.Client) are NOT mounted into the ingester container (GOOGLE_CLOUD_PROJECT alone is insufficient — google.auth.default() raises DefaultCredentialsError). The new ingester crash-looped on this until gdelt was disabled in prod via PROP_TRADER_INGEST_SUBSCRIBERS__GDELT_LIVE__ENABLED=false in ~/prop_trader/secrets/ingest.env (operator-directed). PATH TO FIX (when calibration needs gdelt news data): mount the service-account JSON (shared/secrets/<creds>.json, referenced by GOOGLE_APPLICATION_CREDENTIALS in shared/secrets/.env) into the ingester container via a docker/production/docker-compose.yml volume + set the in-container GOOGLE_APPLICATION_CREDENTIALS path in ingest.env, verify bigquery.Client constructs, then remove the disable override and redeploy. Until then gdelt is the only un-deployed master subscriber; all others (dukascopy/fred/cot/economic_calendar/nasdaq_halt) are live."
  - "2026-06-07 (GAP 2 — container crash-loop has NO independent alerting) — During the cutover the ingester crash-looped (gdelt fail-loud, then AlerterConfig) and NOTHING paged: the alert path depends on the very container that was down, and the host watchdog (launchd keepalive plists com.propfirm.*.keepalive) only restarts containers — it does not alert on crash-loop/unhealthy. PATH TO FIX: give the container-health watchdog its OWN out-of-band alerting plug (independent of the ingester/bot it monitors) — e.g. the keepalive script posts to healthchecks.io / a direct Discord webhook on repeated restart or sustained unhealthy, OR a tiny host-side monitor that watches `docker inspect .State.Health`/RestartCount and pages directly. Must NOT route through the discord_spool->bot path (that's exactly what's down when a container crash-loops). Pairs with the dead-man heartbeat (bot pings healthchecks.io; this is the inverse — host pings when a container is unhealthy)."
  - "2026-06-07 (GAP 3 — stall/watermark alerts fire on non-trading days) — subscriber_stalled (50 rows) + watermark_stale_critical (fred_daily, economic_calendar_hourly) were delivered to Discord on a SUNDAY (markets closed) — false positives, now that alerting is live they spam the operator. The stall/watermark detection does not consult the trading calendar. PATH TO FIX: stall + watermark-staleness detection (ingester data-quality / reconcile path) must consult core/market_calendar.py (CME/NYSE sessions, half-days already wired for SessionFlat) and SUPPRESS or downgrade stall/staleness alerts when the relevant market/source is legitimately closed (weekend, holiday, pre-open). Per-source: dukascopy USA500-RTH stalls are expected outside RTH; fred/economic_calendar staleness is expected on non-release days. Until fixed, weekend alert noise is expected."
  - "2026-06-07 (GAP 6 — silence does NOT cover the CRITICAL heartbeat re-post; dedup_key has an invisible control char) — Two silence defects found while silencing weekend false positives: (a) the drain consults alert_silence (AC-10) and correctly skips NEW posts, BUT the CRITICAL heartbeat (alerts/heartbeat.py -> _db.unresolved_criticals) re-posts already-delivered unresolved CRITICALs hourly and does NOT consult alert_silence — so a silenced CRITICAL keeps re-pinging until ACKed (unresolved_criticals requires acked_at IS NULL). FIX: unresolved_criticals / heartbeat_tick must exclude dedup_keys with an active alert_silence row (LEFT JOIN alert_silence ... WHERE silenced_until <= now OR NULL), so silence suppresses the heartbeat too. (b) The dedup_key format is `severity + '\\x1f' + title` (ASCII Unit Separator 0x1F, INVISIBLE) — e.g. b'WARN\\x1fsubscriber_stalled @ ingester'. A human cannot type this to silence via raw key (my first manual silence used no separator and silently failed to match) — hard-reinforces GAP 5 (dropdown) + the alert-UX silence-button backlog item: silence MUST be selected from active alerts, never typed. Found during the 2026-06-07 cutover; the 3 weekend false-positive keys were silenced via exact-key copy + the CRITICALs need an operator Acknowledge click (agent forbidden from stamping acked_by='operator' — impersonation) to stop the heartbeat until (a) lands."
  - "2026-06-07 (GAP 5 — silence UX is operator-hostile; needs an active-alert dropdown) — To silence an alert today the operator must know and type the exact raw dedup_key string (severity.upper() + title, no separator — e.g. 'CRITICALwatermark_stale_critical @ data.sources.fred_daily') because alert_silence matches on exact dedup_key equality. That is not discoverable or user-friendly. PATH TO FIX: the /silence command should present a Discord SELECT-MENU (discord.ui View, same Traditional-Views pattern as the Acknowledge button) listing the CURRENTLY-ACTIVE alerts — distinct dedup_keys with an open/undelivered/recent incident (title + severity + last-seen as the option label, dedup_key as the option value) — so the operator picks the alert from a dropdown + a duration, never typing a raw key. Optionally an 'unsilence' view listing active alert_silence rows. Depends on GAP 4 (the /silence command path routes through the degraded command-queue executor) being fixed first. Surfaced when the operator asked how to silence the weekend false positives during the 2026-06-07 cutover."
  - "2026-06-07 (GAP 4 — command_queue poller MissingGreenlet in prod) — the Phase-11 ingester-side command-queue poller (src/prop_trader/ingester/_command_queue.py:106 run_command_queue_poller) calls an ASYNC sqlalchemy session synchronously (`with session_factory() as conn`) → sqlalchemy.exc.MissingGreenlet 'greenlet_spawn has not been called' every poll. Caught + 'continuing' (non-fatal — ingester stays healthy), but the bot->ingester command execution path (e.g. /ingester reconcile, silence) is DEGRADED/non-functional in prod. Classic mocked-DB-passes / real-async-DB-fails defect (the unit tests mock the session). PATH TO FIX: use the async session/await in run_command_queue_poller (async engine + AsyncSession + await), or run the sync path on a sync engine; add an integration test that drives the poller against the real async DB. Found during the 2026-06-07 cutover."
  - "2026-06-07 (TRADING MANAGER epic added — PRD v2) — Consolidated the stalled calibration/strategy-rd arc into a single coherent problem: the bot has all the tools (7 strategies, full rule engine, causal CompoundRegimeClassifier, oracle/ceiling, per-regime config plumbing) but NOT the means — the runtime decision layer that selects what/when/how-much to trade per regime and adapts through transitions. Today eligibility comes from a routing table generated by a sweep in which NO strategy landed (configs/routing/regime_to_strategies.yaml provenance), selection is a signal_strength sort (portfolio/risk_manager.py:78), and per-regime entry/exit/sizing config is empty (rule_engine_overrides_by_regime unset) or hand-guessed (macro_bull/bear variants on the old 2-state classifier). Full problem definition + method (OADHVC loop: Observe→Attribute→Diagnose→Hypothesize→Validate→Commit; error→knob vocabulary; survival-weighted-dollars objective; data-driven granularity) + decomposition + critical-path/gating: docs/research/2026-06-07-trading-manager-problem-definition.md. PRD v2 changes: §5.18 new FR domain FR-TM-01..14; NN-P-008 (calibration honesty invariants — realistic ceiling only, dollars-are-the-gate, diagnose-classes-not-trades, out-of-sample acceptance, causal decision inputs); SC-012 (money gate), SC-013 (selection lift), SC-014 (combine pass probability); §11 mapping rows. EIGHT new pieces added (status: open): per-trade-gap-diagnostic, regime-characterization, ev-selection-layer, survival-tiered-sizing, regime-calibration-loop (Part A), transition-adaptation (Part B), trading-manager-integration; + precursor regime-perception-verify. SEQUENCING/GATING (operator decisions): (a) these belong IN the prop-firm PRD, not a separate PRD — a separate PRD would create a charter-discouraged cross-PRD gate on shadow-validation/phase-11; (b) HOLD OFF live shadow-validation — re-gated to depend on trading-manager-integration; the backtest calibration walk-forward over historical periods IS our shadow test for now (shadow-validation.depends_on gained trading-manager-integration); (c) strategy-rd-3-regime-fit-strategies dispositioned status blocked → superseded (by ev-selection-layer + regime-calibration-loop — the reframe builds the missing selection/decision layer over existing strategies instead of redesigning strategies; its 'library gap' premise was harness-tainted + measured against the ~89%-unreachable theoretical ceiling); calibration-2's open AC-17 validation_signoff is moot under the reframed method. Goal anchor: maximize net realized P&L, minimize losses, within Topstep $50K Combine rules — survival-weighted dollars as the gate; gap/ceiling/efficiency only diagnostic (NN-P-008). ADDENDUM (same-day, post qa-prd gate): the qa-prd review applied must-fixes — (1) SC-014 given a concrete estimator (combine_sim Monte-Carlo ≥1,000 sims) + absolute floor (P(pass) ≥ 0.10) + lift (≥+5pp), not relative-to-broken-baseline; (2) regime-calibration-loop SPLIT into regime-calibration-loop-harness (deterministic infra) + regime-calibration-pilot (open-ended research run, carries SC-012/SC-014) so the engineering piece completes independently of the research outcome → NINE pieces total; (3) added SC-015 (transition adaptation) for FR-TM-11/12; (4) regime-perception-verify pulled earlier to gate regime-characterization (so EV/characterization aren't built on a possibly-stubbed perception). Also: NN-P-008 gained invariant (6) selection-set parity (closes S4); FR-TM-03 screens structurally-inert strategies (gamma_pin_fade/momentum_fade); FR-TM-07/NN-P-008 quantified the breach-probability ceiling (≤2% default); FR-TM-04 marked [NEEDS EXPANSION at plan time]. All slugs ≤20 chars."
  - "2026-05-30 (phase-10 — CME session-calendar runtime wiring FOLDED IN; session-calendar-completion rescoped) — A pre-merge review found the CME session calendar (configs/market_calendars/cme_trading_days.yaml + cme_half_days.yaml — which EXIST and cover 2003-2030) was read ONLY by offline data-coverage code; the runtime trading path never consulted it. SessionFlat flattened at a fixed wall-clock flat_time (15:10 CT) with NO half-day awareness → on a CME-equity early-close day (e.g. day-after-Thanksgiving, 12:00 CT close) the bot held ~3 hours past the close = 'not trading correctly'. Operator directed folding the runtime wiring into the phase-10 branch (rather than deferring wholesale to session-calendar-completion). Changes: (1) relocated the pure calendar reader to core/market_calendar.py (rules may only import core per the 'rules depends only on core' import contract); data.sources._calendar_loader re-exports it (zero churn). (2) SessionFlat gained firm-config param early_close_calendar_ref (default ''=off; 'cme_equity' wired into topstep_50k_combine.yaml). On a half-day effective flat = min(flat_time, early_close − block_minutes_before) so the bot is flat BEFORE the early close; normal days + other firms unchanged (NN-C-008 firm-parameterized; NN-C-011 single-mechanism preserved — only the flat-time computation changed). Verified end-to-end: topstep → 11:55 CST on 2024-11-29, 15:10 on normal days; 6 new rule tests. session-calendar-completion (WAVE M) RESCOPED: the data is complete + the half-day early-close (the real defect) is now wired; its residual scope = explicit holiday-standaside + broader DST verification (DST already handled by SessionFlat ZoneInfo arithmetic, regression-tested; full-closure holidays implicitly safe — no bars). Full detail: docs/prds/prop-firm/specs/phase-10/learnings.md (session-calendar section)."
  - "2026-05-30 (phase-10 HELD-OPEN cell-labeler fix COMPLETE — calibration-2 event-axis requirement) — The phase-10 cell labeler was rewired to feed CompoundRegimeClassifier real regime inputs (it was under-fed: SMA/ATR over ~20 five-minute bars, vix_spot=None, empty EventCalendar → every scenario mislabeled, e.g. COVID → bear-normal-flat-noevent). New real-data path on classify_week_to_cell_key(bars, *, store, window): 40d warm-up daily aggregation + 20d SMA/14d ATR on daily closes + real VIX spot + VX1/VX2 term structure + real economic-events calendar, classify each in-window day, return the MODAL cell key (mirrors RegimeWeekFinder). Prod-verified (all -noevent- to MATCH calibration): COVID→bear-shock-backwardation, AI-rally→bull-normal-contango, low-vol→bull-calm-contango. EVENT AXIS — matches calibration (empty calendar): an initial version fed the real economic-events calendar (CPI/FOMC/NFP→-event-) but that was REVERTED per operator decision. The canonical calibration entrypoint (cli/calibrate_exercise.py) uses EventCalendar.empty(), so every key in thresholds.yaml.proposed + the routing table is -noevent-; FR-VAL-02b requires labels to join the K-bar table 1:1, so the labeler must use the same (empty) calendar (else event-day scenarios emit -event- keys that don't exist in the K-bar space = artificial K_UNMEASURED). The labeler now DEFAULTS to EventCalendar.empty(); a caller may pass an explicit calendar_path to opt in (tests do). ⚠️ calibration-2 owns the COORDINATED event-axis activation: calibration + K-bars + routing + labeler adopt the real economic-events calendar TOGETHER (not the labeler unilaterally). Supporting: configs/calendars/economic_events.yaml populated (264 FOMC/CPI/NFP events 2018-2025; CPI/NFP from FRED releases 10/50, FOMC from the Fed schedule; reproducible via scripts/data_sources/gen_economic_events_calendar.py) — INFRA AHEAD OF USE: NOT consumed by the labeler by default; it is the substrate for calibration-2's event-axis activation + mechanical-derisk-guards' live event-blackout. vix_indices_daily + vx_futures confirmed covering all scenario windows. Also fixed in-branch (targeted re-review): the labeling-failure fallback now uses an explicit non-taxonomy sentinel UNLABELED_CELL_KEY (was the typo-looking invalid `bull-low-near-…`) so a labeling failure honestly grades K_UNMEASURED; added WARNING logs to the labeler's swallowed-exception paths. SESSION-CALENDAR WIRING folded into this branch per operator direction (see the 2026-05-30 session-calendar entry). Full detail: docs/prds/prop-firm/specs/phase-10/learnings.md (held-open section)."
  - "2026-05-30 (phase-10 scenario-calibration — SURVIVAL FEATURE GAPS surfaced; 5 new pieces added) — While calibrating the phase-10 validation-scenario envelopes, a capability audit of the bot cross-referenced against a deep-research pass on pro/prop-firm trader practice (both captured in docs/prds/prop-firm/specs/phase-10/survival-features-research.md) established that the dominant Topstep-Combine failure mode is DRAWDOWN/CONSISTENCY (~85% of attempts fail there; only ~4–6% ever profitable), NOT missing strategy alpha — and that the bot has critical survival gaps: (1) NO mandatory scheduled-event guard (EventCalendar is optional/unenforced → can trade max size into FOMC/CPI/NFP = a Topstep PROHIBITED strategy); (2) NO adaptive position sizing (VIX multiplier is enabled:false, downweight-only, static; account_cushion regime dimension computed but never wired to sizing → cannot shrink in a shock or near the −$2,000 trailing floor, and the MLL liquidates on UNREALIZED P&L so a single wick can kill the account); (3) ShockDerisking fires only on shock-bear, FLATTEN-only, no pre-entry arm; (4) NO consistency-rule awareness (a big day silently inflates the bot's own profit target); (5) NO contract-roll detection; (6) incomplete holiday/early-close calendar. FIVE new pieces added (status: open): WAVE R survival — `adaptive-position-sizing` (slug adaptive-sizing), `mechanical-derisk-guards`, `consistency-profit-guard` (slug consistency-guard); WAVE M mechanical — `contract-roll-bridge`, `session-calendar-completion`. SEQUENCING: Wave R lands BEFORE calibration-2's final calibration (you tune a survivable bot, not a blow-up-prone one) → calibration-2.depends_on gained the three Wave R pieces. The phase-10 scenarios are the ACCEPTANCE SPEC for each (the envelopes encode the required behavior). VIX-multiplier activation + breakpoint tuning folds into adaptive-position-sizing (mechanism) + calibration-2 (tuning); routing-config population (empty regime_to_strategies.yaml → bot runs ZERO strategies today) remains calibration-2 Phase 0 (routing-first). strategy-rd-3 RETIREMENT LIKELIHOOD RAISED — if Wave R + routing + per-cell tuning reach a defensible ceiling fraction, strategy redesign is unnecessary. FULL evidence, per-scenario criteria, ranked gap analysis, and sequencing diagram: docs/prds/prop-firm/specs/phase-10/survival-features-research.md (READ before speccing any Wave R/M piece). No charter touch; no FR rewording (new pieces carry NN-P-007 + spec-time FRs)."
  - "2026-05-29 (ceiling-realism-rd MERGED → master squash 97444a7e) — decomposition done; decision = PROCEED with strategy-rd-3 but re-anchor the exit bar to a realistic ceiling. The findings re-sequence the strategy/calibration successors. (A) DENOMINATOR settled: the policy-regime-cal `regime_aware_ceiling` is ~89% UNREACHABLE inflation AND was mis-computed at 1 contract (rebuild_oracle.py called default_ceiling_config() instead of ceiling.yaml's max_position_contracts=5). The correct grading bar is the engine-basis CONSTRAINED ceiling — and even that is conservative because its one-position cap was a SPEC MODELING CHOICE, not a Topstep rule (Topstep permits concurrent positions within the 5-contract + DLL + trailing + session-flat envelope; Variant A already trades multi-position), so the true bar is a MULTI-POSITION-within-Topstep ceiling. (B) The efb gap is mostly ROUTING, not missing strategies: a perfect selector over the EXISTING efb primitives reaches 40–87% of the realistic ceiling on every cell, incl. 57–68% on the three 'dead' cells (bull-normal-contango/transitional-normal-contango/transitional-normal-flat) that the library scores 0–5% on — the primitives exist, the library isn't deploying them. (C) calibration-2 Phase 0 RESCOPED (not superseded): grade vs the constrained/MULTI-POSITION ceiling (not the inflated theoretical or the prior efb K×realistic bar), lead with the merged phase-9 router + multi-position (routing-first); the 'is the 1% an artifact?' question is largely pre-answered (denominator artifact) so Phase 0 narrows to 'does the PRODUCTION stack reach a defensible fraction of the realistic bar.' ceiling-realism-rd added to calibration-2.depends_on. (D) strategy-rd-3 REFRAMED: its decomposition gate is satisfied but its redesign premise (2 no-winner cells: bear-shock-backwardation + transitional-normal-contango; momentum_fade dead; mean_reversion/trend_follow non-viable) rests on the OLD inflated denominator + the calibration strategy set — ceiling-realism-rd shows bear-shock-backwardation captures 59–68% and the dead transitional cells are routing gaps, so those claims are suspect; RE-VALIDATE on the realistic bar via calibration-2 Phase 0 before any full redesign — strategy-rd-3 likely shrinks to coverage-only or retires in favor of routing+multi-position+calibration tuning. (E) SEQUENCING on master: phase-9 + news-ingest-unity + efficiency-bench-rd merged, but phase-10-validation-suite is STILL OPEN → phase-10 is the IMMEDIATE next build, THEN calibration-2 Phase 0, THEN (conditionally + likely shrunk) strategy-rd-3. (NOTE: the operator's change/toolchain-compliance working branch has a diverged manifest — it lacks the ceiling-realism-rd merge AND this re-sequence — and will conflict on its eventual merge to master; read piece statuses from master, not the main checkout.) Two backlog follow-ups raised: fix policy-regime-cal rebuild_oracle.py to load ceiling.yaml (5-ct); fix portfolio/manager.py partial-close-on-opposite-fill (matters once multi-position/scale-in runs live). Concrete manifest changes in THIS commit: strategy-rd-3.notes 2026-05-29 REFRAME block; calibration-2 Phase-0 description 2026-05-29 UPDATE block + ceiling-realism-rd added to depends_on/dependency_note. (ceiling-realism-rd.status=merged carried by the squash.) Seed brief: docs/prds/prop-firm/specs/ceiling-realism-rd/strategy_rd_3_scoping.md + decision.md."
  - "2026-05-29 — NEW piece `ceiling-realism-rd` (slug 18 chars; status: open) added, bundling the two HIGH future-opportunity items efficiency-bench-rd's Final Review routed to backlog (efb-variant-c-explain-gap + regime-ceiling-realism-audit). Rationale: efb's headline ('strategy library is the bottleneck') confounds library-poverty vs an unachievable best-trade-every-bar `regime_aware_ceiling` denominator, and efb's instrument (Variant A = forward loss-skip only) cannot separate them. This piece adds (1) Variant C = true ex-post best-primitive-per-bar selection over the existing composition pool (per-bar causal-exit hindsight; one position), and (2) a constrained ceiling (new sibling `efficiency_benchmark/_constrained_ceiling.py`; policy-regime-cal's `_regime_aware_ceiling.py` stays read-only) = best achievable by a one-position causal trader with hindsight on DIRECTION only, respecting Topstep DLL/trailing/session-flat exit rules. Decomposes per cell ceiling−C (ceiling overshoot) vs C−A (library gap), reports theoretical-vs-constrained ceiling spread, and emits decision.md with an explicit strategy-rd-3 fork rule. depends_on: [efficiency-bench-rd, policy-regime-cal]. Gates strategy-rd-3 (blocked — its 'library bottleneck' premise rests on this decomposition) + calibration-2 Phase 0 grading-denominator choice. Operator-confirmed design at /spec-flow:spec brainstorm 2026-05-29 (per-bar causal-exit Variant C; full-Topstep-realism constrained ceiling; new sibling module; decision.md fork rule). Honors NN-C-012 (Variant C + constrained ceiling are hindsight constructs sealed in the efficiency_benchmark carve-out). Recommended next action: /spec-flow:spec prop-firm/ceiling-realism-rd."
  - "2026-05-29 — efficiency-bench-rd two-variant design merged: (i) two-variant design — Variant A (per-bar forward-feature lookups, oracle-audit variant) tests whether the regime_aware_ceiling is a realistic upper bound; Variant B (no forward features, realistic-target variant) anchors a defensible per-cell PASS bar without lookahead. (ii) Empirical finding: oracle ceiling overstated on 10/11 cells — Variant A median efficiency 2.35%, max 74.05% (bear-shock-backwardation); Variant B (realistic target) median ~0%, confirming the 50%-of-ceiling target is unreachable by any non-omniscient strategy; per-cell PASS-bar shape (realistic_pass_bar_pct_of_ceiling = K × synthetic_realistic_efficiency[cell] at K=0.5 default) REPLACES the prior uniform 50%-of-ceiling target. (iii) Downstream calibration-2 Phase 0 consumes the signed-off target via configs/calibration/thresholds.yaml.proposed; proposed bars committed in that file. (iv) Manifest source-vs-artifact split clarification: src/prop_trader/calibration/hindsight/efficiency_benchmark/ owns the code (primitives library, grading, engine, runner); shared/efficiency-benchmark/v1/ owns the outcome artifacts (parquets, summary, target docs). (v) Final Review board (6 Opus reviewers, merge-base diff) corrected 3 deliverable-accuracy items pre-merge: Variant A is a forward winner-filter/loss-skip on the same primitives as B (NOT ex-post best-primitive selection); bull-normal-contango ratio[A]=0.0000 is an UNMEASURED non-result (sole primitive breakout_with_retest needs prev_window the runner never supplies); median ratio[A] 0.0344→0.0235. 6 code-robustness should-fixes + 4 future-opportunity pieces (efb-variant-c-explain-gap, regime-ceiling-realism-audit, calibration-2-floor-policy, strategy-rd-3-seed) routed to backlog."
  - "2026-05-28 — `cal-rerun-hindsight` CLOSED `obsolete` at /spec-flow:spec time. Empirical pre-brainstorm scan of all artifact roots named in the piece's scope returned ZERO `news_veto` mentions: `shared/strategy-rd/` (52 final.md files) pre-dates the `news_veto_sizing_enabled` axis entirely — that axis was introduced by `strategy-rd-2` (commit `e6698da5`); `shared/strategy-rd-2/baseline/` (136 final.md files) contains only the Phase 0 honest baseline because `strategy-rd-2` merged via Path A per its handoff — the Phase 12 PERFORM cycle that would have exercised the lookahead axis was never executed; `shared/baselines/v1/canonical/` (cal-measure-rework, 180 final.md files) pre-dates `strategy-rd-2`; `shared/policy-calibration/` + `shared/oversight-calibration/` also clean. `policy-regime-cal` iter-1 already verified clean 2026-05-27 (its `grid_spec_iter1.yaml` files do not sweep `news_veto_sizing_enabled`). Conclusion: the manifest entry was anticipatory worst-case framing assuming the strategy-rd-2 Phase 12 sweep had run; it did not, and `hindsight-isolation` (merged `2606d34c` 2026-05-28) has since deleted the entire lookahead code path (`apply_news_veto`, `_news_features_writer`, the four `*_ahead` columns, the `news_veto_sizing_enabled` param-grid axis). With no tainted accepted-params artifacts on disk AND the code path gone, the piece has no work to do. Concrete manifest changes in this commit: (a) `cal-rerun-hindsight` flipped `status: open` → `status: obsolete` with `obsoleted_at: 2026-05-28` + `obsoleted_reason` field; piece block retained as historical record; (b) `calibration-2.depends_on:` removes `- cal-rerun-hindsight`; `calibration-2.dependency_note:` paragraph removes the corresponding bullet and notes the closure; (c) `calibration-2.description:` Phase 0 paragraph drops 'cal-rerun-hindsight scrubbing lookahead-tainted verdicts' from the Wave 1 sibling list; (d) `efficiency-bench-rd.notes:` + `dependency_note:` drop `cal-rerun-hindsight` from the W