  - name: news-backfill-fix-and-replay
    slug: news-replay-rd
    status: merged
    description: >
      P0 successor spawned by news-store-rd Phase 3.5 (F1-6 root-cause).
      Fix the news_corpus backfill writer so PASS counts reflect committed
      rows (not fetch attempts), narrow swallow-all exception handling,
      add a post-backfill verification gate, confirm idempotency, and
      replay the 2020-01-01 → 2026-05-23 window in parallel. Background:
      news-store-rd discovered that backfill_2024_stdout.log reports
      `news_corpus PASS rows=8604604` but DB has ZERO news rows for
      2020-2025 across all three candidate tables (events, gdelt_events_cache,
      news_signals). Root cause locked to:

        (a) src/prop_trader/data/sources/_adapter_runner._flush() increments
            `total += len(batch)` after every write_batch call without
            cursor.rowcount / RETURNING-id verification.

        (b) src/prop_trader/data/sources/news_corpus/_gdelt.py:269 (broad
            `except Exception as exc:` block) and
            src/prop_trader/data/sources/news_corpus.fetch (similar broad
            except, ~line 392) swallow per-file and per-sub-iter commit
            errors silently.

        (c) GDELT upstream is verified healthy — direct HTTP fetch of
            data.gdeltproject.org/gdeltv2/{date}.gkg.csv.zip for 2020-06-15,
            2022-03-15, 2024-09-05, 2025-09-15 all returned 200 OK with
            1400-1700 rows each. The gap is 100% writer-side.

      Scope: (1) Replace `len(batch)` in _adapter_runner._flush() with
      a commit-row-count contract using cursor.rowcount or RETURNING-id;
      PASS counts MUST reflect committed rows. (2) Narrow `except Exception`
      at _gdelt._fetch_and_parse:269 + news_corpus.fetch:~392 to catch
      ONLY expected transient failures (network, parse error, circuit-breaker
      open); re-raise everything else so DB commit errors stop being silent.
      (3) Add a post-backfill verification gate: backfill driver SHALL
      re-query the destination table for `COUNT(*) WHERE ts >= window_start
      AND ts < window_end` and FAIL the run if commit_count < attempt_count
      with tolerance for known skip categories. (4) Verify the writer's
      idempotency: confirm `ON CONFLICT DO NOTHING` (or equivalent
      skip-on-existing) is on the events insert path so a re-run is safe.
      (5) Run the backfill in parallel for the last 6 years (2020-01-01 →
      2026-05-23) using parallel execution across years; verify rows
      landed per year per kind via TABLESAMPLE probes. (6) Confirm regime
      freeze points (see calibration / regime-classification pieces) ALL
      fall within the 2020-2026 window so the replay covers them all.
      (7) Audit-trail the run results into news-backfill-coverage.md
      so next session can verify per-year coverage.
      Out of scope: no schema changes (migrations 0029-0031 verdict was
      `keep`); no NewsDocument changes; no provider swap (that's a separate
      future piece if F2-1 URL-not-prose finding persists post-replay);
      no strategy-rd-2 changes (audit-only); no live-trading hookup.
      Recommended next action: /spec-flow:spec prop-firm/news-backfill-fix-and-replay.
    prd_sections:
      - FR-DATA-01      # adapter completeness
      - FR-DATA-02      # ingest-completeness verdict
      - NN-P-007        # holdout reservation (parallel replay must respect)
      - SC-003          # adapter count + correctness
    internal_phases:
      - "Phases detailed at plan time. High-level: (1) Audit + fix _adapter_runner._flush() commit-row-count contract + unit tests demonstrating the contract; (2) Audit + fix narrow except blocks in _gdelt + news_corpus.fetch; (3) Add backfill post-verification gate + unit tests; (4) Confirm idempotency contract + integration test; (5) Author parallel-replay driver; (6) Execute replay for 2020-2026; (7) Author news-backfill-coverage.md report"
    exit_criteria: >
      (a) src/prop_trader/data/sources/_adapter_runner._flush() uses
      cursor.rowcount-based commit verification; PASS counts equal
      commit counts under unit test. (b) Narrow except blocks at
      _gdelt._fetch_and_parse + news_corpus.fetch re-raise unexpected
      exceptions per a documented allowlist. (c) Backfill driver fails
      LOUDLY when commit_count < attempt_count (minus known skip
      categories). (d) Post-replay verification: per-year row counts
      in `events WHERE kind LIKE 'news:YYYY%'` are non-zero for every
      year 2020-2026 (verified via TABLESAMPLE bounded probes; no
      F1-2 wide-aggregate violations). (e) news-backfill-coverage.md
      committed to docs/research/news-backfill/ with per-year coverage
      table + outstanding gaps. (f) Idempotent re-run leaves DB row
      count unchanged (ON CONFLICT DO NOTHING confirmed). (g)
      `prop_trader dev verify` exits 0.
    depends_on:
      - news-store-rd
    dependency_note: >
      `news-store-rd` provides F1-6 root cause documentation in
      decision.md §1.5 + carry-forward Sub-Phase A.1/A.4 verdicts that
      this piece consumes. The audit need not be FULLY done — only
      §1.5 + A.4 (writer bugs) must be locked, which they are as of
      commit 41ca451 + 38e7c2a.

      SCOPE EXTENSION (2026-05-23, per exploration_no_prose_path.md):
      this piece's writer fix MUST also populate the GDELT structured
      fields that Signal 7 (mechanical news_flow) consumes — at minimum
      V2Tone (all 7 sub-fields), Themes / V2Themes, V2Persons,
      V2Organizations, V2Locations, AllNames, Amounts, GCAM (consider
      cost discipline — GCAM is 3.16 GiB/day at full scan), Extras
