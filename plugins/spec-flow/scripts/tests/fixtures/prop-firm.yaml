  - name: calibration-measurement-rework
    slug: cal-measure-rework
    status: merged
    description: >
      Replace the calibration grader's hand-authored ideal_pnl denominator with
      a mechanical three-number model so per-regime verdicts are trustworthy
      enough to drive the Phase 9 strategy-router. The three numbers, all
      deterministic and LLM-free: ceiling_pnl (a realistically-constrained
      perfect-foresight optimizer modelling a pro trader who knew the week in
      advance — the grading denominator, target efficiency >= 0.75), oracle_pnl
      (the best the actual strategy achieves over its param grid through the
      real BacktestEngine + rule engine — a diagnostic that splits a
      calibration gap from an architecture gap), and blind_pnl (IS-calibrated
      params, no peeking). Adds a prop-firm-rule preservation gate (any
      daily-loss / trailing-drawdown breach in the blind run is an automatic
      FAIL) and a computed root-cause classifier (no-edge-regime /
      architecture-limited / mis-calibrated / preservation-failure) replacing
      hand-assigned labels. Mega-piece: also adds every tuning knob the
      per-regime workflow needs as searchable param-grid dimensions —
      direction filters, a profit-lock / trailing-stop primitive in the unified
      exit engine, regime-aware position-size scaling, vol-scaled stop ranges.
      Successor to calibration-ideal-grading; supersedes its hand-authored
      ideal-scenario model. See
      docs/prds/prop-firm/calibration_phase9_gate.md for the methodology.
    prd_sections:
      - FR-BT-01
      - FR-BT-02
      - FR-BT-04
      - FR-STRAT-03
      - FR-DATA-01
      - FR-DATA-02
      - NFR-19
    internal_phases:
      - "Phases detailed at plan time. High-level: ceiling_pnl perfect-foresight optimizer; denominator swap to ceiling_pnl + retire hand-authored ideal load path; oracle_pnl diagnostic; preservation gate via firm rule-engine-firing capture in the calibration engine mode; computed root-cause classifier; tuning-knob capability (direction filters, profit-lock/trailing exit primitive in the unified exit engine, position-size scaling, vol-scaled stop grid) wired as param-grid dimensions; verification report + machine-readable router contract; regime-week independence + enumeration scope."
    exit_criteria: >
      The calibration grader uses ceiling_pnl (a realistically-constrained
      perfect-foresight optimizer) as the denominator — no hand-authored
      ideal_pnl in the grading path. ceiling_pnl, oracle_pnl and blind_pnl are
      computed for every graded week and the ceiling_pnl >= oracle_pnl >=
      blind_pnl invariant is asserted. The preservation gate fails any pair
      whose blind run breaches a Topstep $50K Combine rule. Every data-bearing
      market regime has a verdict with a computed root-cause label; data-absent
