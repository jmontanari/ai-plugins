  #     lacks the OpenMP lib lightgbm needs, AND `cli.main` eagerly imports
  #     cli.harness → intelligence.regime → lightgbm, so the data collector
  #     can't start without the entire ML/LLM import graph. It failed SILENTLY
  #     for ~2 weeks (no observability) — the strongest argument for L-1's
  #     observability scope.
  #   • ~11 live subscribers already exist as code (dukascopy_live, fred_daily,
  #     cot_weekly, economic_calendar_hourly, gdelt_live, cc_news_live,
