    internal_phases:
      - "Phases detailed at plan time. High-level (8 phases, several Implement-track): (Phase 0) Schema + config — PatternLibraryHindsight parquet layout, pattern_library_hindsight_config.py, holdout boundary constants, NN-C-007 hook gating raw OHLCV out of snapshot keys. (Phase 1) Build pipeline — PatternLibraryHindsightBuilder consuming a BacktestEngine window with stub_evidence_sources={pattern_match} (no self-contamination), per-bar (s_t, a*_t, achieved_outcome) aggregation. (Phase 2) Read path — PatternLibraryHindsight.load(build_id) + BacktestPatternMatchService rewire (SQL path deleted; companion backlog item closes). (Phase 3) Backtest-leakage guard — load_library_for_window(t_end) + per-window snapshot dispatch. (Phase 4) CLI — `prop_trader patterns build-hindsight` + `prop_trader patterns inspect <build_id>`. (Phase 5) Audit-isolation parity — stub_evidence_sources={pattern_match} produces zero pattern-match evidence; non-stubbed produces non-uncertain on > threshold of bars. (Phase 6) Re-run oversight-rd-style adapter scorecard for pattern_match in isolation (gate for policy-regime-calibration activation). (Phase 7) Charter doctrine + decision.md + handoff.md; backlog items `pattern-library-ideal-trades` (flipped to merged) + `pattern_library DB-mirror migration` (flipped to superseded)."
