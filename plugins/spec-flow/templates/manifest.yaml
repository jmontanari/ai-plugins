schema_version: 1
generated: {{date}}
last_updated: {{date}}
prd_source: "{{docs_root}}/prd.md"   # legacy compat — kept for v0/v1/v2 manifests; v3 PRDs live at {{docs_root}}/prds/{{prd_slug}}/prd.md

# Branching strategy (set during `prd` skill brainstorm step 4l):
#   feature_branch: the accumulator branch all piece branches are based off and merge into after execute.
#                   Set to null if this PRD develops directly on the default branch (no accumulator).
#   merge_target:   where feature_branch merges when the full PRD ships (default: master).
#   pr_required:    true = piece branches merge via PR; false = direct push allowed (default: true).
#
# These three fields are read by spec (worktree creation), execute (merge target), and status.
# Never commit PRD piece work directly to merge_target while feature_branch is set.
feature_branch: null
merge_target: master
pr_required: true

# pieces:
#   Each piece describes one implementable unit under this PRD. Status values track the
#   piece-status state machine from the spec: open → speccing → planning → executing → shipped
#   (terminal: shipped, blocked, abandoned).
#
#   Example piece block (delete or replace):
#
#   - name: example-piece
#     slug: ex-piece          # optional — defaults to kebab-cased `name` (≤20 chars, [a-z0-9-])
#     status: open            # open | specced | planned | in-progress | merged | done | superseded | blocked
#                             #   (see piece-status state machine in the spec-flow doctrine; `done` is the v2 alias of `merged`)
#     prd_sections: [FR-001, FR-002]
#     depends_on:             # qualified `<prd-slug>/<piece-slug>` (cross-PRD) or bare `<piece-slug>` (same PRD)
#       - other-prd/some-piece
#       - sibling-piece
pieces: []

coverage:
  total_prd_sections: 0
  covered_sections: 0
  uncovered_sections: []
  percentage: 0
