# spec-flow — project-level config
# Created automatically on first session. Edit to match your project layout.
docs_root: docs
worktrees_root: worktrees

# layout_version: docs/ layout schema version
#   4       — charter as skills under charter_root/skills/charter-*/ + multi-PRD docs/prds/<prd-slug>/ layout
layout_version: 4

# charter_root: where charter skills live — .github or .claude. Resolved and written
#   by /spec-flow:charter at bootstrap (it detects which host dir exists and recommends one).
#   Charter domains live at <charter_root>/skills/charter-<domain>/SKILL.md.
#   See plugins/spec-flow/reference/charter-location.md. Leave unset until charter is created.
# charter_root: .claude

# Orchestrator behavior
# refactor: controls Step 5 (Refactor) dispatch
#   auto    — skip when Build reports oracle clean on first attempt + no plan deviations + clean AC matrix (default)
#   always  — always run Refactor
#   never   — never run Refactor (useful for repetitive-pattern tracks like adapters)
refactor: auto

# merge_strategy: controls how execute Step 6 lands the piece on main
#   squash_local — git merge --squash to local main, then push (default; suits
#                  self-contained repos with direct main write access)
#   pr           — display gh pr create command for the human to run; halt
#                  (suits PR-based repos where main is protected; no gh CLI dep added)
merge_strategy: squash_local

# tdd: controls TDD enforcement for behavior-bearing phases
#   auto     — ask the user at plan time which track to use (default)
#   true     — always use TDD track (same as auto with "yes" answer)
#   false    — skip TDD phases; all phases use Implement track + Write-Tests
tdd: auto

# qa_iter2: DEPRECATED in 3.1.0 — see plugins/spec-flow/reference/qa-iteration-loop.md
# The orchestrator no longer reads this key. Iter-until-clean is now the default
# for all QA gates; the 3-iter circuit breaker handles escalation. The key is
# retained to keep existing user .spec-flow.yaml files parseable.
qa_iter2: auto

# phase_groups: controls Phase Group parallel execution (new in v1.4.0)
#   auto    — dispatch sub-phases concurrently when plan uses Phase Groups; fall back to serial for flat phases (default)
#   always  — same as auto but errors if a plan has no parallelism (catches over-flat plans)
#   off     — treat Phase Groups as if they were flat serial phases (disable new scheduler; useful for rollback)
phase_groups: auto

# deferred_commit: controls Phase Group commit model (new in v5.0.0)
#   auto — serial git-free section + ONE deferred work-commit at the group barrier;
#          journal-based resume; file-scoped recovery (default; replaces pre-5.0.0 behavior)
#   off  — pre-5.0.0 behavior: concurrent sub-phase dispatch + per-sub-phase unified commits
#          (rollback for one release; see CHANGELOG 5.0.0 migration note)
deferred_commit: auto

# model_policy: controls the execute per-stage model report (new in v5.6.0)
#   auto — coordinator reports the per-stage model assignment at execute start and flags only
#          the two sanctioned exceptions (spike phase / operator override); see
#          plugins/spec-flow/reference/coordinator-contract.md (default)
#   off  — run only the legacy Pre-flight Model Check prompt; emit no per-stage report
model_policy: auto

# qa_max_iterations: configurable QA fix-loop circuit-breaker limit (new in v5.6.0)
#   auto  — resolve per piece track: 5 for doc-as-code/Implement pieces (tdd: false),
#           3 for TDD pieces (tdd: true). Codifies the pi-011 finding that a hard 3 is
#           wrong for doc-as-code Final Review (default)
#   <int> — explicit cap applied uniformly to all five QA-agent fix-loops
#   Governs: Final Review fix loop, per-phase qa-phase, mid-piece Opus pass, Group Deep QA,
#   qa-phase-lite. Does NOT govern the oracle 2-attempt build budget or the mechanical
#   SKILL self-lint loop.
qa_max_iterations: auto

# default_branch: the base branch for `git diff <base>..HEAD` in Final Review (new in v5.2.0)
#   <unset> — auto-detect: git symbolic-ref refs/remotes/origin/HEAD, then git remote show origin (default)
#   <name>  — explicit override (e.g. master, trunk) when auto-detect cannot resolve
# default_branch:

# reflection: controls Step 4.5 end-of-piece reflection (new in v1.5.0)
#   auto    — dispatch reflection agents (process-retro + future-opportunities); append findings to <docs_root>/improvement-backlog.md (default)
#   off     — skip Step 4.5; learnings.md authored without reflection-agent input (pre-v1.5 behavior)
reflection: auto

# charter: configures the charter stage
#   required      — if true, prd/spec/plan skills fail fast when no charter skills are found
#                   at <charter_root>/skills/charter-*/SKILL.md
#                   default: false until /spec-flow:charter runs, which sets it true
#   doctrine_load — list of charter domains (by base name) to auto-load into session context via the SessionStart hook
#                   default: [non-negotiables, architecture]
#                   set to [] to disable auto-load entirely
charter:
  required: false
  doctrine_load: [non-negotiables, architecture]

# integrations: optional connections to external tools (new in v3.3.0)
#
# All integration steps are MCP-only — no hardcoded API calls. Skills check
# whether the declared MCP tools are available before any integration step.
# If a required tool is missing, a ⚠️ INTEGRATION WARNING is emitted and the
# step is skipped gracefully. The rest of the pipeline continues unaffected.
#
# integrations:
#   issue_tracker:
#     enabled: false                     # master kill switch; default false
#     provider: jira                     # jira | linear | github-issues | azure-devops | custom
#
#     # Provider-specific config
#     project_key: PROJ
#     base_url: https://team.atlassian.net
#
#     # Behavior flags
#     auto_create_tasks: true            # create tasks on spec/plan events
#     auto_transition: true             # transition tasks on phase/QA events
#     commit_tag_format: "[{issue_key}]" # prefix injected into commit messages
#
#     # Issue hierarchy — ordered parent-to-child chain of Jira issue types.
#     # Each entry's parent is the entry above it.
#     # managed: false  — exists before spec-flow; key recorded manually in the artifact.
#     # managed_by: <skill> — created and key recorded by that skill.
#     # artifact: which spec-flow file holds this level's key (prd | spec | plan).
#     # key_field: field name written into that artifact's front-matter (standardized: jira_key).
#     # naming: ~ uses built-in default title format for that level.
#     hierarchy:
#       - type: Epic          # top-level (e.g. Epic, Initiative, Theme)
#         managed: false      # create manually; record key as jira_key: in prd.md
#         artifact: prd
#         key_field: jira_key
#       - type: Story         # per-piece (e.g. Story, Epic, Feature)
#         managed_by: spec    # spec skill creates + records in spec.md[jira_key]
#         artifact: spec
#         key_field: jira_key
#         naming: ~
#       - type: SubTask       # per-phase (e.g. SubTask, Task)
#         managed_by: plan    # plan skill creates one per phase + records in plan.md[jira_key]
#         artifact: plan
#         key_field: jira_key
#         naming: ~
#
#     # MCP tool map: override defaults with explicit tool names.
#     # null = use provider default (see reference/integration-capability-check.md).
#     mcp_tools:
#       create_issue: ~
#       transition_issue: ~
#       get_issue: ~
#       get_transitions: ~
#
#     # Status names for this project's Jira workflow
#     status_map:
#       todo: "To Do"
#       in_progress: "In Progress"
#       in_review: "In Review"
#       done: "Done"
#       backlog: "Backlog"
