# spec-flow — project-level config
# Created automatically on first session. Edit to match your project layout.
docs_root: docs
worktrees_root: worktrees

# layout_version: docs/ layout schema version
#   3       — enables multi-PRD docs/prds/<prd-slug>/ layout (v3.0.0+)
#   1, 2    — legacy single-PRD layouts (docs/prd/, docs/specs/<piece>/)
#   absent  — treated as legacy; SessionStart hook emits a yellow warning prompting `/spec-flow:migrate`
layout_version: 3

# Orchestrator behavior
# refactor: controls Step 5 (Refactor) dispatch
#   auto    — skip when Build reports oracle clean on first attempt + no plan deviations + clean AC matrix (default)
#   always  — always run Refactor
#   never   — never run Refactor (useful for repetitive-pattern tracks like adapters)
refactor: auto

# tdd: controls TDD enforcement for behavior-bearing phases
#   auto     — ask the user at plan time which track to use (default)
#   true     — always use TDD track (same as auto with "yes" answer)
#   false    — skip TDD phases; all phases use Implement track + Write-Tests
tdd: auto

# qa_iter2: DEPRECATED in 3.1.0 — see plugins/spec-flow/reference/qa-iteration-loop.md
# The orchestrator no longer reads this key. Iter-until-clean is now the default
# for all QA gates; the 3-iter circuit breaker handles escalation. The key is
# retained to keep existing user .spec-flow.yaml files parseable.
qa_iter2: auto

# phase_groups: controls Phase Group parallel execution (new in v1.4.0)
#   auto    — dispatch sub-phases concurrently when plan uses Phase Groups; fall back to serial for flat phases (default)
#   always  — same as auto but errors if a plan has no parallelism (catches over-flat plans)
#   off     — treat Phase Groups as if they were flat serial phases (disable new scheduler; useful for rollback)
phase_groups: auto

# reflection: controls Step 4.5 end-of-piece reflection (new in v1.5.0)
#   auto    — dispatch reflection agents (process-retro + future-opportunities); append findings to <docs_root>/improvement-backlog.md (default)
#   off     — skip Step 4.5; learnings.md authored without reflection-agent input (pre-v1.5 behavior)
reflection: auto

# charter: configures the charter stage (new in v2.0.0)
#   required      — if true, prd/spec/plan skills fail fast when docs/charter/ is missing (piece 3 enforces)
#                   default: false for backward compat; new projects default to true after running /spec-flow:charter
#   doctrine_load — list of charter files (by base name) to auto-load into session context via the SessionStart hook
#                   default: [non-negotiables, architecture]
#                   set to [] to disable auto-load entirely
charter:
  required: false
  doctrine_load: [non-negotiables, architecture]

# integrations: optional connections to external tools (new in v3.3.0)
#
# All integration steps are MCP-only — no hardcoded API calls. Skills check
# whether the declared MCP tools are available before any integration step.
# If a required tool is missing, a ⚠️ INTEGRATION WARNING is emitted and the
# step is skipped gracefully. The rest of the pipeline continues unaffected.
#
# integrations:
#   issue_tracker:
#     enabled: false                     # master kill switch; default false
#     provider: jira                     # jira | linear | github-issues | azure-devops | custom
#
#     # Provider-specific config
#     jira:
#       project_key: PROJ
#       base_url: https://team.atlassian.net
#
#     # Behavior flags
#     auto_create_tasks: true            # create tasks on spec/plan events
#     auto_transition: true             # transition tasks on phase/QA events
#     commit_tag_format: "[{issue_key}]" # prefix injected into commit messages
#
#     # MCP tool map: override defaults with explicit tool names.
#     # null = use provider default (see reference/integration-capability-check.md).
#     mcp_tools:
#       create_issue: ~
#       transition_issue: ~
#       get_issue: ~
#       get_transitions: ~
#
#     # Integration rules file (base name only — resolves to <docs_root>/charter/<name>.md)
#     # Teams fill this in; skills read it; it defines task naming, status transition
#     # rules, commit message format, and issue hierarchy.
#     charter_file: integrations         # → charter/integrations.md
